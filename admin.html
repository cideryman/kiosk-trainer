<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간식 키오스크 - 관리자 페이지</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="간식 키오스크">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    /* 관리자 대시보드용 보완 스타일 (PC 넓은 화면 대응) */
    @media (min-width: 768px) {
      .kiosk-container {
        max-width: 960px;
        height: auto;
        min-height: 90vh;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
      }
      body {
        background-color: #E2E8F0;
        padding: 40px 0;
      }
      .admin-layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }
      .admin-main {
        grid-column: 1;
      }
      .admin-side {
        grid-column: 2;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
    }

    /* 탭 메뉴 스타일 */
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 3.5px solid var(--border-color);
      padding-bottom: 0px;
    }
    
    .admin-tab-btn {
      background: none;
      border: none;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: 800;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      transition: all 0.2s ease;
      position: relative;
      bottom: -3.5px;
    }
    
    .admin-tab-btn:hover {
      color: var(--text-main);
      background-color: #F1F5F9;
    }
    
    .admin-tab-btn.active {
      color: var(--primary-color);
      background-color: white;
      border: 3.5px solid var(--border-color);
      border-bottom-color: white;
    }
    
    .admin-tab-content {
      display: none;
    }
    
    .admin-tab-content.active {
      display: block;
    }

    /* 관리자 조절 버튼 및 입력창 스타일 */
    .credit-adjust-btn {
      padding: 6px 12px;
      font-size: 16px;
      font-weight: 800;
      border: 2px solid var(--border-color);
      background-color: #F8F9FA;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s ease-in-out;
    }
    .credit-adjust-btn:active {
      transform: scale(0.95);
      background-color: #CBD5E1;
    }
    .credit-adjust-btn.plus {
      background-color: #E6FFFA;
      border-color: #81E6D9;
      color: #234E52;
    }
    .credit-adjust-btn.minus {
      background-color: #FFF5F5;
      border-color: #FEB2B2;
      color: #742A2A;
    }
    .admin-inline-input {
      width: 60px;
      padding: 6px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
    }
    .btn-small-action {
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 800;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .btn-small-action:active {
      transform: scale(0.95);
      background-color: var(--primary-hover);
    }

    /* 미제공 간식 총합 보드 */
    .admin-summary-board {
      background-color: #FFFDF9;
      border: 3px solid var(--primary-color);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    
    .totals-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }
    
    .total-item-badge {
      background-color: #FFF3E0;
      border: 1.5px solid var(--primary-color);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-sm);
    }
    
    .total-item-badge .highlight {
      color: var(--primary-color);
      font-size: 20px;
      font-weight: 900;
    }
    
    /* 대기 중인 주문 그룹 레이아웃 */
    .pending-group-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 12px;
    }
    
    @media (min-width: 600px) {
      .pending-group-container {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    .user-order-card {
      background-color: var(--card-bg);
      border: 2.5px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease-in-out;
    }
    
    .user-order-card:hover {
      border-color: var(--primary-color);
      box-shadow: var(--shadow-md);
    }
    
    .user-profile-header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 10px;
    }
    
    .admin-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-color);
    }
    
    .admin-avatar-initial {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-weight: 800;
      user-select: none;
    }
    
    .user-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
    }
    
    .order-time-badge {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      margin-left: auto;
    }
    
    .user-order-items {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    
    .user-order-items li {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      justify-content: space-between;
    }
    
    .btn-complete-action {
      background-color: var(--secondary-color);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 800;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      box-shadow: var(--shadow-btn-sec);
      transition: all 0.15s ease-in-out;
      margin-top: auto;
    }
    
    .btn-complete-action:active {
      transform: scale(0.96);
      background-color: var(--secondary-hover);
    }
    
    .empty-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
      background-color: #F8F9FA;
      border-radius: var(--radius-sm);
      border: 2px dashed var(--border-color);
      grid-column: 1 / -1;
    }

    .btn-undo-action {
      background-color: #E2E8F0;
      color: var(--text-main);
      border: 1.5px solid #CBD5E1;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
      box-shadow: var(--shadow-sm);
    }
    
    .btn-undo-action:hover {
      background-color: #CBD5E1;
      border-color: #94A3B8;
    }
    
    .btn-undo-action:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="kiosk-container" style="height: auto; min-height: 100vh;">
    <!-- 관리자 헤더 -->
    <header class="kiosk-header admin-header">
      <div class="kiosk-header-top">
        <h1 style="font-size: 26px;">📊 오늘 주문 현황 (관리자)</h1>
        <button class="btn btn-primary" id="btn-manual-refresh" style="min-height: 48px; font-size: 16px; width: auto; padding: 0 16px; margin: 0;">
          🔄 지금 새로고침
        </button>
      </div>
      <!-- 자동 새로고침 바 -->
      <div class="refresh-indicator">
        <span id="refresh-text">자동 새로고침 대기 중 (30초)</span>
        <div style="flex: 1; margin-left: 12px;">
          <div class="refresh-bar-container">
            <div class="refresh-bar" id="timer-bar"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- 바디 -->
    <main class="kiosk-body">
      <!-- 상단 요약 카드 (총 매출 크레딧, 총 주문 건수) -->
      <div class="summary-grid" style="margin-bottom: 10px;">
        <div class="summary-card" style="border-left: 5px solid var(--primary-color);">
          <div class="summary-card-title">오늘 누적 사용 크레딧</div>
          <div class="summary-card-value" id="stat-total-points">0 크레딧</div>
        </div>
        <div class="summary-card" style="border-left: 5px solid var(--secondary-color);">
          <div class="summary-card-title">오늘 총 주문 건수</div>
          <div class="summary-card-value" id="stat-total-orders">0건</div>
        </div>
      </div>

      <!-- 탭 메뉴 -->
      <div class="admin-tabs">
        <button class="admin-tab-btn active" id="btn-tab-orders" onclick="switchTab('tab-orders')">📋 주문 처리 현황</button>
        <button class="admin-tab-btn" id="btn-tab-users" onclick="switchTab('tab-users')">🪙 이용자 크레딧 관리</button>
        <button class="admin-tab-btn" id="btn-tab-snacks" onclick="switchTab('tab-snacks')">🍪 간식 및 재고 관리</button>
      </div>

      <!-- Tab 1: 주문 처리 현황 -->
      <div id="tab-orders" class="admin-tab-content active">
        <!-- 양단 레이아웃 (PC에서는 2열, 모바일은 1열 종종배치) -->
        <div class="admin-layout">
          <!-- 메인: 주문 상세 및 대시보드 제어 -->
          <div class="admin-main">
            <!-- 미제공 간식 총량 집계 보드 -->
            <div class="admin-summary-board" id="admin-summary-board" style="display: none; margin-bottom: 20px;">
              <!-- JS 동적 생성 -->
            </div>

            <!-- 대기 중인 주문 카드 목록 -->
            <div style="margin-bottom: 25px;">
              <div class="admin-section-title" style="color: var(--primary-color); border-left-color: var(--primary-color);">⏳ 간식 챙겨주기 (제공 대기)</div>
              <div id="pending-orders-group" class="pending-group-container">
                <!-- JS 동적 생성 -->
              </div>
            </div>

            <!-- 제공 완료 목록 -->
            <div>
              <div class="admin-section-title" style="color: var(--secondary-hover); border-left-color: var(--secondary-color);">✅ 제공 완료 목록 (오늘)</div>
              <div class="table-responsive">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>주문 시간</th>
                      <th>이용자</th>
                      <th>간식명</th>
                      <th style="text-align: center;">수량</th>
                      <th style="text-align: right;">사용포인트</th>
                      <th style="text-align: center;">작업</th>
                    </tr>
                  </thead>
                  <tbody id="order-table-body">
                    <!-- JS 동적 생성 -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- 사이드: 집계 정보 -->
          <div class="admin-side">
            <!-- 1. 간식별 집계 -->
            <div>
              <div class="admin-section-title">간식별 집계 (인기순)</div>
              <div class="stat-list" id="snack-stats">
                <!-- JS 동적 생성 -->
              </div>
            </div>

            <!-- 2. 이용자별 집계 -->
            <div style="margin-top: 10px;">
              <div class="admin-section-title">이용자별 주문 건수</div>
              <div class="stat-list" id="user-stats">
                <!-- JS 동적 생성 -->
              </div>
            </div>

            <!-- 3. 현재 간식 재고 현황 -->
            <div style="margin-top: 20px;">
              <div class="admin-section-title">현재 간식 재고 현황</div>
              <div class="stat-list" id="snack-stock-list">
                <!-- JS 동적 생성 -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab 2: 이용자 크레딧 관리 -->
      <div id="tab-users" class="admin-tab-content">
        <div class="admin-section-title" style="color: var(--primary-color); border-left-color: var(--primary-color);">🪙 이용자 크레딧 관리</div>
        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
          <input type="text" id="search-user-input" placeholder="🔍 이용자 별명을 입력해 찾으세요..." class="search-input" style="flex: 1; padding: 12px; font-size: 18px; border-radius: var(--radius-sm); border: 2.5px solid var(--border-color); font-weight: 700;">
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th>이용자</th>
                <th>보유 크레딧</th>
                <th style="text-align: center;">빠른 조정</th>
                <th style="text-align: center;">직접 수정</th>
              </tr>
            </thead>
            <tbody id="user-management-body">
              <!-- JS 동적 생성 -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Tab 3: 간식 및 재고 관리 -->
      <div id="tab-snacks" class="admin-tab-content">
        <div class="admin-layout">
          <!-- 왼쪽: 간식 목록 및 재고 수정 -->
          <div class="admin-main">
            <div class="admin-section-title" style="color: var(--secondary-hover); border-left-color: var(--secondary-color);">🍪 간식 목록 및 재고 관리</div>
            <div class="table-responsive">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>간식명</th>
                    <th>가격</th>
                    <th style="text-align: center;">현재 재고</th>
                    <th style="text-align: center;">재고 조정</th>
                  </tr>
                </thead>
                <tbody id="snack-management-body">
                  <!-- JS 동적 생성 -->
                </tbody>
              </table>
            </div>
          </div>
          
          <!-- 오른쪽: 신규 간식 등록 -->
          <div class="admin-side">
            <div class="admin-section-title" style="color: var(--primary-color); border-left-color: var(--primary-color);">➕ 신규 간식 추가</div>
            <div class="user-order-card" style="gap: 16px;">
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">간식 이름</label>
                <input type="text" id="new-snack-name" placeholder="예: 초코쿠키" style="padding: 10px; font-size: 16px; border-radius: var(--radius-sm); border: 2px solid var(--border-color); font-weight: 700;">
              </div>
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">가격 (크레딧)</label>
                <input type="number" id="new-snack-point" min="1" value="1" style="padding: 10px; font-size: 16px; border-radius: var(--radius-sm); border: 2px solid var(--border-color); font-weight: 700;">
              </div>
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">이미지 주소 (구글 드라이브 또는 공백)</label>
                <input type="text" id="new-snack-image" placeholder="공유용 이미지 링크 (선택)" style="padding: 10px; font-size: 16px; border-radius: var(--radius-sm); border: 2px solid var(--border-color); font-weight: 700;">
              </div>
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">초기 입고 재고량</label>
                <input type="number" id="new-snack-stock" min="0" value="10" style="padding: 10px; font-size: 16px; border-radius: var(--radius-sm); border: 2px solid var(--border-color); font-weight: 700;">
              </div>
              <button class="btn btn-secondary" onclick="addNewSnackAction()" style="margin-top: 10px; width: 100%;">등록하기</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- 관리자 푸터 (키오스크 홈으로 바로가는 편리 버튼) -->
    <footer class="kiosk-footer">
      <button class="btn btn-gray" id="btn-goto-kiosk" style="min-height: 56px; font-size: 20px;">
        🛒 키오스크 화면으로 가기
      </button>
    </footer>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let refreshTimer = null;
    let refreshSeconds = 30;
    const MAX_REFRESH_TIME = 30;
    let currentOrders = [];
    let userImageMap = {};
    let previousPendingOrders = [];
    let currentUsers = [];
    let currentSnacks = [];
    let userSearchQuery = "";

    // 탭 전환 기능
    function switchTab(tabId) {
      const contents = document.querySelectorAll('.admin-tab-content');
      contents.forEach(c => c.classList.remove('active'));
      
      const buttons = document.querySelectorAll('.admin-tab-btn');
      buttons.forEach(b => b.classList.remove('active'));
      
      const targetTab = document.getElementById(tabId);
      if (targetTab) {
        targetTab.classList.add('active');
      }
      
      const targetBtn = document.getElementById(`btn-${tabId}`);
      if (targetBtn) {
        targetBtn.classList.add('active');
      }
      
      AppState.vibrate(40);
      AppState.playClickSound();
    }

    // 신규 주문 발생 시 띵동 알림음 재생 (Web Audio API 주파수 합성)
    function playNewOrderSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 첫 번째 음 (딩 - High A)
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
        gain1.gain.setValueAtTime(0, audioCtx.currentTime);
        gain1.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.05);
        gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
        
        osc1.start(audioCtx.currentTime);
        osc1.stop(audioCtx.currentTime + 0.6);
        
        // 두 번째 음 (동 - Low E)
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(659, audioCtx.currentTime + 0.22); // E5
        gain2.gain.setValueAtTime(0, audioCtx.currentTime + 0.22);
        gain2.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.27);
        gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
        
        osc2.start(audioCtx.currentTime + 0.22);
        osc2.stop(audioCtx.currentTime + 0.9);
      } catch (e) {
        console.warn("알림음 재생 실패:", e);
      }
    }

    // ISO 시간 -> HH:MM:SS 한글 포맷 변환
    function formatTime(isoString) {
      if (!isoString) return "-";
      try {
        const date = new Date(isoString);
        if (isNaN(date.getTime())) return isoString;
        
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const seconds = String(date.getSeconds()).padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
      } catch (e) {
        return isoString;
      }
    }

    // 주문 데이터 및 집계 로드
    async function loadAdminData() {
      // 새로고침 관련 상태 초기화
      resetRefreshTimer();

      const pendingContainer = document.getElementById('pending-orders-group');
      if (pendingContainer) {
        pendingContainer.innerHTML = '<div style="padding: 20px; text-align: center; font-weight: 700;">대기 목록 불러오는 중...</div>';
      }

      const tbody = document.getElementById('order-table-body');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px; font-weight: 700;">데이터를 불러오는 중...</td></tr>';

      const stockListEl = document.getElementById('snack-stock-list');
      if (stockListEl) {
        stockListEl.innerHTML = '<div style="padding: 10px; text-align: center; font-weight: 700;">불러오는 중...</div>';
      }

      try {
        const [ordersRes, snacksRes, usersRes] = await Promise.all([
          fetchAPI('getOrdersToday'),
          fetchAPI('getSnacks'),
          fetchAPI('getUsers')
        ]);
        
        // 1. 유저 이미지 매핑 데이터 생성
        userImageMap = {};
        if (usersRes && usersRes.success && Array.isArray(usersRes.users)) {
          currentUsers = usersRes.users;
          usersRes.users.forEach(u => {
            userImageMap[u.nickname] = u.imageUrl || '';
          });
          renderUsersManagement(currentUsers);
        }

        // 2. 주문 내역 데이터 처리
        if (ordersRes && ordersRes.success && Array.isArray(ordersRes.orders)) {
          currentOrders = ordersRes.orders;
          renderData(currentOrders);
        } else {
          throw new Error('주문 API 응답 결과가 올바르지 않습니다.');
        }

        // 3. 간식 재고 데이터 처리
        if (snacksRes && snacksRes.success && Array.isArray(snacksRes.snacks)) {
          currentSnacks = snacksRes.snacks;
          renderSnacksStock(currentSnacks);
          renderSnacksManagement(currentSnacks);
        } else {
          throw new Error('간식 API 응답 결과가 올바르지 않습니다.');
        }
      } catch (error) {
        console.error('관리자 데이터 조회 실패:', error);
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px; color: var(--danger-color); font-weight: 700;">
          데이터를 불러오지 못했습니다.<br>(${error.message || '인터넷 연결 끊김'})
        </td></tr>`;
        if (stockListEl) {
          stockListEl.innerHTML = `<div style="padding: 10px; text-align: center; color: var(--danger-color); font-weight: 700;">불러오기 실패</div>`;
        }
      }
    }

    // 현재 간식 재고 목록 렌더링
    function renderSnacksStock(snacks) {

      if (!stockListEl) return;
      
      stockListEl.innerHTML = '';
      
      if (snacks.length === 0) {
        stockListEl.innerHTML = '<div class="empty-state">등록된 간식이 없습니다.</div>';
        return;
      }
      
      snacks.forEach(snack => {
        const item = document.createElement('div');
        item.className = 'stat-item';
        
        const isSoldOut = snack.stock === 0;

        const valColor = isSoldOut ? 'var(--danger-color)' : 'var(--secondary-hover)';
        const fontWeight = isSoldOut ? '800' : '700';

        item.innerHTML = `
          <span class="stat-item-name">${snack.name}</span>
          <span class="stat-item-val" style="color: ${valColor}; font-weight: ${fontWeight};">${stockText}</span>
        `;
        stockListEl.appendChild(item);
      });
    }

    // --- 이용자 크레딧 관리 구현 ---

      if (!tbody) return;
      
      tbody.innerHTML = '';
      
      const filteredUsers = users.filter(u => {
        if (!userSearchQuery) return true;
        return u.nickname.toLowerCase().includes(userSearchQuery.toLowerCase());
      });
      
      if (filteredUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">해당하는 이용자가 없습니다.</td></tr>';
        return;
      }
      
      filteredUsers.forEach(user => {
        const tr = document.createElement('tr');
        
        const colors = ['#FF9F1C', '#2EC4B6', '#118AB2', '#FF5A5F', '#8338EC', '#3A86C8'];
        const colorIndex = Math.abs(user.nickname.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0)) % colors.length;
        const avatarBgColor = colors[colorIndex];
        
        const rawImgUrl = user.imageUrl || '';
        const imgUrl = rawImgUrl ? AppState.convertDriveImageUrl(rawImgUrl) : '';
        const avatarHtml = imgUrl 
          ? `<img src="${imgUrl}" class="admin-avatar" style="width: 36px; height: 36px;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="admin-avatar-initial" style="background-color: ${avatarBgColor}; display: none; width: 36px; height: 36px; font-size: 16px;">${user.nickname.charAt(0)}</div>`
          : `<div class="admin-avatar-initial" style="background-color: ${avatarBgColor}; width: 36px; height: 36px; font-size: 16px;">${user.nickname.charAt(0)}</div>`;

        tr.innerHTML = `
          <td>
            <div style="display: flex; align-items: center; gap: 10px;">
              ${avatarHtml}
              <strong>${user.nickname} 님</strong>

          </td>
          <td style="font-weight: 800; font-size: 18px; color: var(--primary-color);">${user.credit} 크레딧</td>
          <td style="text-align: center;">

              <button class="credit-adjust-btn minus" onclick="quickAdjustCredit('${user.userId}', -5)">-5</button>
              <button class="credit-adjust-btn minus" onclick="quickAdjustCredit('${user.userId}', -1)">-1</button>
              <button class="credit-adjust-btn plus" onclick="quickAdjustCredit('${user.userId}', 1)">+1</button>

            </div>

        tbody.appendChild(tr);
      });

    async function quickAdjustCredit(userId, change) {
      const user = currentUsers.find(u => u.userId === userId);
      if (!user) return;
      const newCredit = Math.max(0, Number(user.credit) + change);
      await updateUserCreditAction(userId, newCredit);
    }

    async function manualAdjustCredit(userId) {
      const input = document.getElementById(`input-credit-${userId}`);
      if (!input) return;
      const newCredit = Math.max(0, Number(input.value || 0));
      await updateUserCreditAction(userId, newCredit);
    }

    // 데이터 렌더링 및 집계 계산
    function renderData(rawOrders) {
      // 각 주문마다 고유 식별자가 없을 경우 생성 (timestamp와 nickname을 조합하여 같은 주문건으로 묶이게 함)
      const orders = rawOrders.map((o, idx) => ({
        ...o,
        orderNo: o.orderNo || `${o.timestamp || idx}_${o.nickname || 'unknown'}`
      }));

      // 1. 제공 완료 여부에 따른 목록 분리 (DB에서 받아온 servedYn 값 사용)
      const pendingOrders = orders.filter(o => o.servedYn !== 'Y');
      const completedOrders = orders.filter(o => o.servedYn === 'Y');

      // 신규 주문 알림 접수 감지 및 재생
      if (previousPendingOrders && previousPendingOrders.length > 0) {
        const prevKeys = previousPendingOrders.map(o => o.orderNo);
        const hasNewPending = pendingOrders.some(o => !prevKeys.includes(o.orderNo));
        if (hasNewPending) {
          playNewOrderSound();
        }
      }
      previousPendingOrders = pendingOrders;

      // 2. 미제공 간식 총합 계산 및 렌더링
      const snackTotals = {};
      pendingOrders.forEach(order => {
        const name = order.snackName;
        const qty = Number(order.quantity || 1);
        snackTotals[name] = (snackTotals[name] || 0) + qty;
      });

      const board = document.getElementById('admin-summary-board');
      const entries = Object.entries(snackTotals);
      
      if (entries.length > 0) {
        board.style.display = 'block';
        board.innerHTML = `
          <div class="admin-section-title" style="margin-top: 0; color: var(--primary-hover); border-left-color: var(--primary-hover);">📋 지금 꺼내올 간식 (미제공 총수량)</div>
          <div class="totals-grid">
            ${entries.map(([name, qty]) => `<div class="total-item-badge"><strong>${name}</strong> <span class="highlight">${qty}개</span></div>`).join('')}
          </div>
        `;
      } else {
        board.style.display = 'none';
        board.innerHTML = '';
      }

      // 3. 대기 중인 주문 리스트 카드형 렌더링 (주문번호 기준 선입선출 큐)
      const pendingContainer = document.getElementById('pending-orders-group');
      pendingContainer.innerHTML = '';

      if (pendingOrders.length === 0) {
        pendingContainer.innerHTML = '<div class="empty-text">대기 중인 이용자가 없습니다. ⏳</div>';
      } else {
        const ordersByNo = {};
        pendingOrders.forEach(order => {
          if (!ordersByNo[order.orderNo]) {
            ordersByNo[order.orderNo] = {
              nickname: order.nickname,
              timestamp: order.timestamp,
              orderNo: order.orderNo,
              items: []
            };
          }
          ordersByNo[order.orderNo].items.push(order);
        });

        // 주문 시간 순 정렬 (오래된 대기가 가장 위에 오는 선입선출 정렬)
        const sortedOrderGroups = Object.values(ordersByNo).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        sortedOrderGroups.forEach(group => {
          const nickname = group.nickname;
          const rawImgUrl = userImageMap[nickname] || '';
          const imgUrl = rawImgUrl ? AppState.convertDriveImageUrl(rawImgUrl) : '';
          
          const colors = ['#FF9F1C', '#2EC4B6', '#118AB2', '#FF5A5F', '#8338EC', '#3A86C8'];
          const colorIndex = Math.abs(nickname.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0)) % colors.length;
          const avatarBgColor = colors[colorIndex];

          const avatarHtml = imgUrl 
            ? `<img src="${imgUrl}" class="admin-avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="admin-avatar-initial" style="background-color: ${avatarBgColor}; display: none;">${nickname.charAt(0)}</div>`
            : `<div class="admin-avatar-initial" style="background-color: ${avatarBgColor};">${nickname.charAt(0)}</div>`;

          const itemsListHtml = group.items.map(item => `
            <li>
              <span>${item.snackName}</span>
              <span><strong>${item.quantity}개</strong></span>
            </li>
          `).join('');

          const card = document.createElement('div');
          card.className = 'user-order-card';
          card.innerHTML = `
            <div class="user-profile-header">
              ${avatarHtml}
              <span class="user-name">${nickname} 님</span>
              <span class="order-time-badge">${formatTime(group.timestamp)}</span>
            </div>
            <ul class="user-order-items">
              ${itemsListHtml}
            </ul>
            <button class="btn-complete-action" onclick="completeOrder('${group.orderNo}')">제공 완료</button>
          `;
          pendingContainer.appendChild(card);
        });
      }

      // 4. 완료된 주문 내역 테이블 렌더링
      const tbody = document.getElementById('order-table-body');
      tbody.innerHTML = '';

      if (completedOrders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">오늘 완료된 주문이 없습니다.</td></tr>';
      } else {
        // 최신 완료 주문이 가장 위에 보이도록 정렬
        const sortedCompleted = [...completedOrders].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        sortedCompleted.forEach(order => {
          const pointVal = order.point || 0;
          const qtyVal = order.quantity || 0;

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><strong>${formatTime(order.timestamp)}</strong></td>
            <td>${order.nickname}</td>
            <td>${order.snackName}</td>
            <td style="text-align: center; font-weight: 800;">${qtyVal}개</td>
            <td style="text-align: right; font-weight: 800; color: var(--primary-color);">${AppState.formatPoint(pointVal)}</td>
            <td style="text-align: center;">
              <button class="btn-undo-action" onclick="undoCompleteOrder('${order.orderNo}')">되돌리기</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      // 5. 오늘 누적 집계 계산 (전체 주문 기준)
      let totalPoints = 0;
      const snackAggregates = {}; // { snackName: totalQuantity }
      const userAggregates = {}; // { nickname: orderCount }

      orders.forEach(order => {
        const pointVal = order.point || 0;
        const qtyVal = order.quantity || 0;
        
        totalPoints += pointVal;

        if (order.snackName) {
          snackAggregates[order.snackName] = (snackAggregates[order.snackName] || 0) + qtyVal;
        }

        if (order.nickname) {
          userAggregates[order.nickname] = (userAggregates[order.nickname] || 0) + 1;
        }
      });

      document.getElementById('stat-total-points').textContent = AppState.formatPoint(totalPoints);
      document.getElementById('stat-total-orders').textContent = `${orders.length}건`;

      // 6. 간식 집계 렌더링
      const snackStatsEl = document.getElementById('snack-stats');
      snackStatsEl.innerHTML = '';
      const sortedSnacks = Object.entries(snackAggregates).sort((a, b) => b[1] - a[1]);
      sortedSnacks.forEach(([name, count]) => {
        const item = document.createElement('div');
        item.className = 'stat-item';
        item.innerHTML = `
          <span class="stat-item-name">${name}</span>
          <span class="stat-item-val">${count}개</span>
        `;
        snackStatsEl.appendChild(item);
      });

      // 7. 이용자 집계 렌더링
      const userStatsEl = document.getElementById('user-stats');
      userStatsEl.innerHTML = '';
      const sortedUsers = Object.entries(userAggregates).sort((a, b) => b[1] - a[1]);
      sortedUsers.forEach(([name, count]) => {
        const item = document.createElement('div');
        item.className = 'stat-item';
        item.innerHTML = `
          <span class="stat-item-name">${name} 님</span>
          <span class="stat-item-val" style="color: var(--secondary-hover);">${count}건</span>
        `;
        userStatsEl.appendChild(item);
      });
    }

    // 타이머 처리 (30초 -> 0초)
    function startRefreshTimer() {
      const timerBar = document.getElementById('timer-bar');
      const refreshText = document.getElementById('refresh-text');
      
      refreshTimer = setInterval(() => {
        refreshSeconds--;
        
        // 텍스트 및 프로그레스바 갱신
        refreshText.textContent = `자동 새로고침 대기 중 (${refreshSeconds}초)`;
        const percentage = ((MAX_REFRESH_TIME - refreshSeconds) / MAX_REFRESH_TIME) * 100;
        timerBar.style.width = `${percentage}%`;

        if (refreshSeconds <= 0) {
          loadAdminData();
        }
      }, 1000);
    }

    function resetRefreshTimer() {
      clearInterval(refreshTimer);
      refreshSeconds = MAX_REFRESH_TIME;
      
      const timerBar = document.getElementById('timer-bar');
      const refreshText = document.getElementById('refresh-text');
      if (timerBar) timerBar.style.width = '0%';
      if (refreshText) refreshText.textContent = `자동 새로고침 대기 중 (${MAX_REFRESH_TIME}초)`;
      
      startRefreshTimer();
    }

    // 초기 이벤트 설정
    window.addEventListener('DOMContentLoaded', () => {
      loadAdminData();

      // 수동 새로고침 버튼
      document.getElementById('btn-manual-refresh').addEventListener('click', () => {
        loadAdminData();
        AppState.vibrate(50);
      });

      // 키오스크 모드로 돌아가기
      document.getElementById('btn-goto-kiosk').addEventListener('click', () => {
        clearInterval(refreshTimer);
        window.location.href = 'index.html';
      });

      // 이용자 검색 바인딩
      const searchInput = document.getElementById('search-user-input');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          userSearchQuery = e.target.value;
          renderUsersManagement(currentUsers);
        });
      }
    });
  </script>
</body>
</html>
