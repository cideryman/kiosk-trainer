<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>배달왔삼 - 오늘 주문 빌지 인쇄</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 기본 인쇄 스타일 */
    @page {
      size: A4;
      margin: 0; /* 인쇄 마진 제거 (CSS 패딩으로 제어) */
    }
    
    body {
      display: block !important;
      background-color: #E2E8F0;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .action-bar {
      max-width: 210mm;
      margin: 0 auto 20px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 15px 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn-print {
      background-color: var(--primary-color, #ED8936);
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 18px;
      font-weight: 800;
      border-radius: 6px;
      cursor: pointer;
    }

    .print-container {
      max-width: 210mm; /* A4 폭에 맞춤 */
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10mm 15mm; /* 행 간격, 열 간격 */
      background: transparent;
      padding: 10mm; /* 일반 화면 프리뷰 시 마진 */
      box-sizing: border-box;
    }

    /* 빌지 카드 */
    .bill-card {
      background: white;
      border: 2px dashed #9ca3af; /* 자르기 쉬운 점선 */
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      page-break-inside: avoid; /* 카드 중간에 잘리지 않도록 */
      height: 100%;
    }

    /* 상단 브랜드 헤더 (guest.html 느낌) */
    .bill-header {
      padding: 15px 10px;
      border-bottom: 2px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background-color: #ffffff;
    }
    
    .brand-title-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 24px;
      font-weight: 850;
      color: #2b2d42; /* secondary-hover 대체 */
    }

    .brand-title-wrap img {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      object-fit: contain;
    }

    .brand-title-wrap span.accent {
      color: var(--primary-color, #ED8936);
    }

    .brand-desc {
      font-size: 13px;
      font-weight: 700;
      color: #6c757d;
      text-align: center;
    }

    /* 카드 본문 */
    .bill-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.3;
    }

    .info-label {
      font-weight: 800;
      color: #6b7280;
      width: 75px;
      flex-shrink: 0;
    }

    .info-value {
      font-weight: 800;
      color: #111827;
      text-align: right;
      word-break: break-all;
    }

    /* 메뉴 영역 */
    .menu-box {
      margin: 8px 0;
      padding: 12px;
      background-color: #f8f9fa;
      border: 2px solid #e5e7eb;
      border-radius: 6px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 900;
      color: #1f2937;
      margin-bottom: 6px;
    }

    .menu-item:last-child {
      margin-bottom: 0;
    }

    /* 하단 고정 영역 */
    .bill-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .delivery-person {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #4b5563;
    }

    .delivery-person-line {
      flex: 1;
      border-bottom: 1px solid #9ca3af;
      height: 16px;
    }

    .checklist {
      display: flex;
      justify-content: space-between;
      border-top: 2px dashed #e5e7eb;
      padding-top: 12px;
      font-size: 14px;
      font-weight: 800;
      color: #111827;
    }

    .status-badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 800;
      color: white;
    }

    /* 라벨지 화면/인쇄 공통 숨김 처리 */
    body.label-mode .bill-header,
    body.label-mode .bill-footer,
    body.label-mode .row-credit,
    body.label-mode .row-status {
      display: none !important;
    }

    /* 라벨 모드 화면(Screen) 스타일 */
    body.label-mode .print-container {
      max-width: 210mm;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 화면에서는 3열 그리드 */
      gap: 10px; /* 화면 프리뷰 카드 간격 */
      padding: 20px;
    }

    body.label-mode .bill-card {
      aspect-ratio: 63.5 / 38.1; /* 라벨 비율 유지 */
      border: 1px dashed #9ca3af;
      background: white;
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
      height: auto;
      min-height: unset;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }

    body.label-mode .bill-body {
      padding: 0;
      gap: 2px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    body.label-mode .info-row {
      font-size: 11px;
      line-height: 1.1;
    }

    body.label-mode .info-label {
      width: auto;
      font-size: 10px;
      color: #718096;
    }

    body.label-mode .info-value {
      font-size: 11px;
      font-weight: 800;
    }

    body.label-mode .row-order-no .info-value {
      font-size: 13px; /* 주문번호는 식별이 중요하므로 조금 큼 */
      color: #2d3748;
    }

    body.label-mode .menu-box {
      margin: 2px 0;
      padding: 4px 6px;
      background-color: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    body.label-mode .menu-item {
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 2px;
      line-height: 1.2;
    }

    body.label-mode .menu-item:last-child {
      margin-bottom: 0;
    }

    @media print {
      body {
        display: block !important;
        background-color: white;
        padding: 0;
      }
      .no-print {
        display: none !important;
      }
      
      /* 일반 모드 인쇄 시 10mm 패딩 가상 여백 부여 */
      body:not(.label-mode) .print-container {
        padding: 10mm !important;
        gap: 5mm !important;
      }
      body:not(.label-mode) .bill-card {
        border-color: #666; /* 흑백 인쇄 시 더 잘 보이게 */
      }
      body:not(.label-mode) .menu-box {
        border-color: #ccc;
      }

      /* 라벨지 인쇄 전용 스타일 */
      body.label-mode {
        background-color: white !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      body.label-mode .checklist-print-section {
        display: none !important;
      }

      body.label-mode .print-container {
        width: 210mm !important;
        height: 297mm !important;
        padding-top: 15.1mm !important; /* 상단 여백 15.1mm */
        padding-bottom: 15.1mm !important; /* 하단 여백 15.1mm */
        padding-left: 6.4mm !important; /* 좌측 여백 6.4mm */
        padding-right: 6.4mm !important; /* 우측 여백 6.4mm */
        display: grid !important;
        grid-template-columns: repeat(3, 63.5mm) !important;
        grid-auto-rows: 38.1mm !important;
        gap: 0 !important; /* 칼선 사이 간격 없음 */
        box-sizing: border-box !important;
        margin: 0 !important;
      }

      body.label-mode .bill-card {
        width: 63.5mm !important;
        height: 38.1mm !important;
        border: 1px dashed #ddd !important; /* 뜯는 선/칼선 대조용 옅은 가이드선 */
        border-radius: 0 !important;
        padding: 2mm 3mm !important; /* 라벨 내부 정밀 여백 */
        box-sizing: border-box !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-between !important;
        overflow: hidden !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        background: white !important;
      }

      /* 2열 및 3열 카드 우측 1mm 평행 이동 보정 (인쇄 칼선 정렬 보정) */
      body.label-mode .bill-card:nth-child(3n-1) {
        transform: translateX(1mm) !important;
      }
      body.label-mode .bill-card:nth-child(3n) {
        transform: translateX(1mm) !important;
      }

      body.label-mode .bill-body {
        padding: 0 !important;
        gap: 1px !important;
        height: 100% !important;
      }

      body.label-mode .info-row {
        font-size: 10px !important;
        line-height: 1.1 !important;
      }

      body.label-mode .info-label {
        font-size: 9px !important;
      }

      body.label-mode .info-value {
        font-size: 10px !important;
      }

      body.label-mode .row-order-no .info-value {
        font-size: 12px !important;
      }

      body.label-mode .menu-box {
        margin: 1px 0 !important;
        padding: 2px 4px !important;
        border-width: 1px !important;
      }

      body.label-mode .menu-item {
        font-size: 10px !important;
        margin-bottom: 1px !important;
      }
    }

    /* 배송지별 배달 체크리스트 스타일 */
    .checklist-print-section {
      max-width: 210mm;
      margin: 30px auto 0 auto;
      background: white;
      border: 3.5px solid #4b5563;
      border-radius: 8px;
      padding: 24px;
      box-sizing: border-box;
      page-break-before: always; /* 인쇄 시 항상 새 페이지 시작 */
      break-before: page;
    }

    @media screen {
      .checklist-print-section {
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
    }

    .checklist-title {
      font-size: 24px;
      font-weight: 900;
      color: #1f2937;
      border-bottom: 3.5px solid #1f2937;
      padding-bottom: 12px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .place-group {
      margin-bottom: 24px;
    }

    .place-group:last-child {
      margin-bottom: 0;
    }

    .place-name-header {
      font-size: 18px;
      font-weight: 850;
      color: #e53e3e;
      background-color: #fff5f5;
      padding: 10px 16px;
      border: 2px solid #feb2b2;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .checklist-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }

    .checklist-table th, .checklist-table td {
      border: 1.5px solid #cbd5e1;
      padding: 10px 12px;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
    }

    .checklist-table th {
      background-color: #f1f5f9;
      color: #475569;
      font-weight: 850;
    }

    .checklist-chbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    /* 라벨지 재활용 미니 그리드 선택기 스타일 */
    .label-mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 12px);
      grid-template-rows: repeat(7, 10px);
      gap: 2px;
      border: 2px solid #cbd5e1;
      padding: 3px;
      border-radius: 4px;
      background: #f8fafc;
      cursor: pointer;
      user-select: none;
    }
    
    .label-mini-cell {
      background-color: #a0aec0;
      border-radius: 1.5px;
      transition: background-color 0.15s, transform 0.1s;
    }

    .label-mini-cell:hover {
      background-color: #718096;
      transform: scale(1.1);
    }

    /* 선택된 시작점 */
    .label-mini-cell.selected {
      background-color: #ED8936 !important;
      box-shadow: 0 0 2px rgba(237, 137, 54, 0.8);
    }

    /* 인쇄 스킵할 이미 쓰여진 칸 */
    .label-mini-cell.skipped {
      background-color: #e2e8f0;
      border: 1px dashed #cbd5e1;
      box-sizing: border-box;
      opacity: 0.6;
    }

    /* 인쇄 시 여백/칼선 밀림 밀어내기용 빈 카드 */
    body.label-mode .bill-card.blank-card {
      border: none !important;
      background: transparent !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
      page-break-inside: avoid !important;
      break-inside: avoid !important;
    }
  </style>
</head>
<body>

  <div class="action-bar no-print">
    <div style="font-size: 20px; font-weight: 850; color: #2d3748;">🖨️ 오늘 주문 빌지 인쇄</div>
    <div style="font-size: 14px; color: #718096; margin-right: auto; margin-left: 16px;">
      취소된 주문은 제외됩니다. A4 용지 인쇄에 최적화되어 있습니다.
    </div>
    <div style="margin-right: 16px; display: flex; align-items: center; gap: 16px;">
      <!-- 제공 완료 제외 토글 -->
      <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 800; color: #4a5568; cursor: pointer; user-select: none;">
        <input type="checkbox" id="exclude-served-check" checked style="width: 18px; height: 18px; cursor: pointer;">
        제공 완료 제외
      </label>

      <!-- 배달 주문 포함 토글 -->
      <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 800; color: #4a5568; cursor: pointer; user-select: none;">
        <input type="checkbox" id="include-delivery-check" checked style="width: 18px; height: 18px; cursor: pointer;">
        배달 주문 포함
      </label>

      <!-- 포장 주문 포함 토글 -->
      <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 800; color: #4a5568; cursor: pointer; user-select: none;">
        <input type="checkbox" id="include-takeout-check" checked style="width: 18px; height: 18px; cursor: pointer;">
        포장 주문 포함
      </label>

      <!-- 인쇄 형식 -->
      <div style="display: flex; align-items: center; gap: 8px;">
        <label for="print-mode-select" style="font-size: 14px; font-weight: 800; color: #4a5568;">인쇄 형식:</label>
        <select id="print-mode-select" style="padding: 8px 12px; font-size: 14px; font-weight: 700; border-radius: 6px; border: 2px solid #cbd5e1; outline: none; cursor: pointer; background: white;">
          <option value="normal">일반 빌지 (A4 2열)</option>
          <option value="label">애니라벨 V3050 (3열 7행)</option>
        </select>
      </div>

      <!-- 라벨지 시작 위치 비주얼 선택기 (JS에서 토글) -->
      <div id="label-start-selector-wrap" style="display: none; align-items: center; gap: 8px;">
        <span style="font-size: 14px; font-weight: 800; color: #4a5568;">시작 위치:</span>
        <div id="label-mini-grid" class="label-mini-grid" title="라벨 인쇄를 시작할 칸을 선택하세요"></div>
        <span id="label-start-display" style="font-size: 12px; font-weight: 800; color: #ED8936; min-width: 60px;">(1행 1열)</span>
      </div>
    </div>
    <button class="btn-print" onclick="window.print()">인쇄하기</button>
  </div>

  <div class="print-container" id="bills-container">
    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 18px; font-weight: 700; color: #718096;">
      주문 데이터를 불러오는 중...
    </div>
  </div>

  <!-- 배송지별 배달 체크리스트 컨테이너 -->
  <div id="delivery-checklist-container" class="checklist-print-section" style="display: none;"></div>

  <!-- 포장 주문 체크리스트 컨테이너 -->
  <div id="takeout-checklist-container" class="checklist-print-section" style="display: none;"></div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    // ISO 시간 -> HH:MM 형식 변환
    function formatSimpleTime(isoString) {
      if (!isoString) return "-";
      try {
        const date = new Date(isoString);
        if (isNaN(date.getTime())) return isoString;
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${hours}:${minutes}`;
      } catch (e) {
        return isoString;
      }
    }

    function getStatusLabel(status) {
      if (status === 'C') return '취소됨';
      if (status === 'Y') return '제공완료';
      if (status === 'R') return '준비완료';
      if (status === 'P') return '준비중';
      return '접수중';
    }

    function getStatusColor(status) {
      if (status === 'C') return '#ef4444'; // red
      if (status === 'Y') return '#10b981'; // green
      if (status === 'R') return '#059669'; // dark green
      if (status === 'P') return '#f59e0b'; // orange
      return '#3b82f6'; // blue
    }

    let allValidOrders = [];
    let startRow = 1;
    let startCol = 1;

    // 미니 그리드 초기화 및 인스턴스화
    function initMiniGrid() {
      const miniGrid = document.getElementById('label-mini-grid');
      if (!miniGrid) return;
      miniGrid.innerHTML = '';

      const savedRow = Number(localStorage.getItem('print-label-start-row') || '1');
      const savedCol = Number(localStorage.getItem('print-label-start-col') || '1');
      startRow = savedRow;
      startCol = savedCol;

      const selectedIndex = (startRow - 1) * 3 + (startCol - 1);

      for (let i = 0; i < 21; i++) {
        const cell = document.createElement('div');
        cell.className = 'label-mini-cell';
        cell.dataset.index = i;

        if (i < selectedIndex) {
          cell.classList.add('skipped');
        } else if (i === selectedIndex) {
          cell.classList.add('selected');
        }

        cell.addEventListener('click', (e) => {
          const idx = Number(e.currentTarget.dataset.index);
          const r = Math.floor(idx / 3) + 1;
          const c = (idx % 3) + 1;
          
          startRow = r;
          startCol = c;
          localStorage.setItem('print-label-start-row', String(r));
          localStorage.setItem('print-label-start-col', String(c));
          
          updateMiniGridUI();
          renderBills();
        });

        miniGrid.appendChild(cell);
      }

      updateDisplayLabel();
    }

    function updateMiniGridUI() {
      const cells = document.querySelectorAll('#label-mini-grid .label-mini-cell');
      const selectedIndex = (startRow - 1) * 3 + (startCol - 1);

      cells.forEach((cell, i) => {
        cell.classList.remove('selected', 'skipped');
        if (i < selectedIndex) {
          cell.classList.add('skipped');
        } else if (i === selectedIndex) {
          cell.classList.add('selected');
        }
      });

      updateDisplayLabel();
    }

    function updateDisplayLabel() {
      const display = document.getElementById('label-start-display');
      if (display) {
        display.textContent = `(${startRow}행 ${startCol}열)`;
      }
    }

    async function loadBills() {
      const container = document.getElementById('bills-container');
      try {
        const res = await fetchAPI('getOrdersToday');
        
        if (res && res.success && Array.isArray(res.orders)) {
          // 취소된 주문 제외
          allValidOrders = res.orders.filter(o => o.servedYn !== 'C');

          if (allValidOrders.length === 0) {
            container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 18px; font-weight: 700;">오늘 처리할 주문이 없습니다.</div>';
            return;
          }

          renderBills();
        } else {
          container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 18px; font-weight: 700; color: #e53e3e;">주문 데이터를 불러오지 못했습니다.</div>';
        }
      } catch (err) {
        console.error('빌지 로드 에러:', err);
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 18px; font-weight: 700; color: #e53e3e;">오류가 발생했습니다. 관리자에게 문의하세요.</div>';
      }
    }

    function renderBills() {
      const container = document.getElementById('bills-container');
      if (!container) return;
      container.innerHTML = '';

      const mode = document.getElementById('print-mode-select')?.value || 'normal';
      const excludeServed = document.getElementById('exclude-served-check')?.checked;

      // 1. 제공 완료 필터링 적용
      let filteredOrders = allValidOrders;
      if (excludeServed) {
        filteredOrders = allValidOrders.filter(o => o.servedYn !== 'Y');
      }

      if (filteredOrders.length === 0) {
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 18px; font-weight: 700;">출력할 주문이 없습니다.</div>';
        const checklistContainer = document.getElementById('checklist-container');
        if (checklistContainer) checklistContainer.style.display = 'none';
        return;
      }

      if (mode === 'label') {
        // 2. 오프셋 카드 삽입 (첫 장의 빈칸 생성)
        const offset = (startRow - 1) * 3 + (startCol - 1);
        for (let oIdx = 0; oIdx < offset; oIdx++) {
          const blankCard = document.createElement('div');
          blankCard.className = 'bill-card blank-card';
          container.appendChild(blankCard);
        }

        // 3. 주문번호별로 총 상품 수량(quantity 합)을 원본(allValidOrders) 기준으로 계산
        const totalQtyByOrder = {};
        allValidOrders.forEach(o => {
          const orderNo = o.orderNo || 'unknown';
          const qty = Number(o.quantity || 1);
          totalQtyByOrder[orderNo] = (totalQtyByOrder[orderNo] || 0) + qty;
        });

        // 4. 원래 주문 기준 개별 항목의 순번 오프셋 사전 매핑 (필터링 제외 항목 고려)
        const originalOrderCounters = {};
        const originalOrderTracker = {};
        allValidOrders.forEach(o => {
          const orderNo = o.orderNo || 'unknown';
          if (!originalOrderTracker[orderNo]) {
            originalOrderTracker[orderNo] = 0;
          }
          const startNum = originalOrderTracker[orderNo] + 1;
          const qty = Number(o.quantity || 1);
          originalOrderTracker[orderNo] += qty;

          if (!originalOrderCounters[orderNo]) {
            originalOrderCounters[orderNo] = [];
          }
          originalOrderCounters[orderNo].push({
            snackName: o.snackName,
            startNum: startNum,
            quantity: qty
          });
        });

        // 5. 필터링된 주문들을 주문번호(orderNo)로 그룹화하여 시간순 정렬
        const ordersByNo = {};
        filteredOrders.forEach((o, idx) => {
          const orderNo = o.orderNo || `${o.timestamp || idx}_${o.nickname || 'unknown'}`;
          if (!ordersByNo[orderNo]) {
            ordersByNo[orderNo] = {
              orderNo: orderNo,
              nickname: o.nickname,
              timestamp: o.timestamp,
              servedYn: o.servedYn || 'N',
              deliveryType: o.deliveryType || 'pickup',
              deliveryPlace: o.deliveryPlace || '',
              deliveryFee: Number(o.deliveryFee || 0),
              authProvider: o.authProvider || '',
              items: []
            };
          }
          ordersByNo[orderNo].items.push(o);
        });

        const sortedGroups = Object.values(ordersByNo).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        sortedGroups.forEach(group => {
          const isKakao = group.authProvider === 'kakao';
          let displayNickname = group.nickname || '';
          if (isKakao) {
            displayNickname = '💬 ' + displayNickname.replace(/ \((체험|비회원)\)/g, '').trim();
          }

          const parts = String(group.orderNo).split('-');
          const shortOrderNo = parts.length >= 3 ? parts[2] : group.orderNo;
          const isDelivery = group.deliveryType === 'delivery';
          const deliveryTypeStr = isDelivery ? '배달' : '포장';

          const totalQty = totalQtyByOrder[group.orderNo] || 0;

          // 각 품목별 수량만큼 개별 라벨 카드 출력
          group.items.forEach(item => {
            const mapping = (originalOrderCounters[group.orderNo] || []).find(m => m.snackName === item.snackName);
            const baseStartNum = mapping ? mapping.startNum : 1;

            const qty = Number(item.quantity || 1);
            for (let i = 0; i < qty; i++) {
              const currentNum = baseStartNum + i;

              const displaySnackName = `${AppState.escapeHtml(item.snackName)} (${currentNum}/${totalQty})`;

              const card = document.createElement('div');
              card.className = 'bill-card';
              
              card.innerHTML = `
                <div class="bill-header">
                  <div class="brand-title-wrap">
                    <img src="icons/guest-192.png" alt="logo" onerror="this.style.display='none'"> 
                    <span>배달왔<span class="accent">삼</span></span>
                  </div>
                  <div class="brand-desc">삼각지 카페 배달 서비스</div>
                </div>

                <div class="bill-body">
                  <div class="info-row row-order-no">
                    <span class="info-label">주문번호</span>
                    <span class="info-value" style="font-size: 16px;">[${AppState.escapeHtml(shortOrderNo)}]</span>
                  </div>
                  <div class="info-row row-nickname">
                    <span class="info-label">주문자</span>
                    <span class="info-value">${AppState.escapeHtml(displayNickname)} 님</span>
                  </div>
                  <div class="info-row row-time">
                    <span class="info-label">주문시간</span>
                    <span class="info-value">${formatSimpleTime(group.timestamp)}</span>
                  </div>

                  <div class="menu-box">
                    <div class="menu-item">
                      <span>${displaySnackName}</span>
                      <span>1개</span>
                    </div>
                  </div>

                  <div class="info-row row-delivery-type">
                    <span class="info-label">수령방식</span>
                    <span class="info-value">${deliveryTypeStr}</span>
                  </div>
                  ${isDelivery && group.deliveryPlace ? `
                  <div class="info-row row-delivery-place" style="color: #e53e3e;">
                    <span class="info-label" style="color: #e53e3e;">배송지</span>
                    <span class="info-value">${AppState.escapeHtml(group.deliveryPlace)}</span>
                  </div>
                  ` : ''}
                  <div class="info-row row-credit" style="display: none;">
                    <span class="info-label">차감온기</span>
                    <span class="info-value">-</span>
                  </div>
                  <div class="info-row row-status" style="display: none;">
                    <span class="info-label">주문상태</span>
                    <span class="info-value">-</span>
                  </div>

                  <div class="bill-footer">
                    <div class="delivery-person">
                      <span>배달담당:</span>
                      <div class="delivery-person-line"></div>
                    </div>
                    <div class="checklist">
                      <span>□ 주문확인</span>
                      <span>□ 준비완료</span>
                      <span>□ 전달완료</span>
                    </div>
                  </div>
                </div>
              `;
              container.appendChild(card);
            }
          });
        });

        renderChecklists(sortedGroups);

      } else {
        // 일반 빌지 모드: 주문번호(orderNo)로 그룹화하여 1건의 주문당 1개의 빌지 생성
        const ordersByNo = {};
        filteredOrders.forEach((o, idx) => {
          const orderNo = o.orderNo || `${o.timestamp || idx}_${o.nickname || 'unknown'}`;
          if (!ordersByNo[orderNo]) {
            ordersByNo[orderNo] = {
              orderNo: orderNo,
              nickname: o.nickname,
              timestamp: o.timestamp,
              servedYn: o.servedYn || 'N',
              deliveryType: o.deliveryType || 'pickup',
              deliveryPlace: o.deliveryPlace || '',
              deliveryFee: Number(o.deliveryFee || 0),
              authProvider: o.authProvider || '',
              items: [],
              totalPoint: 0
            };
          }
          ordersByNo[orderNo].items.push(o);
          ordersByNo[orderNo].totalPoint += Number(o.point || 0);
        });

        const sortedGroups = Object.values(ordersByNo).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        sortedGroups.forEach(group => {
          const totalCredit = group.totalPoint + group.deliveryFee;
          
          const isKakao = group.authProvider === 'kakao';
          let displayNickname = group.nickname || '';
          if (isKakao) {
            displayNickname = '💬 ' + displayNickname.replace(/ \((체험|비회원)\)/g, '').trim();
          }
          
          const menusHtml = group.items.map(item => `
            <div class="menu-item">
              <span>${AppState.escapeHtml(item.snackName)}</span>
              <span>${Number(item.quantity || 1)}개</span>
            </div>
          `).join('');

          const parts = String(group.orderNo).split('-');
          const shortOrderNo = parts.length >= 3 ? parts[2] : group.orderNo;

          const statusLabel = getStatusLabel(group.servedYn);
          const statusColor = getStatusColor(group.servedYn);
          const statusBadge = `<span class="status-badge" style="background-color: ${statusColor};">${statusLabel}</span>`;

          const isDelivery = group.deliveryType === 'delivery';
          const deliveryTypeStr = isDelivery ? '배달' : '포장';

          const card = document.createElement('div');
          card.className = 'bill-card';
          
          card.innerHTML = `
            <div class="bill-header">
              <div class="brand-title-wrap">
                <img src="icons/guest-192.png" alt="logo" onerror="this.style.display='none'"> 
                <span>배달왔<span class="accent">삼</span></span>
              </div>
              <div class="brand-desc">삼각지 카페 배달 서비스</div>
            </div>

            <div class="bill-body">
              <div class="info-row row-order-no">
                <span class="info-label">주문번호</span>
                <span class="info-value" style="font-size: 16px;">[${AppState.escapeHtml(shortOrderNo)}]</span>
              </div>
              <div class="info-row row-nickname">
                <span class="info-label">주문자</span>
                <span class="info-value">${AppState.escapeHtml(displayNickname)} 님</span>
              </div>
              <div class="info-row row-time">
                <span class="info-label">주문시간</span>
                <span class="info-value">${formatSimpleTime(group.timestamp)}</span>
              </div>

              <div class="menu-box">
                ${menusHtml}
              </div>

              <div class="info-row row-delivery-type">
                <span class="info-label">수령방식</span>
                <span class="info-value">${deliveryTypeStr}</span>
              </div>
              ${isDelivery && group.deliveryPlace ? `
              <div class="info-row row-delivery-place" style="color: #e53e3e;">
                <span class="info-label" style="color: #e53e3e;">배송지</span>
                <span class="info-value">${AppState.escapeHtml(group.deliveryPlace)}</span>
              </div>
              ` : ''}
              <div class="info-row row-credit">
                <span class="info-label">차감온기</span>
                <span class="info-value">${AppState.formatPoint(totalCredit)} (배달비 ${group.deliveryFee} 포함)</span>
              </div>
              <div class="info-row row-status">
                <span class="info-label">주문상태</span>
                <span class="info-value">${statusBadge}</span>
              </div>

              <div class="bill-footer">
                <div class="delivery-person">
                  <span>배달담당:</span>
                  <div class="delivery-person-line"></div>
                </div>
                <div class="checklist">
                  <span>□ 주문확인</span>
                  <span>□ 준비완료</span>
                  <span>□ 전달완료</span>
                </div>
              </div>
            </div>
          `;
          container.appendChild(card);
        });

        renderChecklists(sortedGroups);
      }
    }

    // 배달 주문만 필터링 후 배송지별로 그룹화 및 정렬하는 독립형 함수
    function groupDeliveryOrdersByPlace(orderGroups) {
      const deliveryGroups = {};
      
      orderGroups.forEach(group => {
        // 배달 주문만 대상 (pickup 제외)
        if (group.deliveryType !== 'delivery') return;
        
        const place = (group.deliveryPlace || '').trim() || '배송지 미입력';
        if (!deliveryGroups[place]) {
          deliveryGroups[place] = [];
        }
        deliveryGroups[place].push(group);
      });
      
      // 배송지 이름 가나다순 정렬 (추후 동선 정렬 등 최적화 구현이 가능하도록 분리)
      const sortedPlaces = Object.keys(deliveryGroups).sort();
      
      const sortedResult = {};
      sortedPlaces.forEach(place => {
        sortedResult[place] = deliveryGroups[place];
      });
      
      return sortedResult;
    }

    // 배달 체크리스트 렌더링 함수
    function renderDeliveryChecklist(sortedGroups) {
      const container = document.getElementById('delivery-checklist-container');
      if (!container) return;
      container.innerHTML = '';
      
      const grouped = groupDeliveryOrdersByPlace(sortedGroups);
      const places = Object.keys(grouped);
      
      if (places.length === 0) {
        container.style.display = 'none';
        return;
      }
      
      container.style.display = 'block';
      
      let html = `
        <div class="checklist-title">
          <span>📦 배송지별 배달 체크리스트 (총 ${places.length}개 배송지)</span>
          <span style="font-size: 14px; font-weight: 700; color: #4b5563;" class="no-print">인쇄 시 새 A4 페이지에 단독으로 출력됩니다.</span>
        </div>
      `;
      
      places.forEach(place => {
        const orderGroups = grouped[place];
        
        let rowsHtml = '';
        orderGroups.forEach(group => {
          const parts = String(group.orderNo).split('-');
          const shortOrderNo = parts.length >= 3 ? parts[2] : group.orderNo;
          
          const isKakao = group.authProvider === 'kakao';
          let displayNickname = group.nickname || '';
          if (isKakao) {
            displayNickname = '💬 ' + displayNickname.replace(/ \((체험|비회원)\)/g, '').trim();
          }
          
          const snackNamesHtml = group.items.map(item => AppState.escapeHtml(item.snackName)).join('<br>');
          const quantitiesHtml = group.items.map(item => `${Number(item.quantity || 1)}개`).join('<br>');
          
          rowsHtml += `
            <tr>
              <td style="text-align: center; width: 50px; vertical-align: middle;"><input type="checkbox" class="checklist-chbox"></td>
              <td style="font-family: monospace; vertical-align: middle;">[${AppState.escapeHtml(shortOrderNo)}]</td>
              <td style="vertical-align: middle;"><strong>${AppState.escapeHtml(displayNickname)} 님</strong></td>
              <td style="vertical-align: middle;">${snackNamesHtml}</td>
              <td style="text-align: center; font-weight: 800; width: 80px; vertical-align: middle;">${quantitiesHtml}</td>
            </tr>
          `;
        });
        
        html += `
          <div class="place-group">
            <div class="place-name-header">📍 배송지: ${AppState.escapeHtml(place)} (총 ${orderGroups.length}건 주문)</div>
            <table class="checklist-table">
              <thead>
                <tr>
                  <th style="text-align: center; width: 50px;">체크</th>
                  <th style="width: 120px;">주문번호</th>
                  <th style="width: 140px;">주문자</th>
                  <th>주문 메뉴</th>
                  <th style="text-align: center; width: 80px;">수량</th>
                </tr>
              </thead>
              <tbody>
                ${rowsHtml}
              </tbody>
            </table>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }

    // 포장 체크리스트 렌더링 함수
    function renderTakeoutChecklist(sortedGroups) {
      const container = document.getElementById('takeout-checklist-container');
      if (!container) return;
      container.innerHTML = '';
      
      const takeoutGroups = sortedGroups.filter(group => group.deliveryType !== 'delivery');
      
      if (takeoutGroups.length === 0) {
        container.style.display = 'none';
        return;
      }
      
      container.style.display = 'block';
      
      let html = `
        <div class="checklist-title">
          <span>🛍️ 포장 주문 체크리스트 (총 ${takeoutGroups.length}건 주문)</span>
          <span style="font-size: 14px; font-weight: 700; color: #4b5563;" class="no-print">인쇄 시 새 A4 페이지에 단독으로 출력됩니다.</span>
        </div>
        <table class="checklist-table">
          <thead>
            <tr>
              <th style="text-align: center; width: 50px;">체크</th>
              <th style="width: 120px;">주문번호</th>
              <th style="width: 140px;">주문자</th>
              <th>주문 메뉴</th>
              <th style="text-align: center; width: 80px;">수량</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      takeoutGroups.forEach(group => {
        const parts = String(group.orderNo).split('-');
        const shortOrderNo = parts.length >= 3 ? parts[2] : group.orderNo;
        
        const isKakao = group.authProvider === 'kakao';
        let displayNickname = group.nickname || '';
        if (isKakao) {
          displayNickname = '💬 ' + displayNickname.replace(/ \((체험|비회원)\)/g, '').trim();
        }
        
        const snackNamesHtml = group.items.map(item => AppState.escapeHtml(item.snackName)).join('<br>');
        const quantitiesHtml = group.items.map(item => `${Number(item.quantity || 1)}개`).join('<br>');
        
        html += `
          <tr>
            <td style="text-align: center; width: 50px; vertical-align: middle;"><input type="checkbox" class="checklist-chbox"></td>
            <td style="font-family: monospace; vertical-align: middle;">[${AppState.escapeHtml(shortOrderNo)}]</td>
            <td style="vertical-align: middle;"><strong>${AppState.escapeHtml(displayNickname)} 님</strong></td>
            <td style="vertical-align: middle;">${snackNamesHtml}</td>
            <td style="text-align: center; font-weight: 800; width: 80px; vertical-align: middle;">${quantitiesHtml}</td>
          </tr>
        `;
      });
      
      html += `
          </tbody>
        </table>
      `;
      
      container.innerHTML = html;
    }

    // 체크리스트 통합 조율 함수
    function renderChecklists(sortedGroups) {
      const includeDelivery = document.getElementById('include-delivery-check')?.checked;
      const includeTakeout = document.getElementById('include-takeout-check')?.checked;

      if (includeDelivery) {
        renderDeliveryChecklist(sortedGroups);
      } else {
        const deliveryContainer = document.getElementById('delivery-checklist-container');
        if (deliveryContainer) deliveryContainer.style.display = 'none';
      }

      if (includeTakeout) {
        renderTakeoutChecklist(sortedGroups);
      } else {
        const takeoutContainer = document.getElementById('takeout-checklist-container');
        if (takeoutContainer) takeoutContainer.style.display = 'none';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      // 인쇄 모드 복원 및 이벤트 등록
      const select = document.getElementById('print-mode-select');
      const excludeCheck = document.getElementById('exclude-served-check');

      if (excludeCheck) {
        const savedExclude = localStorage.getItem('print-exclude-served') !== 'false';
        excludeCheck.checked = savedExclude;
        excludeCheck.addEventListener('change', (e) => {
          localStorage.setItem('print-exclude-served', String(e.target.checked));
          renderBills();
        });
      }

      const includeDeliveryCheck = document.getElementById('include-delivery-check');
      const includeTakeoutCheck = document.getElementById('include-takeout-check');

      if (includeDeliveryCheck) {
        const savedIncludeDelivery = localStorage.getItem('print-include-delivery') !== 'false';
        includeDeliveryCheck.checked = savedIncludeDelivery;
        includeDeliveryCheck.addEventListener('change', (e) => {
          localStorage.setItem('print-include-delivery', String(e.target.checked));
          renderBills();
        });
      }

      if (includeTakeoutCheck) {
        const savedIncludeTakeout = localStorage.getItem('print-include-takeout') !== 'false';
        includeTakeoutCheck.checked = savedIncludeTakeout;
        includeTakeoutCheck.addEventListener('change', (e) => {
          localStorage.setItem('print-include-takeout', String(e.target.checked));
          renderBills();
        });
      }

      if (select) {
        const savedMode = localStorage.getItem('print-bills-mode') || 'normal';
        select.value = savedMode;
        document.body.classList.toggle('label-mode', savedMode === 'label');
        
        const startWrap = document.getElementById('label-start-selector-wrap');
        if (startWrap) {
          startWrap.style.display = savedMode === 'label' ? 'flex' : 'none';
        }

        select.addEventListener('change', (e) => {
          const mode = e.target.value;
          document.body.classList.toggle('label-mode', mode === 'label');
          localStorage.setItem('print-bills-mode', mode);
          
          if (startWrap) {
            startWrap.style.display = mode === 'label' ? 'flex' : 'none';
          }
          
          renderBills();
        });
      }

      initMiniGrid();
      loadBills();
    });
  </script>
</body>
</html>
