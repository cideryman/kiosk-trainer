<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간식 키오스크 - 후기 관리 화면</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest-reviews.json">
  <meta name="theme-color" content="#38A169">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주간매점 관리자">
  <link rel="apple-touch-icon" href="icons/admin-180.png">
  <style>
    /* 관리자 대시보드용 보완 스타일 (PC 넓은 화면 대응) */
    @media (min-width: 768px) {
      .kiosk-container {
        max-width: 1200px;
        width: 95%;
        height: auto;
        min-height: 90vh;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
      }
      body {
        background-color: #E2E8F0;
        padding: 40px 0;
      }
      .admin-layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }
      .admin-main {
        grid-column: 1;
      }
      .admin-side {
        grid-column: 2;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
    }

    /* 탭 메뉴 스타일 */
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 3.5px solid var(--border-color);
      padding-bottom: 0px;
    }

    .admin-tab-btn {
      background: none;
      border: none;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: 800;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      transition: all 0.2s ease;
      position: relative;
      bottom: -3.5px;
    }

    .admin-tab-btn:hover {
      color: var(--text-main);
      background-color: #F1F5F9;
    }

    .admin-tab-btn.active {
      color: var(--primary-color);
      background-color: white;
      border: 3.5px solid var(--border-color);
      border-bottom-color: white;
    }

    .admin-tab-content {
      display: none;
    }

    .admin-tab-content.active {
      display: block;
    }

    /* 관리자 조절 버튼 및 입력창 스타일 */
    .credit-adjust-btn {
      padding: 6px 12px;
      font-size: 16px;
      font-weight: 800;
      border: 2px solid var(--border-color);
      background-color: #F8F9FA;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s ease-in-out;
    }
    .credit-adjust-btn:active {
      transform: scale(0.95);
      background-color: #CBD5E1;
    }
    .credit-adjust-btn.plus {
      background-color: #E6FFFA;
      border-color: #81E6D9;
      color: #234E52;
    }
    .credit-adjust-btn.minus {
      background-color: #FFF5F5;
      border-color: #FEB2B2;
      color: #742A2A;
    }
    .admin-inline-input {
      width: 60px;
      padding: 6px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
    }
    .btn-small-action {
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 800;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .btn-small-action:active {
      transform: scale(0.95);
      background-color: var(--primary-hover);
    }

    .btn-danger-action {
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 800;
      background-color: #FFF5F5;
      color: #9B2C2C;
      border: 2px solid #FEB2B2;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .btn-danger-action:active {
      transform: scale(0.95);
      background-color: #FED7D7;
    }

    .form-panel {
      background-color: var(--card-bg);
      border: 2.5px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field label {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-main);
    }

    .form-field input {
      padding: 10px;
      font-size: 16px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border-color);
      font-weight: 700;
    }

    .token-status {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-muted);
      padding: 8px 10px;
      background-color: #F8FAFC;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 4px 8px;
      font-size: 13px;
      font-weight: 900;
      border-radius: 999px;
      border: 2px solid var(--border-color);
    }

    .status-badge.active {
      color: #22543D;
      background-color: #F0FFF4;
      border-color: #9AE6B4;
    }

    .status-badge.inactive {
      color: #744210;
      background-color: #FFFAF0;
      border-color: #FBD38D;
    }

    .status-badge.target-user {
      color: #2b6cb0;
      background-color: #ebf8ff;
      border-color: #bee3f8;
    }

    .status-badge.target-guest {
      color: #dd6b20;
      background-color: #fffaf0;
      border-color: #fbd38d;
    }

    .status-badge.target-both {
      color: #6b46c1;
      background-color: #faf5ff;
      border-color: #e9d8fd;
    }

    .user-group-row td {
      background-color: #F8FAFC;
      color: var(--text-main);
      font-size: 16px;
      font-weight: 900;
      border-top: 3px solid var(--border-color);
    }

    .snack-admin-layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .snack-add-form-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 3.5fr 1.2fr 1.5fr;
        gap: 12px;
        align-items: end;
      }

      .user-add-form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr;
        gap: 12px;
        align-items: end;
      }
    }

    @media (max-width: 767px) {
      .snack-add-form-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .user-add-form-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
    }

    /* 미제공 간식 총합 보드 */
    .admin-summary-board {
      background-color: #FFFDF9;
      border: 3px solid var(--primary-color);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .totals-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    .total-item-badge {
      background-color: #FFF3E0;
      border: 1.5px solid var(--primary-color);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-sm);
    }

    .total-item-badge .highlight {
      color: var(--primary-color);
      font-size: 20px;
      font-weight: 900;
    }

    /* 대기 중인 주문 그룹 레이아웃 */
    .pending-group-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 12px;
    }

    @media (min-width: 600px) {
      .pending-group-container {
        grid-template-columns: 1fr 1fr;
      }
    }

    .user-order-card {
      background-color: var(--card-bg);
      border: 2.5px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease-in-out;
    }

    .user-order-card:hover {
      border-color: var(--primary-color);
      box-shadow: var(--shadow-md);
    }

    .user-profile-header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 10px;
    }

    .admin-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-color);
    }

    .admin-avatar-initial {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-weight: 800;
      user-select: none;
    }

    .user-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
    }

    .order-time-badge {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      margin-left: auto;
    }

    .user-order-items {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .user-order-items li {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      justify-content: space-between;
    }

    .btn-complete-action {
      background-color: var(--secondary-color);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 800;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      box-shadow: var(--shadow-btn-sec);
      transition: all 0.15s ease-in-out;
      margin-top: auto;
    }

    .btn-complete-action:active {
      transform: scale(0.96);
      background-color: var(--secondary-hover);
    }

    .btn-cancel-action {
      background-color: var(--danger-color);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 800;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
    }

    .btn-cancel-action:active {
      transform: scale(0.96);
      background-color: var(--danger-hover);
    }

    .empty-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
      background-color: #F8F9FA;
      border-radius: var(--radius-sm);
      border: 2px dashed var(--border-color);
      grid-column: 1 / -1;
    }

    .btn-undo-action {
      background-color: #E2E8F0;
      color: var(--text-main);
      border: 1.5px solid #CBD5E1;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
      box-shadow: var(--shadow-sm);
    }

    .btn-undo-action:hover {
      background-color: #CBD5E1;
      border-color: #94A3B8;
    }

    .btn-undo-action:active {
      transform: scale(0.95);
    }

    /* 관리자용 정보 수정 모달 스타일 */
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .admin-modal-content {
      background-color: white;
      border-radius: var(--radius-md);
      width: 100%;
      max-width: 500px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: modalFadeIn 0.2s ease-out;
    }

    @keyframes modalFadeIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .admin-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 12px;
    }

    .admin-modal-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
    }

    .admin-modal-close {
      background: none;
      border: none;
      font-size: 28px;
      font-weight: 800;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
    }

    .admin-modal-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .admin-modal-footer {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    /* 간식 표시 순서 편집 패널 */
    .snack-order-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .snack-order-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: #fff;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      cursor: grab;
      transition: box-shadow 0.15s, border-color 0.15s;
      user-select: none;
    }
    .snack-order-item:active { cursor: grabbing; }
    .snack-order-item.dragging { opacity: 0.4; border-color: var(--primary-color); box-shadow: var(--shadow-md); }
    .snack-order-item.drag-over { border-color: var(--secondary-color); background-color: #F0FFFE; }
    .drag-handle { font-size: 20px; color: var(--text-muted); flex-shrink: 0; line-height: 1; }
    .snack-order-rank { font-size: 15px; font-weight: 900; color: var(--text-muted); min-width: 24px; text-align: center; }
    .snack-order-name { flex: 1; font-size: 17px; font-weight: 800; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .snack-order-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .snack-order-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1.5px solid var(--border-color); background-color: #F8F9FA;
      font-size: 16px; font-weight: 800; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background-color 0.1s;
    }
    .snack-order-btn:hover { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
    .snack-order-btn:active { transform: scale(0.9); }
    .snack-order-badge { font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 999px; border: 1.5px solid; flex-shrink: 0; }
    .snack-order-badge.hidden-badge { color: #744210; background-color: #FFFAF0; border-color: #FBD38D; }

    /* 일괄 제공 컨트롤 바 */
    .bulk-action-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background-color: #F0FFFE;
      border: 2px solid var(--secondary-color);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      margin-bottom: 14px;
    }
    .bulk-action-bar .bulk-count {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-muted);
      flex: 1;
    }
    .btn-bulk-all {
      background-color: var(--secondary-color);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 800;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
      white-space: nowrap;
    }
    .btn-bulk-all:hover { background-color: var(--secondary-hover); }
    .btn-bulk-all:active { transform: scale(0.95); }
    .btn-bulk-selected {
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 800;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
      white-space: nowrap;
    }
    .btn-bulk-selected:hover { background-color: var(--primary-hover); }
    .btn-bulk-selected:active { transform: scale(0.95); }
    .btn-bulk-selected:disabled,
    .btn-bulk-all:disabled {
      background-color: #CED4DA !important;
      color: #6C757D !important;
      cursor: not-allowed;
    }
    /* 카드 체크박스 */
    .card-checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0 0 0;
    }
    .card-checkbox {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--secondary-color);
      flex-shrink: 0;
    }
    .card-checkbox-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .user-order-card.selected {
      border-color: var(--secondary-color);
      background-color: #F0FFFE;
    }

    /* 후기 상세 모달 내부 답글 UI 개선 */
    .btn-reply-preset {
      transition: all 0.2s ease-in-out !important;
    }
    .btn-reply-preset:hover {
      background-color: var(--secondary-color) !important;
      color: white !important;
      border-color: var(--secondary-color) !important;
      transform: translateY(-1px);
      box-shadow: 0 4px 6px rgba(46, 196, 182, 0.15) !important;
    }
    .btn-reply-preset:active {
      transform: translateY(0);
      box-shadow: none;
    }
    #rd-reply-input {
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    #rd-reply-input:focus {
      border-color: var(--secondary-color) !important;
      box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.15) !important;
    }

    /* 후기 카드 뷰 그리드 */
    .reviews-card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 10px;
    }
    @media (min-width: 768px) {
      .reviews-card-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    /* 후기 개별 카드 */
    .review-card {
      background-color: var(--card-bg);
      border: 2.5px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .review-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--secondary-color);
    }
    .review-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .review-card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .review-card-guest {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-dark);
    }
    .review-card-date {
      font-size: 13px;
      color: var(--text-muted);
    }
    .review-card-badges {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .review-card-body {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .review-card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .review-card-comment {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-main);
      word-break: break-all;
      white-space: pre-wrap;
      font-weight: 600;
    }
    .review-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .review-tag-chip {
      font-size: 12px;
      font-weight: 800;
      color: var(--secondary-hover);
      background-color: #EBF8FF;
      border: 1.5px solid #BEE3F8;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .review-card-thumbnail-wrapper {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      border-radius: var(--radius-xs);
      border: 1.5px solid var(--border-color);
      overflow: hidden;
      background-color: #F8FAFC;
    }
    .review-card-thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .review-card-reply-box {
      background-color: #FFFDF5;
      border: 1.5px solid #FEF3C7;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13.5px;
      line-height: 1.5;
      color: #744210;
      font-weight: 700;
    }

    /* 후기 상세 모달 반응형 및 개선 스타일 */
    .rd-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 16px;
    }
    .rd-modal-guest-info-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }
    .rd-modal-name-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    #rd-guest-name {
      margin: 0;
      font-size: 22px;
      color: var(--text-dark);
      font-weight: 800;
      word-break: break-all;
    }
    #btn-toggle-review-visibility {
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      background: transparent;
      border: 1.5px solid var(--border-color);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #rd-created-at {
      font-size: 13px;
      color: #A0AEC0;
    }
    #rd-stamp {
      background-color: #FFF3E0;
      border: 1.5px solid var(--primary-color);
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      color: #E65100;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rd-reply-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    @media (max-width: 576px) {
      .rd-modal-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      .rd-modal-name-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      #rd-stamp {
        align-self: flex-start;
      }
      .rd-reply-input-row {
        flex-direction: column;
        align-items: stretch !important;
        gap: 10px !important;
      }
      #rd-reply-input {
        width: 100%;
      }
      #btn-save-reply {
        width: 100% !important;
        margin-top: 4px;
      }
      .admin-modal-content {
        width: 95% !important;
        max-height: 95vh !important;
      }
      .rd-modal-scroll-body {
        padding: 24px 20px 20px !important;
      }
      #rd-photo {
        max-height: 280px !important;
      }
    }
  </style>
</head>
<body>
  <div class="kiosk-container" style="height: auto; min-height: 100vh;">
    <nav class="admin-screen-nav" aria-label="관리 화면 전환">
      <a class="admin-screen-tab" data-screen="admin" href="admin.html">⚙️ 관리자</a>
      <a class="admin-screen-tab" data-screen="kitchen" href="kitchen.html">🍳 주방</a>
      <a class="admin-screen-tab is-active" data-screen="reviews" href="reviews.html" aria-current="page">💬 후기</a>
    </nav>

    <!-- 관리자 헤더 -->
    <header class="kiosk-header admin-header page-reviews">
      <h1 class="admin-screen-title">💬 후기 관리 화면</h1>
      <div class="kiosk-header-top">
        <div class="admin-header-actions">
          <details class="admin-action-menu">
            <summary>외부 화면</summary>
            <div class="admin-action-menu-panel">
              <button class="btn-small-action" onclick="window.open('board.html', '_blank')" style="background-color: #7C3AED; color: white; border: none;">🖥️ 전광판 보기</button>
              <button class="btn-small-action" onclick="window.open('index.html?type=kiosk', '_blank')" style="background-color: #F59E0B; color: white; border: none;">🛒 일반 키오스크</button>
              <button class="btn-small-action" onclick="window.open('guest.html', '_blank')" style="background-color: #0F766E; color: white; border: none;">🛵 배달왔삼</button>
            </div>
          </details>
          <button class="btn btn-primary" id="btn-manual-refresh" style="min-height: 48px; font-size: 16px; width: auto; padding: 0 16px; margin: 0;">
            🔄 새로고침
          </button>
        </div>
      </div>
    </header>

    <section class="admin-auth-bar" data-admin-auth aria-label="관리자 잠금 해제">
      <div class="admin-auth-info">
        <span class="admin-auth-icon" aria-hidden="true">🔒</span>
        <div>
          <strong class="admin-auth-title">관리자 잠금</strong>
          <span class="admin-auth-status" data-admin-auth-status>변경 작업을 하려면 잠금을 해제하세요.</span>
        </div>
      </div>
      <div class="admin-auth-actions" data-admin-auth-actions>
        <form class="admin-auth-form" data-admin-auth-form>
          <input class="admin-auth-username" type="text" name="username" value="kiosk-admin" autocomplete="username" aria-label="관리자 계정" tabindex="-1">
          <label class="admin-auth-label" for="admin-auth-password-reviews">관리자 키</label>
          <input class="admin-auth-password" id="admin-auth-password-reviews" data-admin-auth-password name="password" type="password" autocomplete="current-password" placeholder="관리자 키 입력" required>
          <button class="btn btn-secondary admin-auth-submit" data-admin-auth-submit type="submit">잠금 해제</button>
        </form>
        <button class="btn btn-gray admin-auth-lock" data-admin-auth-lock type="button" hidden>잠그기</button>
        <div class="admin-auth-error" data-admin-auth-error role="alert" hidden></div>
      </div>
    </section>

    <!-- 바디 -->
    <main class="kiosk-body">
      <!-- 다른 영역 제거됨 -->

      <!-- Tab 4: 후기 관리 -->
      <div id="tab-reviews" class="admin-tab-content active">
        <div class="snack-admin-layout">
          <div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 12px;">
              <div class="admin-section-title" style="color: var(--secondary-hover); border-left-color: var(--secondary-color); margin-bottom: 0;">💬 게스트 후기 및 응원 내역</div>
              <div style="display: flex; gap: 10px; align-items: center;">
                <label style="display: flex; align-items: center; gap: 6px; font-size: 16px; font-weight: 800; cursor: pointer; user-select: none; padding: 6px 12px; border: 2px solid var(--border-color); border-radius: var(--radius-sm); background-color: white; margin: 0;">
                  <input type="checkbox" id="toggle-private-reviews" style="width: 20px; height: 20px; cursor: pointer; accent-color: var(--secondary-color);">
                  비공개 후기 표시
                </label>
              </div>
            </div>
            <div id="review-cards-container" class="reviews-card-grid">
              <!-- JS 동적 생성 -->
            </div>
          </div>
        </div>
      </div>

    </main>


  </div>

  <!-- 다른 모달 제거됨 -->

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const ADMIN_TOKEN_STORAGE_KEY = AdminAuth.storageKey;

    function esc(value) {
      return AppState.escapeHtml(value);
    }

    function attr(value) {
      return AppState.escapeAttr(value);
    }

    function getAdminMemo() {
      const memoInput = document.getElementById('admin-change-memo');
      return memoInput ? memoInput.value.trim() : '';
    }

    function updateAdminTokenStatus() {
      AdminAuth.render();
    }

    function getAdminToken() {
      return AdminAuth.requireToken();
    }

    function withAdminToken(body) {
      return {
        ...body,
        adminToken: getAdminToken(),
        adminMemo: getAdminMemo()
      };
    }

    function clearAdminTokenIfDenied(res) {
      AdminAuth.handleDenied(res);
    }

    // 주문 데이터 및 집계 로드
    async function loadAdminData() {
      try {
        const reviewsRes = await fetchAPI('getReviewsForAdmin', { method: 'POST', body: withAdminToken({}) });

        // 4. 후기 데이터 처리
        if (reviewsRes && reviewsRes.success && Array.isArray(reviewsRes.reviews)) {
          renderReviews(reviewsRes.reviews);
        } else {
          throw new Error('후기 API 응답 결과가 올바르지 않습니다.');
        }

      } catch (error) {
        if (error?.message === '관리자 잠금 해제가 필요합니다.') {
          return;
        }
        console.error('관리자 데이터 조회 실패:', error);
        const reviewContainer = document.getElementById('review-cards-container');
        if (reviewContainer) {
          reviewContainer.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--danger-color); font-weight: 700; border: 2.5px dashed var(--border-color); border-radius: var(--radius-md); background-color: white;">
            데이터를 불러오지 못했습니다.<br><span style="font-size: 14px; font-weight: 600; color: var(--text-muted); display: block; margin-top: 8px;">(${error.message || '인터넷 연결 끊김'})</span>
          </div>`;
        }
      }
    }

    function renderReviews(reviews) {
      const container = document.getElementById('review-cards-container');
      if (!container) return;

      container.innerHTML = '';

      if (reviews.length === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1; width: 100%; padding: 40px 0;">등록된 후기가 없습니다.</div>';
        return;
      }

      cachedReviews = reviews;

      const showPrivate = document.getElementById('toggle-private-reviews')?.checked;
      let renderedCount = 0;

      reviews.forEach((review, index) => {
        const isPub = review.isPublic === true || String(review.isPublic).toUpperCase() === 'TRUE' || review.isPublic === 'Y';
        if (!isPub && !showPrivate) {
          return;
        }
        renderedCount++;
        
        const pubLabel = isPub ? '공개' : '비공개';
        const pubClass = isPub ? 'active' : 'inactive';
        
        const rawDate = review.createdAt ? new Date(review.createdAt) : null;
        let formattedDate = review.createdAt || '-';
        if (rawDate && !isNaN(rawDate.getTime())) {
          formattedDate = `${rawDate.toLocaleDateString()} ${String(rawDate.getHours()).padStart(2, '0')}:${String(rawDate.getMinutes()).padStart(2, '0')}`;
        }

        // 이미지 썸네일 HTML
        let imgHtml = '';
        if (review.imageUrl) {
          imgHtml = `
            <div class="review-card-thumbnail-wrapper">
              <img class="review-card-thumbnail" src="${AppState.escapeAttr(AppState.convertDriveImageUrl(review.imageUrl))}" alt="후기 사진" onerror="this.parentElement.style.display='none';">
            </div>
          `;
        }

        // 태그 칩스 HTML
        let tagsHtml = '';
        if (review.tags) {
          const tagList = review.tags.split(',').map(t => t.trim()).filter(Boolean);
          if (tagList.length > 0) {
            tagsHtml = `
              <div class="review-card-tags">
                ${tagList.map(tag => `<span class="review-tag-chip">#${esc(tag)}</span>`).join('')}
              </div>
            `;
          }
        }

        // 답글 박스 HTML
        let replyHtml = '';
        if (review.replyText) {
          replyHtml = `
            <div class="review-card-reply-box">
              <span style="color: var(--primary-color);">↳ 답글:</span> ${esc(review.replyText)}
            </div>
          `;
        }

        const card = document.createElement('div');
        card.className = `review-card`;
        card.setAttribute('data-review-index', index);
        card.setAttribute('title', `주문번호: ${review.orderId}`); // hover 툴팁으로만 주문번호 제공
        
        card.innerHTML = `
          <div class="review-card-header">
            <div class="review-card-meta">
              <span class="review-card-guest">${esc(review.guestName)} 님</span>
              <span class="review-card-date">${esc(formattedDate)}</span>
            </div>
            <div class="review-card-badges">
              <span style="background-color: #FFF3E0; border: 1.5px solid var(--primary-color); padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; color: #E65100;">${esc(review.stamp)}</span>
              <span class="status-badge ${pubClass}" style="margin: 0; min-height: auto; padding: 2px 8px; font-size: 11px;">${pubLabel}</span>
            </div>
          </div>
          <div class="review-card-body">
            <div class="review-card-content">
              <div class="review-card-comment">${esc(review.comment || '응원 메시지가 없습니다.')}</div>
              ${tagsHtml}
            </div>
            ${imgHtml}
          </div>
          ${replyHtml}
        `;

        card.onclick = () => openReviewDetail(index);
        container.appendChild(card);
      });

      if (renderedCount === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1; width: 100%; padding: 40px 0;">표시할 후기가 없습니다. (비공개 후기 표시를 체크해보세요)</div>';
      }
    }

    // 후기 전용 화면에서는 주문/이용자/간식 관리 렌더러를 사용하지 않습니다.

    // 후기 전용 화면에서는 이용자/간식 추가 및 수정 모달을 사용하지 않습니다.

    // 초기 이벤트 설정
    window.addEventListener('DOMContentLoaded', () => {
      AdminAuth.init({
        onUnlock: () => loadAdminData()
      });
      updateAdminTokenStatus();
      loadAdminData();

      const btnManualRefresh = document.getElementById('btn-manual-refresh');
      if (btnManualRefresh) {
        btnManualRefresh.addEventListener('click', () => {
          loadAdminData();
          AppState.vibrate(50);
        });
      }


      const togglePrivateReviews = document.getElementById('toggle-private-reviews');
      if (togglePrivateReviews) {
        togglePrivateReviews.addEventListener('change', () => {
          renderReviews(cachedReviews);
          AppState.vibrate(30);
        });
      }
    });

    // --- 후기 상세 모달 로직 ---
    let currentReviewIndex = -1;
    let cachedReviews = [];

    function openReviewDetail(index) {
      if (!cachedReviews || index < 0 || index >= cachedReviews.length) return;
      currentReviewIndex = index;
      const review = cachedReviews[index];

      const isPub = review.isPublic === true || String(review.isPublic).toUpperCase() === 'TRUE' || review.isPublic === 'Y';
      const rawDate = review.createdAt ? new Date(review.createdAt) : null;
      let formattedDate = review.createdAt || '-';
      if (rawDate && !isNaN(rawDate.getTime())) {
        formattedDate = `${rawDate.toLocaleDateString()} ${String(rawDate.getHours()).padStart(2, '0')}:${String(rawDate.getMinutes()).padStart(2, '0')}`;
      }

      document.getElementById('rd-guest-name').textContent = review.guestName;
      document.getElementById('rd-created-at').textContent = formattedDate;
      document.getElementById('rd-stamp').textContent = review.stamp;
      document.getElementById('rd-tags').textContent = review.tags || '태그 없음';

      // 답글 데이터 로드 및 초기화
      const replyInput = document.getElementById('rd-reply-input');
      if (replyInput) {
        replyInput.value = review.replyText || '';
      }

      const replyStatus = document.getElementById('rd-reply-status');
      if (replyStatus) {
        if (review.replyText) {
          const rDate = review.replyCreatedAt ? new Date(review.replyCreatedAt) : null;
          let formattedRDate = review.replyCreatedAt || '';
          if (rDate && !isNaN(rDate.getTime())) {
            formattedRDate = `${rDate.toLocaleDateString()} ${String(rDate.getHours()).padStart(2, '0')}:${String(rDate.getMinutes()).padStart(2, '0')}`;
          }
          replyStatus.innerHTML = `🟢 답글 작성됨 <span style="font-size:12px; color:#A0AEC0; font-weight:500; margin-left: 6px;">(${formattedRDate})</span>`;
          replyStatus.style.color = '#38A169';
        } else {
          replyStatus.textContent = '작성된 답글이 없습니다.';
          replyStatus.style.color = '#A0AEC0';
        }
      }

      const commentEl = document.getElementById('rd-comment');
      if (review.comment) {
        commentEl.textContent = review.comment;
        commentEl.style.color = 'var(--text-dark)';
      } else {
        commentEl.textContent = '등록된 응원 메시지가 없습니다.';
        commentEl.style.color = '#A0AEC0';
      }

      const photoContainer = document.getElementById('rd-photo-container');
      const photoEl = document.getElementById('rd-photo');
      if (review.imageUrl) {
        photoEl.src = AppState.convertDriveImageUrl(review.imageUrl);
        photoContainer.style.display = 'block';
      } else {
        photoContainer.style.display = 'none';
        photoEl.src = '';
      }

      // 이전/다음 버튼 활성/비활성 처리 (비공개 후기 필터 상태 반영)
      const showPrivate = document.getElementById('toggle-private-reviews')?.checked;
      
      let hasPrev = false;
      for (let i = index - 1; i >= 0; i--) {
        const r = cachedReviews[i];
        const isPub = r.isPublic === true || String(r.isPublic).toUpperCase() === 'TRUE' || r.isPublic === 'Y';
        if (isPub || showPrivate) {
          hasPrev = true;
          break;
        }
      }
      document.getElementById('btn-prev-review').disabled = !hasPrev;

      let hasNext = false;
      for (let i = index + 1; i < cachedReviews.length; i++) {
        const r = cachedReviews[i];
        const isPub = r.isPublic === true || String(r.isPublic).toUpperCase() === 'TRUE' || r.isPublic === 'Y';
        if (isPub || showPrivate) {
          hasNext = true;
          break;
        }
      }
      document.getElementById('btn-next-review').disabled = !hasNext;

      // 공개 상태에 따라 토글 버튼 텍스트 설정
      const toggleBtn = document.getElementById('btn-toggle-review-visibility');
      if (isPub) {
        toggleBtn.textContent = '현재: 공개 (비공개로 전환)';
        toggleBtn.style.color = '#C53030';
        toggleBtn.style.borderColor = '#FEB2B2';
      } else {
        toggleBtn.textContent = '현재: 비공개 (공개로 전환)';
        toggleBtn.style.color = '#2F855A';
        toggleBtn.style.borderColor = '#9AE6B4';
      }

      document.getElementById('review-detail-modal').style.display = 'flex';
    }

    async function toggleCurrentReviewVisibility() {
      if (currentReviewIndex < 0 || !cachedReviews[currentReviewIndex]) return;

      const review = cachedReviews[currentReviewIndex];
      const isCurrentlyPub = review.isPublic === true || String(review.isPublic).toUpperCase() === 'TRUE' || review.isPublic === 'Y';
      const targetState = !isCurrentlyPub;

      const confirmMsg = targetState ? "이 후기를 '공개' 처리하시겠습니까?" : "이 후기를 '비공개' 처리하시겠습니까?";
      if (!confirm(confirmMsg)) return;

      const btn = document.getElementById('btn-toggle-review-visibility');
      const originalText = btn.textContent;
      btn.textContent = '처리중...';
      btn.disabled = true;

      try {
        const res = await fetchAPI('toggleReviewVisibility', {
          method: 'POST',
          body: withAdminToken({
            createdAt: review.createdAt,
            orderId: review.orderId,
            isPublic: targetState
          })
        });

        if (res && res.success) {
          // 상태 업데이트
          review.isPublic = targetState ? 'Y' : 'N';
          openReviewDetail(currentReviewIndex);
          renderReviews(cachedReviews);
        } else {
          clearAdminTokenIfDenied(res);
          alert(res?.message || '상태 변경에 실패했습니다.');
        }
      } catch (e) {
        alert('오류가 발생했습니다: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    function closeReviewDetail() {
      document.getElementById('review-detail-modal').style.display = 'none';
    }

    function navigateReview(offset) {
      const showPrivate = document.getElementById('toggle-private-reviews')?.checked;
      let nextIndex = currentReviewIndex + offset;
      
      while (nextIndex >= 0 && nextIndex < cachedReviews.length) {
        const review = cachedReviews[nextIndex];
        const isPub = review.isPublic === true || String(review.isPublic).toUpperCase() === 'TRUE' || review.isPublic === 'Y';
        if (isPub || showPrivate) {
          openReviewDetail(nextIndex);
          return;
        }
        nextIndex += offset;
      }
    }

    // 프리셋 클릭 시 입력창에 대입하는 헬퍼 함수
    window.applyReplyPreset = function(text) {
      const input = document.getElementById('rd-reply-input');
      if (input) {
        input.value = text;
        AppState.vibrate(30);
      }
    }

    // 후기 답글 전송 API 호출 및 UI 갱신 함수
    async function submitReviewReplyAction() {
      if (currentReviewIndex < 0 || !cachedReviews[currentReviewIndex]) return;
      const review = cachedReviews[currentReviewIndex];
      const replyInput = document.getElementById('rd-reply-input');
      const replyText = replyInput ? replyInput.value.trim() : '';

      if (!replyText) {
        alert('답글 내용을 입력하거나 단축 버튼을 선택하세요.');
        if (replyInput) replyInput.focus();
        return;
      }

      const btn = document.getElementById('btn-save-reply');
      const originalText = btn.textContent;
      btn.textContent = '저장중...';
      btn.disabled = true;

      try {
        const res = await fetchAPI('submitReviewReply', {
          method: 'POST',
          body: withAdminToken({
            orderId: review.orderId,
            replyText: replyText
          })
        });

        if (res && res.success) {
          AppState.vibrate(50);
          alert('답글이 성공적으로 등록되었습니다.');

          // 로컬 캐시 데이터 갱신
          review.replyText = replyText;
          review.replyCreatedAt = new Date().toISOString();

          // UI 리렌더링
          openReviewDetail(currentReviewIndex);
          renderReviews(cachedReviews);
        } else {
          clearAdminTokenIfDenied(res);
          alert(res?.message || '답글 저장에 실패했습니다.');
        }
      } catch (e) {
        alert('오류가 발생했습니다: ' + e.message);
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      // 모달 이벤트 리스너 추가
      const btnClose = document.getElementById('btn-close-review-modal');
      if (btnClose) btnClose.addEventListener('click', closeReviewDetail);

      const btnPrev = document.getElementById('btn-prev-review');
      if (btnPrev) btnPrev.addEventListener('click', () => navigateReview(-1));

      const btnNext = document.getElementById('btn-next-review');
      if (btnNext) btnNext.addEventListener('click', () => navigateReview(1));

      const btnToggle = document.getElementById('btn-toggle-review-visibility');
      if (btnToggle) btnToggle.addEventListener('click', toggleCurrentReviewVisibility);

      // 배경 클릭 시 모달 닫기
      const reviewModal = document.getElementById('review-detail-modal');
      if (reviewModal) {
        reviewModal.addEventListener('click', (e) => {
          if (e.target.id === 'review-detail-modal') {
            closeReviewDetail();
          }
        });
      }
    });

    // ESC 키로 닫기 및 화살표 키로 이동
    window.addEventListener('keydown', (e) => {
      const modal = document.getElementById('review-detail-modal');
      if (modal && modal.style.display === 'flex') {
        if (e.key === 'Escape') closeReviewDetail();
        if (e.key === 'ArrowLeft') navigateReview(-1);
        if (e.key === 'ArrowRight') navigateReview(1);
      }
    });
  </script>

  <!-- 후기 상세 모달 -->
  <div id="review-detail-modal" class="admin-modal" style="display: none; align-items: center; justify-content: center; z-index: 9999;">
    <div class="admin-modal-content" style="max-width: 800px; width: 90%; max-height: 90vh; display: flex; flex-direction: column; position: relative; padding: 0;">
      <button class="admin-modal-close" id="btn-close-review-modal" style="position: absolute; right: 15px; top: 15px; font-size: 28px; color: #718096; background: none; border: none; cursor: pointer; line-height: 1; z-index: 10;">&times;</button>

      <div class="rd-modal-scroll-body" style="flex: 1; overflow-y: auto; padding: 35px 30px 20px; text-align: left;">
        <div class="rd-modal-header">
          <div class="rd-modal-guest-info-wrap">
            <div class="rd-modal-name-row">
              <h3 id="rd-guest-name">게스트명</h3>
              <button id="btn-toggle-review-visibility">상태 토글</button>
            </div>
            <div id="rd-created-at">작성시간</div>
          </div>
          <div id="rd-stamp">스탬프</div>
        </div>

        <div id="rd-tags" style="font-size: 15px; color: var(--primary-color); font-weight: 700; margin-bottom: 20px;">태그들</div>

        <div id="rd-comment-container" style="background-color: #F7FAFC; padding: 24px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #E2E8F0;">
          <p id="rd-comment" style="font-size: 17px; line-height: 1.7; color: var(--text-dark); margin: 0; white-space: pre-wrap; font-weight: 500;">한마디 응원</p>
        </div>

        <div id="rd-photo-container" style="text-align: center; margin-bottom: 20px; display: none;">
          <img id="rd-photo" style="max-width: 100%; max-height: 500px; object-fit: contain; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #E2E8F0;" src="" alt="후기 사진">
        </div>

        <!-- 답글 관리 영역 -->
        <div id="rd-reply-container" style="margin-top: 24px; border-top: 2px dashed #E2E8F0; padding: 20px 0 10px 0; margin-bottom: 10px;">
          <h4 style="margin: 0 0 12px 0; font-size: 16px; color: var(--text-dark); font-weight: 850; display: flex; align-items: center; gap: 6px;">💬 후기 답글 (관리자 대리 작성)</h4>
          <div style="display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;">
            <button type="button" class="btn-reply-preset" onclick="applyReplyPreset('💖 응원 고마워요!')" style="padding: 6px 14px; font-size: 13px; font-weight: 800; border-radius: 999px; border: 1.5px solid var(--border-color); background: white; cursor: pointer; color: var(--text-main); transition: all 0.15s;">💖 응원 고마워요!</button>
            <button type="button" class="btn-reply-preset" onclick="applyReplyPreset('👍 맛있게 먹어줘서 기뻐요!')" style="padding: 6px 14px; font-size: 13px; font-weight: 800; border-radius: 999px; border: 1.5px solid var(--border-color); background: white; cursor: pointer; color: var(--text-main); transition: all 0.15s;">👍 맛있게 먹어줘서 기뻐요!</button>
            <button type="button" class="btn-reply-preset" onclick="applyReplyPreset('🛵 안전하게 배달을 완료했어요!')" style="padding: 6px 14px; font-size: 13px; font-weight: 800; border-radius: 999px; border: 1.5px solid var(--border-color); background: white; cursor: pointer; color: var(--text-main); transition: all 0.15s;">🛵 안전하게 배달을 완료했어요!</button>
            <button type="button" class="btn-reply-preset" onclick="applyReplyPreset('🌟 다음에 또 매점 이용해 주세요!')" style="padding: 6px 14px; font-size: 13px; font-weight: 800; border-radius: 999px; border: 1.5px solid var(--border-color); background: white; cursor: pointer; color: var(--text-main); transition: all 0.15s;">🌟 다음에 또 매점 이용해 주세요!</button>
          </div>
          <div class="rd-reply-input-row">
            <input type="text" id="rd-reply-input" placeholder="답글 내용을 입력하거나 위의 단축 버튼을 누르세요 (최대 100자)" maxlength="100" style="flex: 1; padding: 10px 12px; border: 2px solid var(--border-color); border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; outline: none; min-height: 42px;">
            <button class="btn btn-secondary" id="btn-save-reply" onclick="submitReviewReplyAction()" style="margin: 0; min-height: 42px; width: auto; font-size: 14px; padding: 0 16px; font-weight: 800; white-space: nowrap;">답글 저장</button>
          </div>
          <div id="rd-reply-status" style="font-size: 13px; color: #A0AEC0; margin-top: 8px; font-weight: 600;">작성된 답글이 없습니다.</div>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; padding: 15px 30px; border-top: 1px solid var(--border-color); background: #F8FAFC; border-radius: 0 0 var(--radius-lg) var(--radius-lg);">
        <button id="btn-prev-review" class="btn-outline" style="min-width: 110px; font-weight: 700;">&larr; 이전 후기</button>
        <button id="btn-next-review" class="btn-outline" style="min-width: 110px; font-weight: 700;">다음 후기 &rarr;</button>
      </div>
    </div>
  </div>
</body>
</html>
