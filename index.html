<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>주간매점 - 이름을 골라요</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest-kiosk.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주간매점">
  <link rel="apple-touch-icon" href="icons/kiosk-180.png">
  <style>
    @keyframes pulseGlowBanner {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(46, 196, 182, 0); }
      50% { transform: scale(1.015); box-shadow: 0 0 16px rgba(46, 196, 182, 0.4); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(46, 196, 182, 0); }
    }
  </style>
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top" style="display: flex; justify-content: space-between; align-items: center;">
        <!-- 로고 -->
        <h1 class="kiosk-title" style="padding: 0; line-height: 1; margin: 0;">
          <img src="assets/store-logo.png" alt="주간매점" style="height: 64px; width: auto; display: block; object-fit: contain;">
        </h1>
        <!-- 우측 토글 버튼들 -->
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; justify-content: flex-end;">
          <!-- 주문번호 사용 토글 -->
          <label class="tts-toggle-container" style="cursor: pointer; white-space: nowrap;">
            <span class="tts-switch">
              <input type="checkbox" id="orderno-toggle">
              <span class="tts-slider"></span>
            </span>
            <span class="tts-label">주문번호 발급</span>
          </label>
          <!-- 음성 안내 토글 -->
          <label class="tts-toggle-container" style="cursor: pointer; white-space: nowrap;">
            <span class="tts-switch">
              <input type="checkbox" id="tts-toggle">
              <span class="tts-slider"></span>
            </span>
            <span class="tts-label">음성 안내</span>
          </label>
        </div>
      </div>
    </header>

    <!-- 주문 취소 알림 배너 -->
    <div id="cancellation-banner-container" style="display: none; flex-direction: column; gap: 8px; padding: 12px 20px; background-color: #FFF0F0; border-bottom: 3px solid #FEB2B2; text-align: center;">
    </div>

    <!-- 내 주문 실시간 상태 배너 -->
    <div id="order-status-banner-container" style="display: none; margin: 0; padding: 16px 20px; text-align: center; border-bottom: 4px solid var(--border-color); background-color: #FFFDF9; border-radius: 0;">
      <!-- JS로 동적 생성 -->
    </div>

    <!-- 바디 (스크롤 가능 영역) -->
    <main class="kiosk-body" id="main-content">
      
      <div class="guide-text">
        내 <span>이름(별명)</span>을 찾아서 눌러주세요!
      </div>
      
      <!-- 이용자 목록 그리드 -->
      <div class="grid-container" id="user-grid">
        <!-- JS로 동적 생성 -->
      </div>

      <!-- 게스트 체험 버튼 -->
      <div style="margin-top: 24px; display: flex; flex-direction: column;">
        <button class="btn btn-secondary" id="btn-guest-mode" style="min-height: 64px; font-size: 22px;">
          🟢 방문객 / 게스트 체험하기
        </button>
      </div>
    </main>

    <!-- 하단 전광판 버튼 -->
    <footer class="kiosk-footer" style="padding: 16px 20px;">
      <button
        id="btn-board"
        onclick="window.open('board.html', '_blank')"
        style="width: 100%; min-height: 56px; background-color: var(--secondary-color); color: white; border: none; border-radius: var(--radius-md); font-size: 20px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: var(--shadow-btn-sec); transition: all 0.15s ease-in-out;"
      >
        🖥️ 호출 전광판 열기
      </button>
    </footer>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="overlay-text" id="loading-text">이름 목록을 불러오는 중입니다...</div>
    </div>

    <!-- 에러 모달/오버레이 (초기엔 숨김) -->
    <div class="overlay" id="error-overlay" style="display: none;">
      <div class="error-box" id="error-message">목록을 불러오지 못했습니다.</div>
      <button class="btn btn-primary" id="btn-retry" style="margin-top: 20px; width: 80%;">다시 불러오기</button>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 이용자 목록 로드 함수
    async function loadUsers() {
      const loadingOverlay = document.getElementById('loading-overlay');
      const errorOverlay = document.getElementById('error-overlay');
      const userGrid = document.getElementById('user-grid');

      // UI 초기화
      loadingOverlay.style.display = 'flex';
      errorOverlay.style.display = 'none';
      userGrid.innerHTML = '';

      try {
        const response = await fetchAPI('getUsers');
        
        if (response && response.success && Array.isArray(response.users)) {
          renderUsers(response.users);
          loadingOverlay.style.display = 'none';
        } else {
          throw new Error('API 응답 형식이 유효하지 않습니다.');
        }
      } catch (error) {
        console.error('사용자 목록 불러오기 실패:', error);
        document.getElementById('error-message').textContent = '인터넷 연결이 불안정하거나\n목록을 가져올 수 없습니다.';
        loadingOverlay.style.display = 'none';
        errorOverlay.style.display = 'flex';
      }
    }

    // 이용자 목록 렌더링
    function renderUsers(users) {
      const userGrid = document.getElementById('user-grid');
      
      if (users.length === 0) {
        userGrid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">등록된 이용자가 없습니다.</div>';
        return;
      }

      users.forEach(user => {
        const card = document.createElement('div');
        card.className = 'user-card clickable-card';
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `${user.nickname || ''} 선택`);
        
        // 파스텔 색상 목록 (가독성 좋고 부드러운)
        const colors = ['#FF9F1C', '#2EC4B6', '#118AB2', '#FF5A5F', '#8338EC', '#3A86C8'];
        const colorIndex = Math.abs(String(user.userId || '').split('').reduce((acc, char) => acc + char.charCodeAt(0), 0)) % colors.length;
        const fallbackBgColor = colors[colorIndex];

        const imgUrl = AppState.convertDriveImageUrl(user.imageUrl);
        const safeNickname = AppState.escapeHtml(user.nickname);
        const safeInitial = AppState.escapeHtml(String(user.nickname || '?').charAt(0));
        const safeImgUrl = AppState.escapeAttr(imgUrl);
        const safeFallbackBgColor = AppState.escapeAttr(fallbackBgColor);
        let avatarHTML = '';
        if (imgUrl && imgUrl.trim() !== '') {
          avatarHTML = `
            <div class="user-avatar-container">
              <img src="${safeImgUrl}" alt="${safeNickname} 사진" class="user-avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div class="user-avatar-fallback" style="background-color: ${safeFallbackBgColor}; display: none;">${safeInitial}</div>
            </div>
          `;
        } else {
          avatarHTML = `
            <div class="user-avatar-container">
              <div class="user-avatar-fallback" style="background-color: ${safeFallbackBgColor};">${safeInitial}</div>
            </div>
          `;
        }

        // 내부에 아바타, 이름, 크레딧 표기 (🪙 아이콘 + 숫자 형태)
        const safeCreditNum = AppState.escapeHtml(String(user.credit ?? 0));
        card.innerHTML = `
          ${avatarHTML}
          <div class="user-card-name">${safeNickname}</div>
          <div class="user-card-credit">
            <span class="coin-icon">🪙</span>
            <span class="coin-number">${safeCreditNum}</span>
          </div>
        `;
        
        // 카드 터치/클릭 이벤트 (지터 및 흔들림 보정 지원)
        AppState.bindCardTap(card, () => {
          AppState.setSelectedUser(user);
          
          // 피드백 효과 및 음성 안내 후 이동
          AppState.vibrate(60);
          AppState.speak(`${user.nickname} 님을 선택했습니다.`);
          card.style.transform = 'scale(0.92)';
          card.style.borderColor = 'var(--secondary-color)';
          
          setTimeout(() => {
            window.location.href = 'menu.html';
          }, 600); // 음성이 시작될 수 있는 시간적 여유 부여
        });

        userGrid.appendChild(card);
      });
    }

    let cancellationInterval = null;

    // 첫 실행 시 기존 취소 내역을 dismiss에 선등록하여 새로고침 시 옛날 취소 건이 다시 보이는 문제 방지
    async function initCancellationAlerts() {
      try {
        const response = await fetchAPI('getOrdersToday');
        if (response && response.success && Array.isArray(response.orders)) {
          const existingCancelled = response.orders
            .filter(o => o.servedYn === 'C')
            .map(o => o.orderNo);
          
          const dismissed = JSON.parse(localStorage.getItem('dismissedCancellations') || '[]');
          const newDismissed = Array.from(new Set([...dismissed, ...existingCancelled]));
          localStorage.setItem('dismissedCancellations', JSON.stringify(newDismissed));
        }
      } catch (e) {
        console.warn('취소 알림 초기화 에러:', e);
      }
    }

    // 5초 간격으로 취소 주문 감시 폴링
    function startCancellationPolling() {
      checkCancelledOrders();
      cancellationInterval = setInterval(checkCancelledOrders, 5000);
    }

    async function checkCancelledOrders() {
      try {
        const response = await fetchAPI('getOrdersToday');
        if (response && response.success && Array.isArray(response.orders)) {
          const now = new Date();
          const cancelledOrders = response.orders.filter(o => o.servedYn === 'C');
          
          // 내 주문 상태 점검 호출
          checkMyOrderStatus(response.orders);

          const dismissedList = JSON.parse(localStorage.getItem('dismissedCancellations') || '[]');
          
          const activeCancellations = [];
          let playedSound = false;
          let newlyCancelledNicknames = [];
          
          // 주문번호 단위 중복 제거 및 정보 그룹화
          const orderNoGroups = {};
          cancelledOrders.forEach(o => {
            if (!orderNoGroups[o.orderNo]) {
              orderNoGroups[o.orderNo] = {
                orderNo: o.orderNo,
                nickname: o.nickname,
                cancelTimestamp: o.cancelTimestamp
              };
            }
          });
          
          Object.values(orderNoGroups).forEach(group => {
            if (!group.cancelTimestamp) return;
            const cancelTime = new Date(group.cancelTimestamp);
            const diffMs = now.getTime() - cancelTime.getTime();
            
            // 3분(180초) 이내의 취소 건이면서 아직 dismiss 처리되지 않은 주문
            if (Math.abs(diffMs) <= 180000 && !dismissedList.includes(group.orderNo)) {
              activeCancellations.push(group);

              // 소리 및 TTS 재생 유무 확인 (첫 노출 시 단 1회만 재생)
              if (!window.playedWarningSoundIds) {
                window.playedWarningSoundIds = [];
              }
              if (!window.playedWarningSoundIds.includes(group.orderNo)) {
                window.playedWarningSoundIds.push(group.orderNo);
                playedSound = true;
                newlyCancelledNicknames.push(group.nickname);
              }
            }
          });
          
          if (playedSound) {
            AppState.playWarningSound();
            if (newlyCancelledNicknames.length > 0) {
              const names = newlyCancelledNicknames.join(', ');
              AppState.speak(`${names} 님의 주문이 취소되었습니다.`);
            }
          }
          
          renderCancellationBanner(activeCancellations);
        }
      } catch (e) {
        console.warn('취소 주문 폴링 에러:', e);
      }
    }

    // 내 실시간 주문 상태 표시 및 음성 호출 기능
    function checkMyOrderStatus(orders) {
      const summaryStr = localStorage.getItem('lastOrderSummary');
      const container = document.getElementById('order-status-banner-container');
      if (!summaryStr || !container) {
        if (container) container.style.display = 'none';
        return;
      }

      const summary = JSON.parse(summaryStr);
      if (!summary.orderNo) {
        container.style.display = 'none';
        return;
      }

      // 오늘 내 주문과 일치하는 항목 필터링
      const myItems = orders.filter(o => o.orderNo === summary.orderNo);
      if (myItems.length === 0) {
        container.style.display = 'none';
        return;
      }

      const status = myItems[0].servedYn || 'N';

      // 수령완료(Y) 또는 취소(C)인 경우 10초 후에 캐시 비우고 배너 숨김
      if (status === 'Y' || status === 'C') {
        if (!window.bannerRemoveTimeout) {
          window.bannerRemoveTimeout = setTimeout(() => {
            const currentSummary = localStorage.getItem('lastOrderSummary');
            if (currentSummary) {
              const parsed = JSON.parse(currentSummary);
              if (parsed.orderNo === summary.orderNo) {
                localStorage.removeItem('lastOrderSummary');
                container.style.display = 'none';
              }
            }
            window.bannerRemoveTimeout = null;
          }, 10000);
        }
      } else {
        // 대기중/준비중일 때는 타이머 해제
        if (window.bannerRemoveTimeout) {
          clearTimeout(window.bannerRemoveTimeout);
          window.bannerRemoveTimeout = null;
        }
      }

      // 상태별 라벨 및 색상
      let statusText = '접수중';
      let statusColor = '#3A86C8'; // blue
      let styleCss = '';
      let animeClass = '';

      if (status === 'P') {
        statusText = '준비중 ☕';
        statusColor = 'var(--primary-color)'; // orange
      } else if (status === 'R') {
        statusText = '준비완료 🔔 (받아가세요!)';
        statusColor = 'var(--secondary-hover)'; // mint
        styleCss = 'background-color: #E0F2F1; border-bottom: 4px solid var(--secondary-color); font-size: 22px;';
        animeClass = 'animation: pulseGlowBanner 1.5s infinite ease-in-out;';

        // 준비완료 첫 감지 시 TTS 안내
        if (window.lastAnnouncedOrderNo !== summary.orderNo) {
          window.lastAnnouncedOrderNo = summary.orderNo;
          AppState.playClickSound();
          const shortNo = getShortOrderNo(summary.orderNo);
          AppState.speak(`${summary.nickname} 님, 주문하신 간식이 준비되었습니다. 받아가세요!`);
          AppState.vibrate([100, 50, 100]);
        }
      } else if (status === 'Y') {
        statusText = '수령완료 📦 맛있게 드세요!';
        statusColor = 'var(--text-muted)';
        styleCss = 'background-color: #F8F9FA;';
      } else if (status === 'C') {
        statusText = '주문취소 ❌ 환불 처리 완료';
        statusColor = 'var(--danger-color)';
        styleCss = 'background-color: #FFF0F0; border-bottom-color: var(--danger-color);';
      }

      container.style.display = 'block';
      container.style.cssText = `display: block; padding: 16px 20px; text-align: center; border-bottom: 4px solid ${statusColor}; background-color: #FFFDF9; ${styleCss} ${animeClass}`;

      const shortNo = getShortOrderNo(summary.orderNo);
      container.innerHTML = `
        <div style="font-size: 20px; font-weight: 800; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;">
          <span>✨ 실시간 주문 현황:</span>
          <span style="color: var(--primary-color); font-size: 24px; font-weight: 900;">[${shortNo}번]</span>
          <span>현재</span>
          <span style="color: ${statusColor}; font-size: 24px; font-weight: 950;">${statusText}</span>
        </div>
      `;
    }

    function getShortOrderNo(orderNo) {
      if (!orderNo) return '-';
      const parts = orderNo.split('-');
      if (parts.length >= 3) {
        return parseInt(parts[2], 10);
      }
      return orderNo;
    }

    function renderCancellationBanner(activeCancellations) {
      const banner = document.getElementById('cancellation-banner-container');
      if (!banner) return;

      if (activeCancellations.length === 0) {
        banner.style.display = 'none';
        banner.innerHTML = '';
        return;
      }

      banner.style.display = 'flex';
      banner.innerHTML = activeCancellations.map(c => `
        <div class="cancellation-row" style="font-size: 20px; font-weight: 800; color: #9B2C2C; padding: 4px 0;">
          📢 <span style="color: var(--danger-color); font-size: 22px;">${AppState.escapeHtml(c.nickname)} 님</span>의 주문이 취소되었습니다.
        </div>
      `).join('');

      // 60초 타이머 설정하여 각 주문번호를 dismiss 리스트에 등록
      activeCancellations.forEach(c => {
        if (!window.activeCancellationTimers) {
          window.activeCancellationTimers = {};
        }
        
        if (!window.activeCancellationTimers[c.orderNo]) {
          window.activeCancellationTimers[c.orderNo] = setTimeout(() => {
            const currentDismissed = JSON.parse(localStorage.getItem('dismissedCancellations') || '[]');
            if (!currentDismissed.includes(c.orderNo)) {
              currentDismissed.push(c.orderNo);
              localStorage.setItem('dismissedCancellations', JSON.stringify(currentDismissed));
            }
            delete window.activeCancellationTimers[c.orderNo];
            checkCancelledOrders(); // 즉시 화면 갱신
          }, 60000); // 60초 간 노출
        }
      });
    }

    // 초기 실행
    window.addEventListener('DOMContentLoaded', () => {
      // 혹시 남아있을 기존 장바구니/선택유저 데이터 초기화
      AppState.resetAll();
      
      loadUsers();

      // 게스트 버튼 바인딩
      const guestBtn = document.getElementById('btn-guest-mode');
      if (guestBtn) {
        AppState.bindCardTap(guestBtn, () => {
          AppState.vibrate(50);
          window.location.href = 'guest.html';
        });
      }

      // 취소 알림 설정 초기화 및 폴링 시작
      initCancellationAlerts().then(() => {
        startCancellationPolling();
      });

      // TTS 토글 연동 및 초기설정
      const ttsToggle = document.getElementById('tts-toggle');
      if (ttsToggle) {
        ttsToggle.checked = AppState.isTtsEnabled();
        ttsToggle.addEventListener('change', (e) => {
          AppState.setTtsEnabled(e.target.checked);
          AppState.vibrate(40);
          if (e.target.checked) {
            AppState.speak("음성 안내를 켭니다.");
          } else {
            window.speechSynthesis.cancel();
          }
        });
      }

      // 주문번호 토글 연동 및 초기설정
      const orderNoToggle = document.getElementById('orderno-toggle');
      if (orderNoToggle) {
        if (localStorage.getItem('orderNoEnabled') === null) {
          localStorage.setItem('orderNoEnabled', 'true');
        }
        orderNoToggle.checked = localStorage.getItem('orderNoEnabled') === 'true';
        orderNoToggle.addEventListener('change', (e) => {
          localStorage.setItem('orderNoEnabled', e.target.checked ? 'true' : 'false');
          AppState.vibrate(40);
          if (e.target.checked) {
            AppState.speak("주문번호를 발급합니다.");
          } else {
            AppState.speak("주문번호를 사용하지 않습니다.");
          }
        });
      }

      // 다시 시도 버튼 바인딩
      document.getElementById('btn-retry').addEventListener('click', () => {
        loadUsers();
      });
    });
  </script>
</body>
</html>
