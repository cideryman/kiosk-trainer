<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 이름을 골라요</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="간식 키오스크">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top">
        <h1 class="kiosk-title">🍪 주간보호센터 간식가게</h1>
        <div class="tts-toggle-container">
          <label class="tts-switch">
            <input type="checkbox" id="tts-toggle">
            <span class="tts-slider"></span>
          </label>
          <span class="tts-label">음성 안내</span>
        </div>
      </div>
    </header>

    <!-- 주문 취소 알림 배너 -->
    <div id="cancellation-banner-container" style="display: none; flex-direction: column; gap: 8px; padding: 12px 20px; background-color: #FFF0F0; border-bottom: 3px solid #FEB2B2; text-align: center;">
    </div>

    <!-- 바디 (스크롤 가능 영역) -->
    <main class="kiosk-body" id="main-content">
      <div class="guide-text">
        내 <span>이름(별명)</span>을 찾아서 눌러주세요!
      </div>
      
      <!-- 이용자 목록 그리드 -->
      <div class="grid-container" id="user-grid">
        <!-- JS로 동적 생성 -->
      </div>
    </main>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="overlay-text" id="loading-text">이름 목록을 불러오는 중입니다...</div>
    </div>

    <!-- 에러 모달/오버레이 (초기엔 숨김) -->
    <div class="overlay" id="error-overlay" style="display: none;">
      <div class="error-box" id="error-message">목록을 불러오지 못했습니다.</div>
      <button class="btn btn-primary" id="btn-retry" style="margin-top: 20px; width: 80%;">다시 불러오기</button>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 이용자 목록 로드 함수
    async function loadUsers() {
      const loadingOverlay = document.getElementById('loading-overlay');
      const errorOverlay = document.getElementById('error-overlay');
      const userGrid = document.getElementById('user-grid');

      // UI 초기화
      loadingOverlay.style.display = 'flex';
      errorOverlay.style.display = 'none';
      userGrid.innerHTML = '';

      try {
        const response = await fetchAPI('getUsers');
        
        if (response && response.success && Array.isArray(response.users)) {
          renderUsers(response.users);
          loadingOverlay.style.display = 'none';
        } else {
          throw new Error('API 응답 형식이 유효하지 않습니다.');
        }
      } catch (error) {
        console.error('사용자 목록 불러오기 실패:', error);
        document.getElementById('error-message').textContent = '인터넷 연결이 불안정하거나\n목록을 가져올 수 없습니다.';
        loadingOverlay.style.display = 'none';
        errorOverlay.style.display = 'flex';
      }
    }

    // 이용자 목록 렌더링
    function renderUsers(users) {
      const userGrid = document.getElementById('user-grid');
      
      if (users.length === 0) {
        userGrid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">등록된 이용자가 없습니다.</div>';
        return;
      }

      users.forEach(user => {
        const card = document.createElement('div');
        card.className = 'user-card clickable-card';
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `${user.nickname || ''} 선택`);
        
        // 파스텔 색상 목록 (가독성 좋고 부드러운)
        const colors = ['#FF9F1C', '#2EC4B6', '#118AB2', '#FF5A5F', '#8338EC', '#3A86C8'];
        const colorIndex = Math.abs(String(user.userId || '').split('').reduce((acc, char) => acc + char.charCodeAt(0), 0)) % colors.length;
        const fallbackBgColor = colors[colorIndex];

        const imgUrl = AppState.convertDriveImageUrl(user.imageUrl);
        const safeNickname = AppState.escapeHtml(user.nickname);
        const safeInitial = AppState.escapeHtml(String(user.nickname || '?').charAt(0));
        const safeImgUrl = AppState.escapeAttr(imgUrl);
        const safeFallbackBgColor = AppState.escapeAttr(fallbackBgColor);
        let avatarHTML = '';
        if (imgUrl && imgUrl.trim() !== '') {
          avatarHTML = `
            <div class="user-avatar-container">
              <img src="${safeImgUrl}" alt="${safeNickname} 사진" class="user-avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div class="user-avatar-fallback" style="background-color: ${safeFallbackBgColor}; display: none;">${safeInitial}</div>
            </div>
          `;
        } else {
          avatarHTML = `
            <div class="user-avatar-container">
              <div class="user-avatar-fallback" style="background-color: ${safeFallbackBgColor};">${safeInitial}</div>
            </div>
          `;
        }

        // 내부에 아바타, 이름, 크레딧 표기
        card.innerHTML = `
          ${avatarHTML}
          <div class="user-card-name">${safeNickname}</div>
          <div class="user-card-credit">${AppState.escapeHtml(AppState.formatPoint(user.credit))}</div>
        `;
        
        // 카드 클릭 이벤트
        card.addEventListener('click', () => {
          AppState.setSelectedUser(user);
          
          // 피드백 효과 및 음성 안내 후 이동
          AppState.vibrate(60);
          AppState.speak(`${user.nickname} 님을 선택했습니다.`);
          card.style.transform = 'scale(0.92)';
          card.style.borderColor = 'var(--secondary-color)';
          
          setTimeout(() => {
            window.location.href = 'menu.html';
          }, 600); // 음성이 시작될 수 있는 시간적 여유 부여
        });

        userGrid.appendChild(card);
      });
    }

    let cancellationInterval = null;

    // 첫 실행 시 기존 취소 내역을 dismiss에 선등록하여 새로고침 시 옛날 취소 건이 다시 보이는 문제 방지
    async function initCancellationAlerts() {
      try {
        const response = await fetchAPI('getOrdersToday');
        if (response && response.success && Array.isArray(response.orders)) {
          const existingCancelled = response.orders
            .filter(o => o.servedYn === 'C')
            .map(o => o.orderNo);
          
          const dismissed = JSON.parse(localStorage.getItem('dismissedCancellations') || '[]');
          const newDismissed = Array.from(new Set([...dismissed, ...existingCancelled]));
          localStorage.setItem('dismissedCancellations', JSON.stringify(newDismissed));
        }
      } catch (e) {
        console.warn('취소 알림 초기화 에러:', e);
      }
    }

    // 5초 간격으로 취소 주문 감시 폴링
    function startCancellationPolling() {
      checkCancelledOrders();
      cancellationInterval = setInterval(checkCancelledOrders, 5000);
    }

    async function checkCancelledOrders() {
      try {
        const response = await fetchAPI('getOrdersToday');
        if (response && response.success && Array.isArray(response.orders)) {
          const now = new Date();
          const cancelledOrders = response.orders.filter(o => o.servedYn === 'C');
          const dismissedList = JSON.parse(localStorage.getItem('dismissedCancellations') || '[]');
          
          const activeCancellations = [];
          let playedSound = false;
          let newlyCancelledNicknames = [];
          
          // 주문번호 단위 중복 제거 및 정보 그룹화
          const orderNoGroups = {};
          cancelledOrders.forEach(o => {
            if (!orderNoGroups[o.orderNo]) {
              orderNoGroups[o.orderNo] = {
                orderNo: o.orderNo,
                nickname: o.nickname,
                cancelTimestamp: o.cancelTimestamp
              };
            }
          });
          
          Object.values(orderNoGroups).forEach(group => {
            if (!group.cancelTimestamp) return;
            const cancelTime = new Date(group.cancelTimestamp);
            const diffMs = now.getTime() - cancelTime.getTime();
            
            // 3분(180초) 이내의 취소 건이면서 아직 dismiss 처리되지 않은 주문
            if (Math.abs(diffMs) <= 180000 && !dismissedList.includes(group.orderNo)) {
              activeCancellations.push(group);

              // 소리 및 TTS 재생 유무 확인 (첫 노출 시 단 1회만 재생)
              if (!window.playedWarningSoundIds) {
                window.playedWarningSoundIds = [];
              }
              if (!window.playedWarningSoundIds.includes(group.orderNo)) {
                window.playedWarningSoundIds.push(group.orderNo);
                playedSound = true;
                newlyCancelledNicknames.push(group.nickname);
              }
            }
          });
          
          if (playedSound) {
            AppState.playWarningSound();
            if (newlyCancelledNicknames.length > 0) {
              const names = newlyCancelledNicknames.join(', ');
              AppState.speak(`${names} 님의 주문이 취소되었습니다.`);
            }
          }
          
          renderCancellationBanner(activeCancellations);
        }
      } catch (e) {
        console.warn('취소 주문 폴링 에러:', e);
      }
    }

    function renderCancellationBanner(activeCancellations) {
      const banner = document.getElementById('cancellation-banner-container');
      if (!banner) return;

      if (activeCancellations.length === 0) {
        banner.style.display = 'none';
        banner.innerHTML = '';
        return;
      }

      banner.style.display = 'flex';
      banner.innerHTML = activeCancellations.map(c => `
        <div class="cancellation-row" style="font-size: 20px; font-weight: 800; color: #9B2C2C; padding: 4px 0;">
          📢 <span style="color: var(--danger-color); font-size: 22px;">${AppState.escapeHtml(c.nickname)} 님</span>의 주문이 취소되었습니다.
        </div>
      `).join('');

      // 60초 타이머 설정하여 각 주문번호를 dismiss 리스트에 등록
      activeCancellations.forEach(c => {
        if (!window.activeCancellationTimers) {
          window.activeCancellationTimers = {};
        }
        
        if (!window.activeCancellationTimers[c.orderNo]) {
          window.activeCancellationTimers[c.orderNo] = setTimeout(() => {
            const currentDismissed = JSON.parse(localStorage.getItem('dismissedCancellations') || '[]');
            if (!currentDismissed.includes(c.orderNo)) {
              currentDismissed.push(c.orderNo);
              localStorage.setItem('dismissedCancellations', JSON.stringify(currentDismissed));
            }
            delete window.activeCancellationTimers[c.orderNo];
            checkCancelledOrders(); // 즉시 화면 갱신
          }, 60000); // 60초 간 노출
        }
      });
    }

    // 초기 실행
    window.addEventListener('DOMContentLoaded', () => {
      // 혹시 남아있을 기존 장바구니/선택유저 데이터 초기화
      AppState.resetAll();
      
      loadUsers();

      // 취소 알림 설정 초기화 및 폴링 시작
      initCancellationAlerts().then(() => {
        startCancellationPolling();
      });

      // TTS 토글 연동 및 초기설정
      const ttsToggle = document.getElementById('tts-toggle');
      if (ttsToggle) {
        ttsToggle.checked = AppState.isTtsEnabled();
        ttsToggle.addEventListener('change', (e) => {
          AppState.setTtsEnabled(e.target.checked);
          AppState.vibrate(40);
          if (e.target.checked) {
            AppState.speak("음성 안내를 켭니다.");
          } else {
            window.speechSynthesis.cancel();
          }
        });
      }

      // 다시 시도 버튼 바인딩
      document.getElementById('btn-retry').addEventListener('click', () => {
        loadUsers();
      });
    });
  </script>
</body>
</html>
