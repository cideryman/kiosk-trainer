<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 주문 확인</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="간식 키오스크">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    /* 주문 확인 화면 - 수정 가능한 아이템 카드 */
    .order-item-editable {
      background-color: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .order-item-editable:active {
      border-color: var(--primary-color);
    }

    /* 이미지/이모지 영역 */
    .order-item-editable .order-item-img-container {
      width: 60px;
      height: 60px;
      flex-shrink: 0;
    }

    /* 이름+수량 텍스트 영역 */
    .confirm-item-info {
      flex: 1;
      min-width: 0;
    }

    .confirm-item-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .confirm-item-unit {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .confirm-item-subtotal {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary-color);
      white-space: nowrap;
    }

    /* 수량 조절 + 삭제 버튼 묶음 */
    .confirm-item-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .confirm-qty-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .confirm-btn-qty {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      font-size: 22px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, background-color 0.1s;
      position: relative;
      flex-shrink: 0;
    }

    /* 터치 히트박스 확장 */
    .confirm-btn-qty::before {
      content: '';
      position: absolute;
      top: -10px; left: -10px;
      right: -10px; bottom: -10px;
    }

    .confirm-btn-qty:active {
      transform: scale(0.88);
    }

    .confirm-btn-minus {
      background-color: #E9ECEF;
      color: var(--text-main);
    }

    .confirm-btn-plus {
      background-color: var(--primary-color);
      color: white;
    }

    .confirm-qty-val {
      font-size: 22px;
      font-weight: 900;
      width: 28px;
      text-align: center;
      color: var(--text-main);
    }

    /* 삭제 버튼 */
    .confirm-btn-delete {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #FFD6D6;
      background-color: #FFF0F0;
      color: var(--danger-color);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.15s, transform 0.1s;
      position: relative;
    }

    .confirm-btn-delete::before {
      content: '';
      position: absolute;
      top: -8px; left: -8px;
      right: -8px; bottom: -8px;
    }

    .confirm-btn-delete:active {
      background-color: #FFD6D6;
      transform: scale(0.88);
    }

    /* 빈 장바구니 안내 */
    .cart-empty-hint {
      text-align: center;
      padding: 30px 16px;
      color: var(--text-muted);
      font-size: 18px;
      font-weight: 700;
    }

    /* 삭제 애니메이션 */
    @keyframes itemRemove {
      from { opacity: 1; transform: translateX(0); max-height: 120px; }
      to   { opacity: 0; transform: translateX(60px); max-height: 0; padding: 0; margin: 0; }
    }

    .order-item-editable.removing {
      animation: itemRemove 0.28s ease-in forwards;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top">
        <h1 class="kiosk-title">📋 주문 확인</h1>
        <div id="user-badge-container">
          <!-- JS 동적 생성 -->
        </div>
      </div>
    </header>

    <!-- 바디 -->
    <main class="kiosk-body" id="main-content">
      <div class="guide-text">
        내가 고른 <span>간식</span>이 맞나요?<br>
        <span style="font-size: 18px; font-weight: 700; color: var(--text-muted);">눌러서 수량을 바꾸거나 빼세요!</span>
      </div>

      <div class="confirm-layout">
        <!-- 주문 리스트 영역 -->
        <div class="order-list" id="order-item-list">
          <!-- JS 동적 생성 -->
        </div>

        <!-- 최종 계산서 영역 -->
        <div class="bill-box">
          <div class="bill-row">
            <span>현재 보유</span>
            <span class="bill-val">
              <span class="bill-coin-display" id="my-credit">
                <span class="coin-icon">🪙</span>
                <span class="coin-number" id="my-credit-num">0</span>
              </span>
            </span>
          </div>
          <div class="bill-row">
            <span>선택 상품</span>
            <span class="bill-val highlight">
              <span class="bill-coin-display highlight" id="use-credit">
                <span class="coin-icon">🪙</span>
                <span class="coin-number" id="use-credit-num">0</span>
              </span>
            </span>
          </div>
          <div class="bill-row total">
            <span>주문 후 잔액</span>
            <span class="bill-val">
              <span class="bill-coin-display" id="remain-credit">
                <span class="coin-icon">🪙</span>
                <span class="coin-number" id="remain-credit-num">0</span>
              </span>
            </span>
          </div>
        </div>
      </div>

      <!-- 에러 알림 영역 -->
      <div class="error-box" id="error-message-box" style="display: none; margin-top: 10px;">
        ⚠️ 인터넷이 연결되지 않았습니다. 잠시 후 다시 시도해 주세요.
      </div>
    </main>

    <!-- 푸터 버튼 -->
    <footer class="kiosk-footer">
      <div style="display: flex; gap: 16px;">
        <button class="btn btn-gray" id="btn-prev" style="flex: 1; font-size: 20px;">이전으로</button>
        <button class="btn btn-secondary" id="btn-submit" style="flex: 2;">주문하기</button>
      </div>
    </footer>

    <!-- 로딩 오버레이 (주문 처리 중) -->
    <div class="overlay" id="loading-overlay" style="display: none;">
      <div class="spinner"></div>
      <div class="overlay-text">주문을 전송하고 있습니다.<br>잠시만 기다려주세요!</div>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let user = null;
    let cart = [];

    // ── 계산서 업데이트 ──────────────────────────────────────────
    function updateBill() {
      const totalPoints = cart.reduce((sum, item) => sum + (item.point * item.quantity), 0);
      const remainPoints = user.credit - totalPoints;

      // 동전 아이콘 숫자만 업데이트 (HTML 구조는 고정)
      document.getElementById('use-credit-num').textContent = totalPoints;

      const remainNumEl = document.getElementById('remain-credit-num');
      const remainDisplayEl = document.getElementById('remain-credit');
      remainNumEl.textContent = Math.max(0, remainPoints);

      const submitBtn = document.getElementById('btn-submit');
      const errorBox  = document.getElementById('error-message-box');

      if (remainPoints < 0) {
        remainDisplayEl.className = 'bill-coin-display deficit';
        submitBtn.disabled = true;
        submitBtn.textContent = '크레딧 부족';
        errorBox.textContent = (user && user.userId === 'guest')
          ? '⚠️ 체험용 동전보다 주문 금액이 커서 주문할 수 없습니다.'
          : '⚠️ 보유한 크레딧보다 주문 금액이 커서 주문할 수 없습니다.';
        errorBox.style.display = 'block';
      } else {
        remainDisplayEl.className = 'bill-coin-display';
        submitBtn.disabled = cart.length === 0;
        submitBtn.textContent = cart.length === 0 ? '담은 간식 없음' : '주문하기';
        errorBox.style.display = 'none';
      }
    }

    // ── 수량 변경 ────────────────────────────────────────────────
    function changeQty(snackId, delta) {
      const idx = cart.findIndex(i => i.snackId == snackId);
      if (idx === -1) return;

      if (delta > 0 && cart[idx].quantity >= (cart[idx].stock ?? 999)) {
        AppState.vibrate([100, 50, 100]); // 경고성 더블 진동
        AppState.playWarningSound();
        alert("재고가 부족하여 더 이상 늘릴 수 없습니다.");
        return;
      }

      cart[idx].quantity += delta;

      if (cart[idx].quantity <= 0) {
        removeItem(snackId);
        return;
      }

      // 수량 텍스트만 갱신 (DOM 재렌더 없이)
      const qtyEl = document.querySelector(`[data-qty-snack="${snackId}"]`);
      const subEl = document.querySelector(`[data-sub-snack="${snackId}"]`);
      const unitEl = document.querySelector(`[data-unit-snack="${snackId}"]`);
      if (qtyEl) qtyEl.textContent = cart[idx].quantity;
      
      // 플러스 버튼 활성/비활성 상태 갱신
      const plusBtn = document.querySelector(`#confirm-plus-${snackId}`);
      if (plusBtn) {
        const isMaxStock = cart[idx].quantity >= (cart[idx].stock ?? 999);
        if (isMaxStock) {
          plusBtn.disabled = true;
          plusBtn.style.backgroundColor = '#E9ECEF';
          plusBtn.style.color = '#CED4DA';
          plusBtn.style.cursor = 'not-allowed';
        } else {
          plusBtn.disabled = false;
          plusBtn.style.backgroundColor = 'var(--primary-color)';
          plusBtn.style.color = 'white';
          plusBtn.style.cursor = 'pointer';
        }
      }

      // 소계: 동전 아이콘 반복 (최대 5개)
      if (subEl) {
        const subTotal = cart[idx].point * cart[idx].quantity;
        const maxC = 5;
        const cCount = Math.min(subTotal, maxC);
        subEl.innerHTML = '🪙'.repeat(cCount) + (subTotal > maxC ? `<span style="font-size:13px;font-weight:700;color:var(--text-muted);margin-left:2px">(${subTotal})</span>` : '');
      }
      if (unitEl) {
        const p = cart[idx].point;
        unitEl.innerHTML = '🪙'.repeat(Math.min(p, 5)) + (p > 5 ? `<span style="font-size:12px;color:var(--text-muted);margin-left:2px">(${p})</span>` : '');
      }

      AppState.setCart(cart);
      updateBill();
      AppState.vibrate(30);
      AppState.playClickSound();
    }

    // ── 항목 삭제 ────────────────────────────────────────────────
    function removeItem(snackId) {
      const cardEl = document.querySelector(`[data-card-snack="${snackId}"]`);

      // 슬라이드-아웃 애니메이션
      if (cardEl) {
        cardEl.classList.add('removing');
        cardEl.addEventListener('animationend', () => {
          cardEl.remove();
          finishRemove(snackId);
        }, { once: true });
      } else {
        finishRemove(snackId);
      }

      AppState.vibrate([40, 30, 40]);
      AppState.playWarningSound();
    }

    function finishRemove(snackId) {
      cart = cart.filter(i => i.snackId != snackId);
      AppState.setCart(cart);
      updateBill();

      if (cart.length === 0) {
        document.getElementById('order-item-list').innerHTML =
          `<div class="cart-empty-hint">🛒 담은 간식이 없어요!<br>이전으로 돌아가서 간식을 골라주세요.</div>`;
        AppState.speak('담은 간식이 없습니다. 이전 화면으로 이동해주세요.');
      }
    }

    // ── 리스트 렌더링 ────────────────────────────────────────────
    function renderOrderList() {
      const listEl = document.getElementById('order-item-list');
      listEl.innerHTML = '';

      if (cart.length === 0) {
        listEl.innerHTML = `<div class="cart-empty-hint">🛒 담은 간식이 없어요!</div>`;
        return;
      }

      cart.forEach(item => {
        const itemImgUrl   = AppState.convertDriveImageUrl(item.imageUrl);
        const safeImgUrl   = AppState.escapeAttr(itemImgUrl);
        const safeName     = AppState.escapeHtml(item.name);
        const safeEmoji    = AppState.escapeHtml(AppState.getSnackEmoji(item.name));
        const safeSnackId  = AppState.escapeAttr(String(item.snackId));

        let imgHTML = '';
        if (itemImgUrl && itemImgUrl.trim() !== '') {
          imgHTML = `<img src="${safeImgUrl}" alt="${safeName}" class="order-item-img"
                      onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
        }
        const emojiHTML = `<div class="order-item-emoji-fallback" style="${itemImgUrl ? 'display:none;' : 'display:flex;'}">${safeEmoji}</div>`;

        const cardEl = document.createElement('div');
        cardEl.className = 'order-item-editable';
        cardEl.setAttribute('data-card-snack', safeSnackId);
        cardEl.innerHTML = `
          <!-- 이미지 -->
          <div class="order-item-img-container">
            ${imgHTML}
            ${emojiHTML}
          </div>

          <!-- 이름 + 소계 (동전 아이콘 표시) -->
          <div class="confirm-item-info">
            <div class="confirm-item-name">${safeName}</div>
            <div class="confirm-item-unit confirm-item-unit-coin" data-unit-snack="${safeSnackId}">${'🪙'.repeat(Math.min(item.point, 5))}${item.point > 5 ? `<span style="font-size:12px;color:var(--text-muted);margin-left:2px">(${item.point})</span>` : ''}</div>
            <div class="confirm-item-subtotal confirm-item-subtotal-coin" data-sub-snack="${safeSnackId}">${'🪙'.repeat(Math.min(item.point * item.quantity, 5))}${item.point * item.quantity > 5 ? `<span style="font-size:13px;font-weight:700;color:var(--text-muted);margin-left:2px">(${item.point * item.quantity})</span>` : ''}</div>
          </div>

          <!-- 수량 조절 + 삭제 -->
          <div class="confirm-item-controls">
            <div class="confirm-qty-row">
              <button class="confirm-btn-qty confirm-btn-minus" id="confirm-minus-${safeSnackId}" aria-label="${safeName} 수량 줄이기">−</button>
              <span class="confirm-qty-val" data-qty-snack="${safeSnackId}">${Number(item.quantity)}</span>
              ${(() => {
                const isMax = item.quantity >= (item.stock ?? 999);
                return `<button class="confirm-btn-qty confirm-btn-plus" id="confirm-plus-${safeSnackId}" aria-label="${safeName} 수량 늘리기" ${isMax ? 'disabled style="background-color:#E9ECEF;color:#CED4DA;cursor:not-allowed;"' : ''}>+</button>`;
              })()}
            </div>
            <button class="confirm-btn-delete" id="confirm-del-${safeSnackId}" aria-label="${safeName} 삭제">🗑</button>
          </div>
        `;

        listEl.appendChild(cardEl);

        // 이벤트 바인딩 (터치 보정 적용)
        const minusBtn  = cardEl.querySelector(`#confirm-minus-${safeSnackId}`);
        const plusBtn   = cardEl.querySelector(`#confirm-plus-${safeSnackId}`);
        const deleteBtn = cardEl.querySelector(`#confirm-del-${safeSnackId}`);

        minusBtn.addEventListener('pointerdown', e => e.stopPropagation());
        AppState.bindCardTap(minusBtn, e => {
          e.stopPropagation();
          changeQty(item.snackId, -1);
        });

        plusBtn.addEventListener('pointerdown', e => e.stopPropagation());
        AppState.bindCardTap(plusBtn, e => {
          e.stopPropagation();
          changeQty(item.snackId, 1);
        });

        deleteBtn.addEventListener('pointerdown', e => e.stopPropagation());
        AppState.bindCardTap(deleteBtn, e => {
          e.stopPropagation();
          removeItem(item.snackId);
        });
      });
    }

    // ── 초기화 ───────────────────────────────────────────────────
    function initData() {
      user = AppState.getSelectedUser();
      cart = AppState.getCart();

      if (!user || cart.length === 0) {
        window.location.href = 'index.html';
        return;
      }

      const isGuest = (user.userId === 'guest');
      document.getElementById('user-badge-container').innerHTML =
        `<span class="user-badge">${AppState.escapeHtml(user.nickname)}${isGuest ? ' (체험)' : ' 님'}</span>`;
      
      // 보유 크레딧 숫자만 업데이트 (HTML 구조에 🪙 아이콘 포함)
      document.getElementById('my-credit-num').textContent = user.credit ?? 0;

      if (isGuest) {
        const firstRowSpan = document.querySelector('.bill-row span');
        if (firstRowSpan) {
          firstRowSpan.textContent = '체험 동전';
        }
      }

      renderOrderList();
      updateBill();
    }

    // ── 주문 제출 ────────────────────────────────────────────────
    async function submitOrder() {
      if (cart.length === 0) return;

      const totalPoints  = cart.reduce((sum, i) => sum + i.point * i.quantity, 0);
      const remainPoints = user.credit - totalPoints;

      const loadingOverlay = document.getElementById('loading-overlay');
      const errorBox       = document.getElementById('error-message-box');
      const btnSubmit      = document.getElementById('btn-submit');
      const btnPrev        = document.getElementById('btn-prev');

      loadingOverlay.style.display = 'flex';
      errorBox.style.display = 'none';
      btnSubmit.disabled = true;
      btnPrev.disabled   = true;

      const orderPayload = {
        userId: user.userId,
        items: cart.map(item => ({ snackId: item.snackId, quantity: item.quantity }))
      };

      if (user.userId === 'guest') {
        orderPayload.guestName = user.nickname;
      }

      try {
        const response = await fetchAPI('placeOrder', { method: 'POST', body: orderPayload });

        if (response && response.success) {
          user.credit = remainPoints;
          AppState.setSelectedUser(user);

          localStorage.setItem('lastOrderSummary', JSON.stringify({
            userId:       user.userId,
            nickname:     user.nickname,
            usedPoints:   totalPoints,
            remainPoints: remainPoints,
            orderNo:      response.orderNo || '',
            items:        cart.map(item => ({ name: item.name, quantity: item.quantity }))
          }));

          AppState.clearCart();
          setTimeout(() => { window.location.href = 'complete.html'; }, 500);
        } else {
          throw new Error(response.message || '서버 오류가 발생했습니다.');
        }
      } catch (error) {
        console.error('주문 제출 중 오류:', error);
        loadingOverlay.style.display = 'none';
        btnSubmit.disabled = false;
        btnPrev.disabled   = false;

        let displayMessage = '인터넷 연결이 불안정합니다. 잠시 후 다시 시도해 주세요.';
        const errStr = String(error.message || '');

        if (errStr.includes('재고'))               displayMessage = '간식의 남은 수량이 부족해서 주문할 수 없어요!';
        else if (errStr.includes('크레딧') || errStr.includes('포인트') || errStr.includes('잔액'))
                                                    displayMessage = '크레딧(돈)이 부족해서 주문할 수 없어요!';
        else if (errStr)                            displayMessage = errStr;

        errorBox.textContent = `⚠️ 주문 실패: ${displayMessage}`;
        errorBox.style.display = 'block';
        alert(`주문 실패\n\n${displayMessage}`);
        AppState.vibrate([100, 100, 100]);
      }
    }

    // ── 바인딩 ───────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      initData();

      AppState.bindCardTap(document.getElementById('btn-prev'), () => {
        window.location.href = 'menu.html';
      });

      AppState.bindCardTap(document.getElementById('btn-submit'), () => {
        submitOrder();
      });
    });
  </script>
</body>
</html>
