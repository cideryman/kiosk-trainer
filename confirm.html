<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 주문 확인</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="간식 키오스크">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top">
        <h1 class="kiosk-title">📋 주문 확인</h1>
        <div id="user-badge-container">
          <!-- JS 동적 생성 -->
        </div>
      </div>
    </header>

    <!-- 바디 -->
    <main class="kiosk-body" id="main-content">
      <div class="guide-text">
        내가 고른 <span>간식</span>이 맞나요?
      </div>

      <!-- 주문 리스트 영역 -->
      <div class="order-list" id="order-item-list">
        <!-- JS 동적 생성 -->
      </div>

      <!-- 최종 계산서 영역 -->
      <div class="bill-box">
        <div class="bill-row">
          <span>내 보유 크레딧</span>
          <span class="bill-val" id="my-credit">0 크레딧</span>
        </div>
        <div class="bill-row">
          <span>쓸 크레딧</span>
          <span class="bill-val highlight" id="use-credit">- 0 크레딧</span>
        </div>
        <div class="bill-row total">
          <span>주문 후 남는 크레딧</span>
          <span class="bill-val" id="remain-credit">0 크레딧</span>
        </div>
      </div>

      <!-- 에러 알림 영역 (통신 에러 등) -->
      <div class="error-box" id="error-message-box" style="display: none; margin-top: 10px;">
        ⚠️ 인터넷이 연결되지 않았습니다. 잠시 후 다시 시도해 주세요.
      </div>
    </main>

    <!-- 푸터 버튼 -->
    <footer class="kiosk-footer">
      <div style="display: flex; gap: 16px;">
        <button class="btn btn-gray" id="btn-prev" style="flex: 1; font-size: 20px;">이전으로</button>
        <button class="btn btn-secondary" id="btn-submit" style="flex: 2;">주문하기</button>
      </div>
    </footer>

    <!-- 로딩 오버레이 (주문 처리 중) -->
    <div class="overlay" id="loading-overlay" style="display: none;">
      <div class="spinner"></div>
      <div class="overlay-text">주문을 전송하고 있습니다.<br>잠시만 기다려주세요!</div>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let user = null;
    let cart = [];
    let totalPoints = 0;
    let remainPoints = 0;

    // 데이터 복구 및 검증
    function initData() {
      user = AppState.getSelectedUser();
      cart = AppState.getCart();

      // 세션 없을 시 첫 화면행
      if (!user || cart.length === 0) {
        window.location.href = 'index.html';
        return;
      }

      // 상단 유저 정보 표시
      document.getElementById('user-badge-container').innerHTML = `<span class="user-badge">${user.nickname} 님</span>`;

      // 주문서 총합 계산
      totalPoints = cart.reduce((sum, item) => sum + (item.point * item.quantity), 0);
      remainPoints = user.credit - totalPoints;

      // 계산서 바인딩
      document.getElementById('my-credit').textContent = AppState.formatPoint(user.credit);
      document.getElementById('use-credit').textContent = `-${AppState.formatPoint(totalPoints)}`;
      
      const remainEl = document.getElementById('remain-credit');
      remainEl.textContent = AppState.formatPoint(remainPoints);

      if (remainPoints < 0) {
        // 혹시라도 크레딧이 초과된 경우 주문 불가 경고 처리
        remainEl.className = 'bill-val deficit';
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').textContent = '크레딧 부족';
        
        const errorBox = document.getElementById('error-message-box');
        errorBox.textContent = '⚠️ 보유한 크레딧보다 주문 금액이 커서 주문할 수 없습니다.';
        errorBox.style.display = 'block';
      }

      renderOrderList();
    }

    // 주문 품목 렌더링
    function renderOrderList() {
      const listEl = document.getElementById('order-item-list');
      listEl.innerHTML = '';

      cart.forEach(item => {
        const itemEl = document.createElement('div');
        itemEl.className = 'order-item';
        itemEl.innerHTML = `
          <div class="order-item-info">
            <div class="order-item-name">${item.name}</div>
            <div class="order-item-qty">${item.quantity}개</div>
          </div>
          <div class="order-item-point">${AppState.formatPoint(item.point * item.quantity)}</div>
        `;
        listEl.appendChild(itemEl);
      });
    }

    // 주문 제출
    async function submitOrder() {
      const loadingOverlay = document.getElementById('loading-overlay');
      const errorBox = document.getElementById('error-message-box');
      const btnSubmit = document.getElementById('btn-submit');
      const btnPrev = document.getElementById('btn-prev');

      // 중복 제출 차단
      loadingOverlay.style.display = 'flex';
      errorBox.style.display = 'none';
      btnSubmit.disabled = true;
      btnPrev.disabled = true;

      // API 포맷 규격 준비
      const orderPayload = {
        userId: user.userId,
        items: cart.map(item => ({
          snackId: item.snackId,
          quantity: item.quantity
        }))
      };

      try {
        const response = await fetchAPI('placeOrder', {
          method: 'POST',
          body: orderPayload
        });

        if (response && response.success) {
          // 주문 성공
          // 로컬 스토리지에 남은 크레딧 반영 (API fallback 테스트 동기화를 위해)
          user.credit = remainPoints;
          AppState.setSelectedUser(user);

          // 주문 완료 화면에서 출력할 주문 요약 임시 저장
          localStorage.setItem('lastOrderSummary', JSON.stringify({
            nickname: user.nickname,
            usedPoints: totalPoints,
            remainPoints: remainPoints
          }));

          // 장바구니 초기화 (주문 성공 후 장바구니 삭제 요구사항)
          AppState.clearCart();

          // 최종 완료 페이지로 이동
          setTimeout(() => {
            window.location.href = 'complete.html';
          }, 500);
        } else {
          throw new Error(response.message || '서버 오류가 발생했습니다.');
        }
      } catch (error) {
        console.error('주문 제출 중 오류:', error);
        loadingOverlay.style.display = 'none';
        btnSubmit.disabled = false;
        btnPrev.disabled = false;

        let displayMessage = '인터넷 연결이 불안정합니다. 잠시 후 다시 시도해 주세요.';
        const errStr = String(error.message || '');
        
        if (errStr.includes('재고')) {
          displayMessage = '간식의 남은 수량이 부족해서 주문할 수 없어요!';
        } else if (errStr.includes('크레딧') || errStr.includes('포인트') || errStr.includes('잔액')) {
          displayMessage = '크레딧(돈)이 부족해서 주문할 수 없어요!';
        } else if (errStr) {
          displayMessage = errStr;
        }

        // 화면 메시지 박스 표시
        errorBox.textContent = `⚠️ 주문 실패: ${displayMessage}`;
        errorBox.style.display = 'block';
        
        // 시각적으로 한 번 더 인지할 수 있도록 alert 표시
        alert(`주문 실패\n\n${displayMessage}`);
        
        AppState.vibrate([100, 100, 100]); // 에러 진동 피드백
      }
    }

    // 바인딩
    window.addEventListener('DOMContentLoaded', () => {
      initData();

      // 이전으로
      document.getElementById('btn-prev').addEventListener('click', () => {
        window.location.href = 'menu.html';
      });

      // 주문제출
      document.getElementById('btn-submit').addEventListener('click', () => {
        submitOrder();
      });
    });
  </script>
</body>
</html>
