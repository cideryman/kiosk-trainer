<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 게스트 체험</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="간식 키오스크">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    .guest-input-card {
      background-color: var(--card-bg);
      border: 3px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 30px 24px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin: auto 0;
      transition: border-color 0.2s;
    }

    .guest-input-card:focus-within {
      border-color: var(--secondary-color);
    }

    .guest-input {
      width: 100%;
      min-height: 64px;
      padding: 12px 20px;
      font-size: 24px;
      font-weight: 800;
      border: 3px solid var(--border-color);
      border-radius: var(--radius-sm);
      text-align: center;
      color: var(--text-main);
      background-color: #F8F9FA;
      transition: all 0.15s ease-in-out;
    }

    .guest-input:focus {
      outline: none;
      background-color: white;
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 4px rgba(46, 196, 182, 0.15);
    }

    .experience-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background-color: #E0F2F1;
      border: 2px solid #80CBC4;
      color: #00796B;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 800;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top" style="justify-content: center;">
        <h1 class="kiosk-title" style="font-size: 26px; color: var(--secondary-hover);">🟢 게스트 체험관</h1>
      </div>
    </header>

    <!-- 바디 -->
    <main class="kiosk-body" id="main-content" style="justify-content: center;">
      <div class="guide-text">
        반갑습니다! 😊<br>
        체험하실 <span>이름</span>을 적어주세요.
      </div>

      <div class="guest-input-card">
        <div class="experience-badge">
          🎫 가상 크레딧 10개 무료 지급
        </div>

        <input type="text" id="guest-name-input" class="guest-input" placeholder="예: 홍길동" maxlength="10" autocomplete="off" autofocus>
        
        <div style="font-size: 15px; font-weight: 700; color: var(--text-muted); text-align: center; line-height: 1.4; word-break: keep-all;">
          * 개인정보 수집 및 동의 과정 없이<br>체험을 위해 이름만 잠시 저장합니다.
        </div>
      </div>
    </main>

    <!-- 푸터 버튼 -->
    <footer class="kiosk-footer" style="display: flex; gap: 12px;">
      <button class="btn btn-gray" id="btn-back" style="flex: 1; min-height: 64px; font-size: 20px;">이전으로</button>
      <button class="btn btn-secondary" id="btn-start" style="flex: 2; min-height: 64px; font-size: 22px;">체험 시작하기</button>
    </footer>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // 혹시 있을 상태 초기화
      AppState.resetAll();

      const input = document.getElementById('guest-name-input');
      const btnStart = document.getElementById('btn-start');
      const btnBack = document.getElementById('btn-back');

      // 입력란 포커스
      input.focus();

      // 시작하기 함수
      function startGuestMode() {
        const guestName = input.value.trim();
        if (!guestName) {
          alert('이름을 입력해 주세요!');
          input.focus();
          AppState.vibrate([100, 100]);
          return;
        }

        // 게스트 임시 사용자 저장 (10 가상 크레딧 부여)
        AppState.setSelectedUser({
          userId: 'guest',
          nickname: guestName,
          credit: 10
        });

        AppState.vibrate(60);
        AppState.speak(`${guestName} 님, 맛있는 체험을 시작합니다.`);
        
        // 이동
        window.location.href = 'menu.html';
      }

      // 이벤트 바인딩
      AppState.bindCardTap(btnStart, () => {
        startGuestMode();
      });

      // 엔터키 지원
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          startGuestMode();
        }
      });

      AppState.bindCardTap(btnBack, () => {
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
