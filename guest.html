<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>배달왔삼 - 게스트 체험</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest-guest.json">
  <meta name="theme-color" content="#2EC4B6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="배달왔삼">
  <link rel="apple-touch-icon" href="icons/guest-180.png">
  <style>
    .guest-input-card {
      background-color: var(--card-bg);
      border: 3px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 30px 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin: auto 0;
      transition: border-color 0.2s;
    }

    .guest-input-card:focus-within {
      border-color: var(--secondary-color);
    }

    .guest-input {
      width: 100%;
      min-height: 64px;
      padding: 12px 20px;
      font-size: 24px;
      font-weight: 800;
      border: 3px solid var(--border-color);
      border-radius: var(--radius-sm);
      text-align: center;
      color: var(--text-main);
      background-color: #F8F9FA;
      transition: all 0.15s ease-in-out;
    }

    .guest-input:focus {
      outline: none;
      background-color: white;
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 4px rgba(46, 196, 182, 0.15);
    }

    .experience-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background-color: #E0F2F1;
      border: 2px solid #80CBC4;
      color: #00796B;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 800;
      margin: 0 auto;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #ffffff;
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .review-list {
      max-height: 320px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 배달왔삼 헤더 고정 -->
    <header class="app-header">
      <div style="display: flex; flex-direction: column; gap: 4px;">
        <div style="font-size: 24px; font-weight: 850; color: var(--secondary-hover); display: flex; align-items: center; gap: 6px;">
          🚴 배달왔삼
        </div>
        <div style="font-size: 13px; font-weight: 700; color: var(--text-muted);">
          직업체험 배달 서비스
        </div>
      </div>
      <button id="btn-header-board" style="background: none; border: none; font-size: 28px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center;">🏆</button>
    </header>

    <!-- 바디 -->
    <main class="kiosk-body" id="main-content" style="justify-content: flex-start; gap: 24px; padding-top: 16px;">
      <!-- 선택 화면 -->
      <div id="view-select" style="display: flex; flex-direction: column; gap: 24px; width: 100%;">
        <!-- 마감 안내 (기본 숨김) -->
        <div id="guest-closed-notice" style="display: none; text-align: center; padding: 28px 20px; background-color: #FFF5F5; border: 3px solid #FEB2B2; border-radius: var(--radius-md); box-shadow: var(--shadow-sm);">
          <div style="font-size: 48px; margin-bottom: 8px;">🔒</div>
          <div style="font-size: 22px; font-weight: 850; color: #9B2C2C; line-height: 1.4; word-break: keep-all;" id="closed-notice-text">게스트 주문이 마감되었습니다.</div>
          <div style="font-size: 16px; font-weight: 700; color: var(--text-muted); margin-top: 8px;">아래 버튼으로 기존 주문을 확인할 수 있습니다.</div>
        </div>

        <!-- 남은 시간 표시 (기본 숨김) -->
        <div id="guest-remaining-time" style="display: none; text-align: center; padding: 12px 16px; background-color: #E0F2F1; border: 2px solid #80CBC4; border-radius: var(--radius-sm); font-size: 18px; font-weight: 800; color: #00796B;">
          ⏰ 남은 시간: <span id="remaining-timer">--:--</span>
        </div>

        <div class="guide-text" id="guide-text-main">
          방문객 / 체험 모드입니다. 😊<br>
          <span>원하시는 메뉴</span>를 골라주세요!
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <button class="btn btn-secondary" id="btn-new-order" style="min-height: 84px; font-size: 24px;">
            🛒 새 주문하기
          </button>
          <button class="btn btn-primary" id="btn-check-orders" style="min-height: 84px; font-size: 24px; background-color: var(--primary-color);">
            🎫 내 주문 확인하기
          </button>
        </div>

        <!-- 최근 칭찬 보드 -->
        <div id="praise-board-section" style="margin-top: 24px; display: flex; flex-direction: column; gap: 12px; background-color: #FFFDF9; border: 3px solid var(--border-color); border-radius: var(--radius-md); padding: 20px; box-shadow: var(--shadow-sm);">
          <div id="review-toggle" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
            <div style="font-size: 20px; font-weight: 850; color: var(--secondary-hover); display: flex; align-items: center; gap: 8px;">
              ❤️ 최근 후기 <span id="review-count-badge" style="font-size: 14px; color: var(--text-muted);"></span>
            </div>
            <div id="review-toggle-text" style="font-size: 16px; font-weight: 700; color: var(--text-muted);">▼ 펼쳐보기</div>
          </div>
          
          <div id="praise-content" style="display: none; flex-direction: column; gap: 12px;">
            <div style="font-size: 14px; font-weight: 700; color: var(--text-muted); margin-top: 6px; line-height: 1.4; word-break: keep-all;">
              남겨주신 응원은 이용자들의 다음 활동에 큰 힘이 됩니다.
            </div>
            <div id="praise-list-container" class="review-list" style="display: flex; flex-direction: column; gap: 12px; padding: 2px;">
              <div style="text-align: center; padding: 24px; border: 2px dashed var(--border-color); border-radius: var(--radius-sm); color: var(--text-muted); font-weight: 700; font-size: 16px;">
                칭찬 보드를 불러오고 있습니다... 💫
              </div>
            </div>
            <button class="btn btn-gray" id="btn-more-reviews" style="width: 100%; min-height: 48px; font-size: 16px; margin-top: 8px; font-weight: 800; border: 2px solid var(--border-color); background-color: white;">❤️ 후기 더보기</button>
          </div>
        </div>
      </div>

      <!-- 이름 입력 화면 (기본 숨김) -->
      <div id="view-input" style="display: none; flex-direction: column; gap: 20px; width: 100%;">
        <div class="guide-text">
          반갑습니다! 😊<br>
          체험하실 <span>이름</span>을 적어주세요.
        </div>

        <div class="guest-input-card">
          <div class="experience-badge" id="guest-credit-badge">
            🎫 가상 크레딧 10개 무료 지급
          </div>

          <input type="text" id="guest-name-input" class="guest-input" placeholder="예: 홍길동" maxlength="10" autocomplete="off">
          
          <div style="font-size: 15px; font-weight: 700; color: var(--text-muted); text-align: center; line-height: 1.4; word-break: keep-all;">
            * 개인정보 수집 및 동의 과정 없이<br>체험을 위해 이름만 잠시 저장합니다.
          </div>
        </div>
      </div>
    </main>

    <!-- 푸터 버튼 -->
    <footer class="kiosk-footer" style="display: flex; gap: 12px;">
      <button class="btn btn-gray" id="btn-back" style="flex: 1; min-height: 64px; font-size: 20px;">이전으로</button>
      <button class="btn btn-secondary" id="btn-start" style="flex: 2; min-height: 64px; font-size: 22px; display: none;">체험 시작하기</button>
    </footer>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      // 혹시 있을 상태 초기화
      AppState.resetAll();

      const viewSelect = document.getElementById('view-select');
      const viewInput = document.getElementById('view-input');
      const input = document.getElementById('guest-name-input');
      
      const btnNewOrder = document.getElementById('btn-new-order');
      const btnCheckOrders = document.getElementById('btn-check-orders');
      const btnStart = document.getElementById('btn-start');
      const btnBack = document.getElementById('btn-back');

      const closedNotice = document.getElementById('guest-closed-notice');
      const closedNoticeText = document.getElementById('closed-notice-text');
      const remainingTimeBox = document.getElementById('guest-remaining-time');
      const remainingTimerSpan = document.getElementById('remaining-timer');
      const guideText = document.getElementById('guide-text-main');
      const guestCreditBadge = document.getElementById('guest-credit-badge');

      let currentStep = 'select'; // 'select' or 'input'
      let guestBaseCredit = GUEST_DEFAULT_CREDIT;
      let guestDeliveryFee = GUEST_DELIVERY_FEE;
      let remainingCountdown = null;
      let isGuestOpen = false;

      // 운영 상태 확인
      try {
        const settingsRes = await fetchAPI('getGuestSettings');
        if (settingsRes && settingsRes.success) {
          isGuestOpen = settingsRes.isGuestOpenNow;
          guestBaseCredit = settingsRes.guestBaseCredit ?? GUEST_DEFAULT_CREDIT;
          guestDeliveryFee = settingsRes.guestDeliveryFee ?? GUEST_DELIVERY_FEE;

          // sessionStorage에 설정값 캐시 (다음 화면에서 사용)
          sessionStorage.setItem('guestBaseCredit', String(guestBaseCredit));
          sessionStorage.setItem('guestDeliveryFee', String(guestDeliveryFee));

          if (!isGuestOpen) {
            // 마감 상태
            closedNotice.style.display = 'block';
            closedNoticeText.textContent = settingsRes.message || '게스트 주문이 마감되었습니다.';
            btnNewOrder.disabled = true;
            btnNewOrder.style.opacity = '0.4';
            btnNewOrder.style.cursor = 'not-allowed';
            guideText.innerHTML = '방문객 / 체험 모드입니다. 😊<br><span style="color: var(--danger-color); font-size: 18px;">현재 주문이 마감된 상태입니다.</span>';
          } else {
            // 운영 중 - 남은 시간 표시
            if (settingsRes.remainingSeconds > 0) {
              remainingTimeBox.style.display = 'block';
              let remaining = settingsRes.remainingSeconds;
              updateTimerDisplay(remaining);
              remainingCountdown = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                  clearInterval(remainingCountdown);
                  // 시간 만료 - 마감 상태로 전환
                  isGuestOpen = false;
                  remainingTimeBox.style.display = 'none';
                  closedNotice.style.display = 'block';
                  closedNoticeText.textContent = '게스트 주문 운영 시간이 종료되었습니다.';
                  btnNewOrder.disabled = true;
                  btnNewOrder.style.opacity = '0.4';
                  btnNewOrder.style.cursor = 'not-allowed';
                  guideText.innerHTML = '방문객 / 체험 모드입니다. 😊<br><span style="color: var(--danger-color); font-size: 18px;">현재 주문이 마감된 상태입니다.</span>';
                  return;
                }
                updateTimerDisplay(remaining);
              }, 1000);
            }
          }
        }
      } catch (e) {
        console.warn('게스트 운영 설정 조회 실패:', e);
        // API 실패 시 운영 보호를 위해 새 주문 차단 (내 주문 확인하기는 가능)
        isGuestOpen = false;
        closedNotice.style.display = 'block';
        closedNoticeText.textContent = '운영 상태를 확인할 수 없어 잠시 주문을 받을 수 없습니다.';
        btnNewOrder.disabled = true;
        btnNewOrder.style.opacity = '0.4';
        btnNewOrder.style.cursor = 'not-allowed';
        guideText.innerHTML = '방문객 / 체험 모드입니다. 😊<br><span style="color: var(--danger-color); font-size: 18px;">상태 확인이 불가하여 주문이 제한되었습니다.</span>';
      }

      // 크레딧 배지 적용
      if (guestCreditBadge) {
        guestCreditBadge.textContent = `🎫 가상 크레딧 ${guestBaseCredit}개 무료 지급`;
      }

      function updateTimerDisplay(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = seconds % 60;
        remainingTimerSpan.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      }

      function showStep(step) {
        currentStep = step;
        if (step === 'select') {
          viewSelect.style.display = 'flex';
          viewInput.style.display = 'none';
          btnStart.style.display = 'none';
          btnBack.style.display = 'none';
        } else {
          viewSelect.style.display = 'none';
          viewInput.style.display = 'flex';
          btnStart.style.display = 'flex';
          btnBack.style.display = 'flex';
          btnBack.style.flex = '1';
          input.focus();
        }
      }

      // 이벤트 바인딩
      AppState.bindCardTap(btnNewOrder, () => {
        if (!isGuestOpen) {
          AppState.vibrate([100, 100]);
          return;
        }
        showStep('input');
      });

      AppState.bindCardTap(btnCheckOrders, () => {
        window.location.href = 'guest-orders.html';
      });

      // 시작하기 함수
      function startGuestMode() {
        if (!isGuestOpen) {
          alert('게스트 주문이 마감된 상태입니다.');
          return;
        }
        const guestName = input.value.trim();
        if (!guestName) {
          alert('이름을 입력해 주세요!');
          input.focus();
          AppState.vibrate([100, 100]);
          return;
        }

        // 게스트 임시 사용자 저장
        AppState.setSelectedUser({
          userId: 'guest',
          nickname: guestName,
          credit: guestBaseCredit
        });

        AppState.vibrate(60);
        AppState.speak(`${guestName} 님, 맛있는 체험을 시작합니다.`);
        
        // 이동
        window.location.href = 'menu.html';
      }

      AppState.bindCardTap(btnStart, () => {
        startGuestMode();
      });

      // 엔터키 지원
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          startGuestMode();
        }
      });

      AppState.bindCardTap(btnBack, () => {
        if (currentStep === 'input') {
          showStep('select');
        } else {
          window.location.href = 'index.html';
        }
      });

      // 헤더 보드 버튼 이벤트
      const btnHeaderBoard = document.getElementById('btn-header-board');
      if (btnHeaderBoard) {
        AppState.bindCardTap(btnHeaderBoard, () => {
          window.location.href = 'board.html';
        });
      }

      // 후기 더보기 버튼 이벤트
      const btnMoreReviews = document.getElementById('btn-more-reviews');
      if (btnMoreReviews) {
        AppState.bindCardTap(btnMoreReviews, () => {
          window.location.href = 'board.html';
        });
      }

      // 칭찬 보드 로드 함수
      async function loadRecentReviews() {
        const container = document.getElementById('praise-list-container');
        if (!container) return;

        try {
          const res = await fetchAPI('getRecentReviews');
          if (res && res.success && Array.isArray(res.reviews) && res.reviews.length > 0) {
            container.innerHTML = '';
            
            const reviewCountBadge = document.getElementById('review-count-badge');
            if (reviewCountBadge) {
              reviewCountBadge.textContent = `(${res.reviews.length})`;
            }
            
            res.reviews.forEach(review => {
              const card = document.createElement('div');
              card.style.backgroundColor = 'white';
              card.style.border = '2px solid var(--border-color)';
              card.style.borderRadius = 'var(--radius-sm)';
              card.style.padding = '12px 16px';
              card.style.display = 'flex';
              card.style.flexDirection = 'column';
              card.style.gap = '6px';
              card.style.boxShadow = '0 2px 4px rgba(0,0,0,0.02)';
              
              // 훈련생 이름은 실명 노출 없이 '오늘의 배달원' 등으로 통일 표시
              const recipientName = "오늘의 배달원"; 
              const maskedGuest = maskGuestName(review.guestName);
              const stampHtml = review.stamp ? `<span style="background-color: #FFF3E0; border: 1.5px solid var(--primary-color); padding: 2px 8px; border-radius: 999px; font-size: 13px; font-weight: 800; color: #E65100;">${AppState.escapeHtml(review.stamp)}</span>` : '';
              
              let tagsHtml = '';
              if (review.tags) {
                const tagsList = String(review.tags).split(',').map(t => t.trim()).filter(Boolean);
                tagsHtml = tagsList.map(t => `<span style="background-color: #E0F2F1; border: 1.5px solid var(--secondary-color); padding: 2px 8px; border-radius: 999px; font-size: 13px; font-weight: 800; color: #00796B; margin-left: 4px;">#${AppState.escapeHtml(t)}</span>`).join('');
              }

              card.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px;">
                  <span style="font-weight: 850; font-size: 15px; color: var(--secondary-hover);">👤 ${AppState.escapeHtml(recipientName)} 님에게</span>
                  <div style="display: flex; gap: 4px; align-items: center;">
                    ${stampHtml}
                  </div>
                </div>
                <div style="font-size: 15px; font-weight: 700; color: var(--text-main); line-height: 1.4; word-break: break-all; margin: 4px 0;">
                  "${AppState.escapeHtml(review.comment || '응원합니다!')}"
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-top: 4px;">
                  <div style="display: flex; flex-wrap: wrap; gap: 4px;">${tagsHtml}</div>
                  <span>작성자: ${AppState.escapeHtml(maskedGuest)} 님</span>
                </div>
              `;
              container.appendChild(card);
            });
          } else {
            container.innerHTML = `
              <div style="text-align: center; padding: 24px; border: 2px dashed var(--border-color); border-radius: var(--radius-sm); color: var(--text-muted); font-weight: 700; font-size: 15px;">
                첫 번째 따뜻한 응원의 한마디를 남겨보세요! 🥰
              </div>
            `;
          }
        } catch (e) {
          console.warn('칭찬 보드 로드 실패:', e);
          container.innerHTML = `
            <div style="text-align: center; padding: 24px; border: 2px dashed var(--border-color); border-radius: var(--radius-sm); color: var(--text-muted); font-weight: 700; font-size: 15px;">
              칭찬 보드를 불러오지 못했습니다. 😢
            </div>
          `;
        }
      }

      function maskGuestName(name) {
        if (!name) return '게스트';
        const clean = name.replace(' (체험)', '').trim();
        if (clean.length <= 1) return clean;
        if (clean.length === 2) return clean[0] + '*';
        return clean[0] + '*'.repeat(clean.length - 2) + clean[clean.length - 1];
      }

      // 후기 접기/펼치기 토글
      const reviewToggle = document.getElementById('review-toggle');
      const praiseContent = document.getElementById('praise-content');
      const reviewToggleText = document.getElementById('review-toggle-text');
      if (reviewToggle && praiseContent && reviewToggleText) {
        reviewToggle.addEventListener('click', () => {
          const isCollapsed = praiseContent.style.display === 'none';
          if (isCollapsed) {
            praiseContent.style.display = 'flex';
            reviewToggleText.textContent = '▲ 접기';
          } else {
            praiseContent.style.display = 'none';
            reviewToggleText.textContent = '▼ 펼쳐보기';
          }
          AppState.vibrate(30);
        });
      }

      showStep('select');
      loadRecentReviews();
    });
  </script>
</body>
</html>
