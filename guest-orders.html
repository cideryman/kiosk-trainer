<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 내 주문 확인</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest-guest.json">
  <meta name="theme-color" content="#2EC4B6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="배달왔삼">
  <link rel="apple-touch-icon" href="icons/guest-180.png">
  <style>
    .section-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 12px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .order-card {
      background-color: var(--card-bg);
      border: 3px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }

    .order-card:active {
      transform: scale(0.97);
      border-color: var(--primary-color);
      background-color: #FFFDF9;
    }

    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .order-card-time {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .order-card-status {
      font-size: 16px;
      font-weight: 850;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
    }

    .status-n { background-color: #E3F2FD; color: #1E88E5; } /* 접수중 */
    .status-p { background-color: #FFF3E0; color: #FB8C00; } /* 준비중 */
    .status-r { background-color: #E0F2F1; color: #00897B; animation: pulseStatus 1.5s infinite alternate; } /* 준비완료 */
    .status-y { background-color: #F5F5F5; color: #757575; } /* 수령완료 */
    .status-c { background-color: #FFEBEE; color: #E53935; } /* 취소됨 */

    @keyframes pulseStatus {
      0% { box-shadow: 0 0 0 rgba(0, 137, 123, 0.2); }
      100% { box-shadow: 0 0 8px rgba(0, 137, 123, 0.6); }
    }

    .reply-box-active {
      animation: pulseReply 0.8s ease-in-out 2;
    }
    @keyframes pulseReply {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(56, 161, 105, 0.4); }
      50% { transform: scale(1.02); box-shadow: 0 0 14px rgba(56, 161, 105, 0.8); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(56, 161, 105, 0.4); }
    }

    .order-card-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .order-card-no {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .order-card-items {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
      word-break: keep-all;
    }

    .order-card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--secondary-hover);
    }

    /* 검색 박스 */
    .search-box {
      background-color: var(--card-bg);
      border: 3px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--secondary-color);
    }

    .search-input-wrapper {
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      height: 56px;
      padding: 10px 16px;
      font-size: 20px;
      font-weight: 800;
      border: 3px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      background-color: #F8F9FA;
      transition: all 0.15s ease-in-out;
    }

    .search-input:focus {
      outline: none;
      background-color: white;
      border-color: var(--secondary-color);
    }

    .search-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .search-row input {
      width: 100%;
    }

    .search-row button {
      width: 100%;
      min-height: 56px;
    }

    .btn-search {
      font-size: 20px;
      padding: 0 24px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 18px;
      font-weight: 700;
      background-color: var(--card-bg);
      border: 3px dashed var(--border-color);
      border-radius: var(--radius-md);
    }

    /* 후기 작성 전용 스타일 */
    .stamp-btn.active {
      border-color: var(--primary-color) !important;
      background-color: #FFF9E6 !important;
      color: var(--primary-color) !important;
    }
    .tag-capsule.active {
      background-color: #E0F2F1 !important;
      border-color: var(--secondary-color) !important;
      color: #00796B !important;
    }

    /* 후기 작성 모달 스타일 */
    html.modal-open,
    body.modal-open {
      overflow: hidden;
      height: 100%;
      touch-action: none;
    }

    .admin-modal {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 16px;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    .admin-modal-content {
      background-color: white;
      border-radius: var(--radius-md);
      width: 100%;
      max-width: 500px;
      max-height: 90dvh;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-sizing: border-box;
      animation: modalFadeIn 0.2s ease-out;
      border: 3px solid var(--border-color);
    }
    
    @keyframes modalFadeIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .admin-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--border-color);
      padding: 16px 20px;
      flex-shrink: 0;
    }
    
    .admin-modal-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--secondary-hover);
      margin: 0;
    }
    
    .admin-modal-close {
      background: none;
      border: none;
      font-size: 28px;
      font-weight: 800;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
    }
    
    .admin-modal-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 16px 20px;
    }
    
    .admin-modal-footer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 20px;
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      background: #fff;
      z-index: 2;
    }

    #review-photo-preview {
      max-width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 12px;
    }

    @media (max-width: 480px) {
      .admin-modal {
        align-items: stretch;
        padding: 12px;
      }
      .admin-modal-content {
        max-height: 92dvh;
      }
      #review-photo-preview {
        max-height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top" style="justify-content: center;">
        <h1 class="kiosk-title" style="font-size: 26px; color: var(--secondary-hover);">📋 내 주문 확인</h1>
      </div>
    </header>

    <!-- 바디 -->
    <main class="kiosk-body" id="main-content">
      <!-- 안내 문구 -->
      <div style="font-size: 15px; font-weight: 700; color: var(--text-muted); text-align: center; margin-bottom: 10px; background-color: #F8F9FA; padding: 12px; border-radius: var(--radius-sm); border: 2px solid var(--border-color);">
        * 본 기기에서 주문한 최근 내역을 표시합니다.<br>
        * 카카오로 연결한 경우 오늘 주문은 다른 기기에서도 확인할 수 있어요.
      </div>
      
      <!-- 최근 주문 내역 (서버 갱신) -->
      <div id="local-orders-section" style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
        <div class="section-title">🕒 내 주문 내역</div>
        <div id="local-orders-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
      </div>
    </main>

    <!-- 푸터 버튼 -->
    <footer class="kiosk-footer">
      <button class="btn btn-gray" id="btn-back" style="min-height: 64px; font-size: 20px;">이전으로</button>
    </footer>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay" style="display: none;">
      <div class="spinner"></div>
      <div class="overlay-text">주문 내역을 검색하고 있습니다...</div>
    </div>
  </div>

  <!-- 후기 작성 모달 -->
  <div class="admin-modal" id="modal-write-review" style="display: none;">
    <div class="admin-modal-content">
      <div class="admin-modal-header">
        <h2 class="admin-modal-title">💌 칭찬과 응원 보내기</h2>
        <button class="admin-modal-close" id="btn-close-review-modal">&times;</button>
      </div>
      <div class="admin-modal-body">
        <div style="font-size: 15px; font-weight: 700; color: var(--primary-color); text-align: center; line-height: 1.4; word-break: keep-all; background-color: #FFF9E6; border: 1.5px solid #FFE0B2; padding: 12px; border-radius: var(--radius-sm);">
          "남겨주신 응원은 이용자들의 다음 활동에 큰 힘이 됩니다."
        </div>
        
        <!-- 칭찬 스탬프 선택 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">칭찬 스탬프 고르기</label>
          <div style="display: grid; grid-template-columns: 1fr; gap: 10px;" id="stamp-select-group">
            <button type="button" class="btn stamp-btn active" data-stamp="👍 친절해요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">👍 친절해요</button>
            <button type="button" class="btn stamp-btn" data-stamp="⚡ 빨라요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">⚡ 빨라요</button>
            <button type="button" class="btn stamp-btn" data-stamp="🎁 감동이에요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">🎁 감동이에요</button>
            <button type="button" class="btn stamp-btn" data-stamp="☕ 응원해요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">☕ 응원해요</button>
          </div>
        </div>

        <!-- 태그 선택 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">태그 선택 (중복 가능)</label>
          <div style="display: flex; flex-wrap: wrap; gap: 8px;" id="tags-select-group">
            <span class="status-badge tag-capsule" data-tag="정확한 배달" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">정확한 배달</span>
            <span class="status-badge tag-capsule" data-tag="친절한 미소" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">친절한 미소</span>
            <span class="status-badge tag-capsule" data-tag="맛있는 간식" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">맛있는 간식</span>
            <span class="status-badge tag-capsule" data-tag="꼼꼼한 포장" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">꼼꼼한 포장</span>
            <span class="status-badge tag-capsule" data-tag="최고의 서비스" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">최고의 서비스</span>
          </div>
        </div>

        <!-- 한마디 응원 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label for="review-comment" style="font-size: 16px; font-weight: 800; color: var(--text-main);">한마디 응원</label>
          <textarea id="review-comment" placeholder="훈련생들에게 따뜻한 격려의 말을 적어주세요!" style="width: 100%; min-height: 80px; padding: 12px; font-size: 16px; font-weight: 700; border: 2.5px solid var(--border-color); border-radius: var(--radius-sm); outline: none; resize: none; font-family: inherit; transition: border-color 0.15s;" onfocus="this.style.borderColor='var(--secondary-color)'" onblur="this.style.borderColor='var(--border-color)'"></textarea>
        </div>

        <!-- 사진 첨부 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">사진 추가 (선택)</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="file" id="review-photo-input" accept="image/*" style="display: none;" onchange="handleReviewPhotoSelected(this)">
            <button type="button" class="btn btn-gray" id="btn-add-review-photo" style="min-height: 44px; font-size: 15px; font-weight: 800; margin: 0; width: auto; padding: 0 16px; border: 2.5px solid var(--border-color); background-color: #F8F9FA;" onclick="document.getElementById('review-photo-input').click()">📷 사진 올리기</button>
            <span id="review-photo-status" style="font-size: 14px; font-weight: 700; color: var(--text-muted);">선택된 사진 없음</span>
          </div>
          <div style="position: relative; display: inline-block; max-width: 150px; margin-top: 4px;">
            <img id="review-photo-preview" style="display: none; width: 100%; max-height: 150px; object-fit: cover; border-radius: var(--radius-sm); border: 2.5px solid var(--border-color);">
            <button type="button" id="btn-remove-review-photo" style="display: none; position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; background-color: var(--danger-color); color: white; border: none; font-size: 14px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; box-shadow: var(--shadow-sm); z-index: 15;" onclick="removeReviewPhoto()">&times;</button>
          </div>
        </div>

        <!-- 공개 여부 토글 -->
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="review-is-public" checked style="width: 22px; height: 22px; cursor: pointer; accent-color: var(--secondary-color);">
          <label for="review-is-public" style="font-size: 15px; font-weight: 700; color: var(--text-muted); cursor: pointer; user-select: none;">칭찬 보드에 공개하기</label>
        </div>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-secondary" id="btn-submit-review" style="width: 100%; min-height: 54px; font-size: 18px; font-weight: 800; margin: 0;">보내기</button>
        <button class="btn btn-gray" id="btn-cancel-review" style="width: 100%; min-height: 54px; font-size: 18px; font-weight: 800;">취소</button>
      </div>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const localSection = document.getElementById('local-orders-section');
      const localList = document.getElementById('local-orders-list');
      
      const btnBack = document.getElementById('btn-back');
      const loadingOverlay = document.getElementById('loading-overlay');

      // 1. 주문 로드 및 서버 갱신
      async function loadOrders() {
        const localOrders = JSON.parse(localStorage.getItem('guestOrders') || '[]');
        const guestAuth = AppState.getGuestAuth ? AppState.getGuestAuth() : null;
        if (localOrders.length === 0 && !guestAuth) {
          localList.innerHTML = `<div class="empty-state">최근 주문한 기록이 없습니다. 😢</div>`;
          return;
        }

        const tokens = localOrders.map(o => o.orderToken).filter(t => t);
        if (tokens.length === 0 && !guestAuth) {
          localList.innerHTML = `<div class="empty-state">토큰 정보가 없는 과거 주문입니다. 관리자에게 문의해주세요.</div>`;
          return;
        }

        loadingOverlay.style.display = 'flex';

        try {
          const serverRows = [];
          const seenRows = new Set();
          const appendRows = (rows) => {
            if (!Array.isArray(rows)) return;
            rows.forEach(row => {
              const key = [
                row.orderNo || '',
                row.orderToken || '',
                row.snackId || '',
                row.snackName || ''
              ].join('|');
              if (seenRows.has(key)) return;
              seenRows.add(key);
              serverRows.push(row);
            });
          };

          if (tokens.length > 0) {
            const tokenRes = await fetchAPI('getGuestOrderByToken', {
              method: 'POST',
              body: { tokens: tokens }
            });
            if (tokenRes && tokenRes.success) {
              appendRows(tokenRes.orders);
            } else {
              console.warn('토큰 주문 조회 실패:', tokenRes);
            }
          }

          if (guestAuth) {
            const authRes = await fetchAPI('getGuestOrdersByGuestKey', {
              method: 'POST',
              body: {
                authProvider: guestAuth.provider,
                guestKey: guestAuth.guestKey
              }
            });
            if (authRes && authRes.success) {
              appendRows(authRes.orders);
            } else {
              console.warn('카카오 주문 조회 실패:', authRes);
            }
          }

          // 후기 및 장애인 직원 AAC 답글 실시간 동기화 (Join)
          let reviewMapByOrderNo = {};
          try {
            const reviewsRes = await fetchAPI('getRecentReviews');
            if (reviewsRes && reviewsRes.success && Array.isArray(reviewsRes.reviews)) {
              reviewsRes.reviews.forEach(rev => {
                if (rev.orderId) {
                  reviewMapByOrderNo[String(rev.orderId).trim()] = rev;
                }
              });
            }
          } catch(e) {
            console.warn('최근 후기 조회 중 오류 (무시):', e);
          }

          loadingOverlay.style.display = 'none';

          if (serverRows.length > 0) {
            // 로컬 스토리지 동기화용 사전
            const localByKey = {};
            localOrders.forEach(lo => {
              const key = lo.orderToken || lo.orderNo;
              if (key) localByKey[key] = lo;
            });

            const orderGroups = {};
            serverRows.forEach(o => {
              const key = o.orderToken || o.orderNo;
              const prevLocal = localByKey[key] || {};
              if (!orderGroups[o.orderNo]) {
                orderGroups[o.orderNo] = {
                  orderNo: o.orderNo,
                  orderToken: o.orderToken,
                  nickname: o.nickname,
                  timestamp: o.timestamp,
                  status: o.servedYn,
                  deliveryType: o.deliveryType || 'pickup',
                  deliveryPlace: o.deliveryPlace || '',
                  reviewed: o.reviewed || prevLocal.reviewed || false,
                  stamp: o.stamp || prevLocal.stamp || '',
                  tags: o.tags || prevLocal.tags || '',
                  replyText: o.replyText || prevLocal.replyText || '',
                  reviewComment: o.reviewComment || o.comment || prevLocal.reviewComment || prevLocal.comment || '',
                  cancelReason: o.cancelReason || '',
                  authProvider: o.authProvider || '',
                  guestKey: o.guestKey || '',
                  items: []
                };
              }
              orderGroups[o.orderNo].items.push({
                name: o.snackName,
                quantity: o.quantity,
                point: o.point / (o.quantity || 1)
              });
            });

            const mergedOrders = Object.values(orderGroups);
            
            mergedOrders.forEach(serverData => {
              const key = serverData.orderToken || serverData.orderNo;
              if (!key) return;

              // 후기 및 장애인 직원 답글 실시간 동기화 (유연한 키 매칭)
              const matchedReview = Object.values(reviewMapByOrderNo).find(rev => {
                if (!rev || !rev.orderId) return false;
                const rId = String(rev.orderId).trim();
                const oNo = String(serverData.orderNo || '').trim();
                const oTok = String(serverData.orderToken || '').trim();
                return (rId && (rId === oNo || rId === oTok || (oNo && rId.includes(oNo)) || (oTok && rId.includes(oTok))));
              });

              if (matchedReview) {
                if (matchedReview.replyText) serverData.replyText = matchedReview.replyText;
                if (matchedReview.comment) serverData.reviewComment = matchedReview.comment;
                if (matchedReview.stamp) serverData.stamp = matchedReview.stamp;
                if (matchedReview.tags) serverData.tags = matchedReview.tags;
                serverData.reviewed = true;
              }

              const isKakao = serverData.authProvider === 'kakao' || (localByKey[key] && localByKey[key].authProvider === 'kakao');
              let guestName = serverData.guestName || (serverData.nickname ? String(serverData.nickname).replace(/ \((체험|비회원)\)/g, '') : '게스트');
              if (isKakao) {
                guestName = '💬 ' + guestName.replace(/ \((체험|비회원)\)/g, '').trim();
              }
              const prevLocal = localByKey[key] || {};
              localByKey[key] = {
                ...prevLocal,
                ...serverData,
                reviewed: serverData.reviewed || prevLocal.reviewed || false,
                reviewComment: serverData.reviewComment || prevLocal.reviewComment || prevLocal.comment || '',
                comment: serverData.reviewComment || prevLocal.comment || prevLocal.reviewComment || '',
                stamp: serverData.stamp || prevLocal.stamp || '',
                tags: serverData.tags || prevLocal.tags || '',
                guestName,
                createdAt: serverData.timestamp || prevLocal.createdAt || new Date().toISOString(),
                status: serverData.status,
                authProvider: serverData.authProvider || prevLocal.authProvider || '',
                guestKey: serverData.guestKey || prevLocal.guestKey || ''
              };
            });
            localStorage.setItem('guestOrders', JSON.stringify(Object.values(localByKey)));

            // 정렬 (최신순)
            mergedOrders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            localList.innerHTML = '';
            mergedOrders.forEach(order => {
              localList.appendChild(createOrderCard(order, false));
            });
            AppState.vibrate(60);
          } else {
            if (localOrders.length > 0) {
              localList.innerHTML = '';
              [...localOrders].reverse().forEach(order => {
                const card = createOrderCard(order, true);
                if (card) localList.appendChild(card);
              });
            } else {
              localList.innerHTML = `<div class="empty-state">오늘 연결된 주문을 찾을 수 없습니다.</div>`;
            }
          }
        } catch (error) {
          console.error('주문 조회 실패:', error);
          if (loadingOverlay) loadingOverlay.style.display = 'none';
          
          // 오프라인/에러 시 로컬 데이터라도 표시
          if (localList) {
            localList.innerHTML = '';
            try {
              const sorted = [...localOrders].reverse();
              sorted.forEach(order => {
                if (!order) return;
                try {
                  const card = createOrderCard(order, true);
                  if (card) localList.appendChild(card);
                } catch(err) {
                  console.error('개별 카드 생성 실패:', err);
                }
              });
              
              if (localList.innerHTML === '') {
                localList.innerHTML = `<div class="empty-state">서버 연결에 실패하였고, 표시할 로컬 주문도 없습니다.</div>`;
              }
            } catch(e) {
              localList.innerHTML = `<div class="empty-state">로컬 주문 내역을 불러오는 중 오류가 발생했습니다.</div>`;
            }
          }
        }
      }

      // 2. 상태 텍스트 포맷터
      function getStatusLabel(status, method) {
        const isDelivery = method === 'delivery';
        switch (status) {
          case 'P': return '준비중 ☕';
          case 'R': return isDelivery ? '배달중 🛵' : '준비완료 🔔';
          case 'Y': return isDelivery ? '배달완료 📦' : '수령완료 📦';
          case 'C': 
          case '취소':
          case '관리자취소':
            return '주문취소 ❌';
          default: return '접수중 📝';
        }
      }

      // 3. 시간 및 날짜 포맷터
      function formatTime(isoStr) {
        if (!isoStr) return '';
        try {
          const date = new Date(isoStr);
          if (isNaN(date.getTime())) return '';
          const now = new Date();
          const isToday = date.getFullYear() === now.getFullYear() &&
                          date.getMonth() === now.getMonth() &&
                          date.getDate() === now.getDate();
          
          const hours = String(date.getHours()).padStart(2, '0');
          const minutes = String(date.getMinutes()).padStart(2, '0');
          const timeText = `${hours}:${minutes}`;

          if (isToday) {
            return timeText;
          } else {
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}. ${day}. ${timeText}`;
          }
        } catch (e) {
          return '';
        }
      }

      // 4. 주문번호 뒷자리 세자리
      function getShortNo(orderNo) {
        if (!orderNo) return '-';
        const parts = String(orderNo).split('-');
        if (parts.length >= 3) {
          return parts[2] + '번';
        }
        return orderNo;
      }

      // 5. 카드 돔 생성
      function createOrderCard(order, isLocal) {
        if (!order) return null;
        const card = document.createElement('div');
        card.className = 'order-card';
        
        const currentStatus = String(order.status || order.servedYn || 'N');
        const statusClass = `status-${currentStatus.toLowerCase()}`;
        const timeStr = formatTime(order.createdAt || order.timestamp);
        const shortNoStr = getShortNo(order.orderNo);
        const isKakao = order.authProvider === 'kakao';
        let guestName = order.guestName || (order.nickname ? String(order.nickname).replace(/ \((체험|비회원)\)/g, '') : '게스트');
        if (isKakao) {
          guestName = '💬 ' + guestName.replace(/ \((체험|비회원)\)/g, '').trim();
        }
        
        let itemsText = '-';
        if (order.items && Array.isArray(order.items)) {
          itemsText = order.items.map(item => `${item.name || item.snackName} ${item.quantity}개`).join(', ');
        } else if (order.snackName) {
          itemsText = `${order.snackName} ${order.quantity}개`;
        }

        const isServed = (order.status === 'Y' || order.servedYn === 'Y');
        const isReviewed = (order.reviewed === true || order.reviewed === 'true' || order.reviewed === 'Y' || String(order.reviewed).toUpperCase() === 'TRUE');

        let reviewBtnHtml = '';
        if (isServed && !isReviewed) {
          reviewBtnHtml = `
            <div style="margin-top: 12px; display: flex; justify-content: flex-end;">
              <button class="btn btn-secondary btn-write-review-card" 
                data-order-no="${AppState.escapeAttr(order.orderNo)}"
                data-guest-name="${AppState.escapeAttr(guestName)}"
                style="min-height: 44px; font-size: 16px; font-weight: 850; padding: 0 18px; background-color: var(--secondary-color); box-shadow: var(--shadow-btn-sec); margin: 0; width: auto; z-index: 10;">
                후기 작성하기 💌
              </button>
            </div>
          `;
        }

        const isDelivery = (order.deliveryType === 'delivery' || order.method === 'delivery');
        const deliveryPlaceHtml = (isDelivery && order.deliveryPlace) 
          ? `<div style="font-size: 16px; font-weight: 800; color: #00796B; margin-top: 4px;">📍 배달지: ${AppState.escapeHtml(order.deliveryPlace)}</div>`
          : '';

        const isCanceled = (order.status === 'C' || order.servedYn === 'C' || order.status === '취소' || order.servedYn === '취소' || order.status === '관리자취소' || order.servedYn === '관리자취소');
        let cancelHtml = '';
        if (isCanceled) {
          const reasonText = order.cancelReason || '사유 없음';
          cancelHtml = `<div style="font-size: 15px; font-weight: 800; color: var(--danger-color); margin-top: 8px; background-color: #fdf2f2; padding: 10px; border-radius: 8px; border: 1px solid #fecaca;">🚫 취소 사유: ${AppState.escapeHtml(reasonText)}</div>`;
        }

        const isPending = (order.status === 'N' || order.servedYn === 'N');
        let cancelBtnHtml = '';
        if (isPending && order.orderToken) {
          cancelBtnHtml = `
            <div style="margin-top: 10px;">
              <button class="btn btn-gray btn-guest-cancel-card" 
                data-order-token="${AppState.escapeAttr(order.orderToken)}"
                style="min-height: 44px; font-size: 16px; width: 100%; border-color: #ffcccc; color: var(--danger-color); background-color: #fff5f5; z-index: 10;">
                주문 취소하기 (접수 단계만 가능)
              </button>
            </div>
          `;
        }

        let replyHtml = '';
        const reviewParts = [];
        if (order.stamp) reviewParts.push(order.stamp);
        if (order.tags) reviewParts.push(order.tags);
        const commentText = order.reviewComment || order.comment;
        if (commentText) reviewParts.push(commentText);

        const userCmt = reviewParts.length > 0 ? reviewParts.join(' ') : (order.reviewComment || order.comment || '');
        
        let commentBox = '';
        if (userCmt) {
          commentBox = `
            <div class="order-comment-box" style="margin-top: 12px; background-color: #FFFDF5; border: 1.5px solid #FCD34D; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; font-weight: 700; color: #92400E; transition: all 0.2s ease;">
              💌 내가 남긴 응원: "${AppState.escapeHtml(userCmt)}"

          `;
        } else if (isReviewed) {
          commentBox = `
            <div class="order-comment-box" style="margin-top: 12px; background-color: #FFFDF5; border: 1.5px solid #FCD34D; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; font-weight: 700; color: #92400E; transition: all 0.2s ease;">
              💌 소중한 응원 후기가 등록되었습니다.
            </div>
          `;
        }

        let replyBox = '';
        if (order.replyText) {
          replyBox = `
            <div class="order-reply-box" style="margin-top: 8px; background-color: #E6FFFA; border: 2px solid #38A169; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; font-weight: 700; color: #234E52; transition: all 0.2s ease;">
              <div style="font-size: 14px; font-weight: 850; color: #2F855A; margin-bottom: 6px; display: flex; align-items: center; gap: 4px;">
                🐣 배달왔삼 직원의 감사 답글

              <div>"${AppState.escapeHtml(order.replyText)}"</div>
            </div>
          `;
        }

        replyHtml = commentBox + replyBox;

        card.innerHTML = `
          <div class="order-card-header">
            <span class="order-card-time">⏰ ${timeStr}</span>
            <span class="order-card-status ${statusClass}">${getStatusLabel(order.status || order.servedYn, order.deliveryType || order.method || 'pickup')}</span>
          </div>
          <div class="order-card-body">
            <div class="order-card-no">🎫 주문번호: ${shortNoStr} (${order.orderNo})</div>
            <div class="order-card-items">${AppState.escapeHtml(itemsText)}</div>
            <div class="order-card-name">👤 주문자: ${AppState.escapeHtml(guestName)} 님</div>

            ${cancelHtml}
            ${replyHtml}
            ${cancelBtnHtml}
            ${reviewBtnHtml}
          </div>
        `;

        // 카드 클릭 시 complete.html 연동 또는 P25 소통 인터랙션
        AppState.bindCardTap(card, (e) => {
          // 후기 작성 버튼이나 취소 버튼 클릭 시 카드 클릭 이벤트 무시
          if (e && e.target && (e.target.closest('.btn-write-review-card') || e.target.closest('.btn-guest-cancel-card'))) {
            return;
          }

          // P25: 후기 작성이 완료된 수령 완료 주문인 경우 complete.html 이동 차단 및 소통 인터랙션
          if (isServed && isReviewed) {
            AppState.vibrate(50);
            AppState.playClickSound();

            const replyBoxEl = card.querySelector('.order-reply-box');
            const commentBoxEl = card.querySelector('.order-comment-box');

            if (order.replyText) {
              if (replyBoxEl) {
                replyBoxEl.classList.remove('reply-box-active');
                void replyBoxEl.offsetWidth; // trigger reflow
                replyBoxEl.classList.add('reply-box-active');
              }
              AppState.speak(`배달왔삼 직원의 감사 답글입니다. ${order.replyText}`);
            } else if (userCmt) {
              if (commentBoxEl) {
                commentBoxEl.classList.remove('reply-box-active');
                void commentBoxEl.offsetWidth;
                commentBoxEl.classList.add('reply-box-active');
              }
              AppState.speak(`소중한 응원 후기를 남겨주셔서 감사합니다.`);
            } else {
              AppState.speak(`소중한 응원 후기가 등록되었습니다.`);
            }
            return;
          }

          // selectedUser 복원
          const storedRemainingCredit = Number(sessionStorage.getItem('guestRemainingCredit'));
          const creditAmount = !Number.isNaN(storedRemainingCredit)
            ? storedRemainingCredit
            : (typeof GUEST_DEFAULT_CREDIT !== 'undefined' ? GUEST_DEFAULT_CREDIT : 10);
          AppState.setSelectedUser({
            userId: 'guest',
            nickname: guestName,
            credit: creditAmount,
            authProvider: order.authProvider || '',
            guestKey: order.guestKey || ''

          // lastOrderSummary 세션 바인딩
          const usedPoints = order.items 
            ? order.items.reduce((sum, item) => sum + (item.point || 0) * (item.quantity || 1), 0)
            : (order.point || 0);

          localStorage.setItem('lastOrderSummary', JSON.stringify({
            userId: 'guest',
            nickname: guestName,
            usedPoints: usedPoints,
            remainPoints: creditAmount - usedPoints,
            orderNo: order.orderNo,
            orderToken: order.orderToken,
            deliveryType: order.deliveryType || order.method || 'pickup',
            deliveryPlace: order.deliveryPlace || '',
            authProvider: order.authProvider || '',
            guestKey: order.guestKey || '',
            items: order.items || [{ name: order.snackName, quantity: order.quantity }]
          }));

          AppState.vibrate(60);
          AppState.playClickSound();
          window.location.href = 'complete.html';
        });

        // 후기 작성 버튼 클릭 이벤트 바인딩
        const reviewBtn = card.querySelector('.btn-write-review-card');
        if (reviewBtn) {
          reviewBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openReviewModalFor(order.orderNo, guestName, order.orderToken);
          });
          reviewBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
          });
          reviewBtn.addEventListener('pointerup', (e) => {
            e.stopPropagation();
          });
        }

        // 취소 버튼 이벤트 바인딩
        const cancelBtn = card.querySelector('.btn-guest-cancel-card');
        if (cancelBtn) {
          cancelBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!confirm('정말로 주문을 취소하시겠습니까?\n취소 시 크레딧과 재고가 즉시 환불됩니다.')) return;
            
            cancelBtn.disabled = true;
            cancelBtn.textContent = '취소 중...';
            
            try {
              const res = await fetchAPI('userCancelOrder', {
                method: 'POST',
                body: { orderId: order.orderNo || order.orderToken, orderToken: order.orderToken }
              });
              if (res && res.success) {

                loadOrders(); // 목록 새로고침

                alert('취소 실패: ' + (res?.message || '알 수 없는 오류'));
                cancelBtn.disabled = false;
                cancelBtn.textContent = '주문 취소하기 (접수 단계만 가능)';
              }
            } catch (error) {
              console.error('취소 오류:', error);
              alert('통신 오류가 발생했습니다.');
              cancelBtn.disabled = false;
              cancelBtn.textContent = '주문 취소하기 (접수 단계만 가능)';
            }
          });
          cancelBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
          cancelBtn.addEventListener('pointerup', (e) => e.stopPropagation());
        }

        return card;
      }

      AppState.bindCardTap(btnBack, () => {
        window.location.href = 'guest.html';
      });

      // 후기 작성 변수 및 모달 바인딩
      let currentReviewOrderId = '';
      let currentReviewGuestName = '';
      let currentReviewOrderToken = '';

      const reviewModal = document.getElementById('modal-write-review');
      const btnCloseReviewModal = document.getElementById('btn-close-review-modal');
      const btnCancelReview = document.getElementById('btn-cancel-review');
      const btnSubmitReview = document.getElementById('btn-submit-review');
      const stampButtons = document.querySelectorAll('#stamp-select-group .stamp-btn');
      const tagCapsules = document.querySelectorAll('#tags-select-group .tag-capsule');

      window.openReviewModalFor = function(orderNo, guestName, orderToken) {
        currentReviewOrderId = orderNo;
        currentReviewGuestName = guestName;
        currentReviewOrderToken = orderToken;
        
        // 입력 필드 초기화
        stampButtons.forEach((b, idx) => {
          if (idx === 0) b.classList.add('active');
          else b.classList.remove('active');
        });
        tagCapsules.forEach(c => c.classList.remove('active'));
        document.getElementById('review-comment').value = '';
        document.getElementById('review-is-public').checked = true;
        
        if (btnSubmitReview) {
          btnSubmitReview.disabled = false;

        }

        document.documentElement.classList.add('modal-open');

      // 후기 사진 첨부 관련 상태 및 헬퍼 함수
      let selectedReviewPhotoFile = null;

      window.handleReviewPhotoSelected = function(fileInput) {
        const file = fileInput.files[0];
        if (!file) return;

        selectedReviewPhotoFile = file;

        const preview = document.getElementById('review-photo-preview');
        const status = document.getElementById('review-photo-status');

      };

      function compressImage(file, maxWidth, maxHeight, quality) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > maxWidth) {
                  height = Math.round((height * maxWidth) / width);
                  width = maxWidth;
                }
              } else {
                if (height > maxHeight) {
                  width = Math.round((width * maxHeight) / height);
                  height = maxHeight;
                }
              }

              canvas.width = width;
              canvas.height = height;

              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);

              const dataUrl = canvas.toDataURL('image/jpeg', quality);
              resolve(dataUrl);
            };
            img.onerror = (err) => reject(err);
          };
          reader.onerror = (err) => reject(err);
        });
      }

      function closeReviewModal() {
        if (reviewModal) reviewModal.style.display = 'none';
        document.documentElement.classList.remove('modal-open');
        document.body.classList.remove('modal-open');
        removeReviewPhoto();
        AppState.vibrate(30);
      }

      if (btnCloseReviewModal) {
        btnCloseReviewModal.addEventListener('click', closeReviewModal);
      }
      if (btnCancelReview) {
        btnCancelReview.addEventListener('click', closeReviewModal);
      }

      stampButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          stampButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          AppState.vibrate(30);
          AppState.playClickSound();
        });
      });

      tagCapsules.forEach(cap => {
        cap.addEventListener('click', () => {
          cap.classList.toggle('active');
          AppState.vibrate(30);
          AppState.playClickSound();
        });
      });

      if (btnSubmitReview) {
        btnSubmitReview.addEventListener('click', async () => {
          if (!currentReviewOrderId || !currentReviewGuestName) return;

          const activeStamp = document.querySelector('#stamp-select-group .stamp-btn.active');
          const stamp = activeStamp ? activeStamp.getAttribute('data-stamp') : '';
          
          const activeCapsules = document.querySelectorAll('#tags-select-group .tag-capsule.active');
          const tags = Array.from(activeCapsules).map(c => c.getAttribute('data-tag')).join(', ');
          
          const comment = document.getElementById('review-comment').value.trim();
          const isPublic = document.getElementById('review-is-public').checked;

          btnSubmitReview.disabled = true;
          btnSubmitReview.textContent = '제출 중...';

          try {
            let imageUrl = '';
            if (selectedReviewPhotoFile) {
              btnSubmitReview.textContent = '사진 업로드 중...';
              
              // 1. 이미지 압축 (최대 600px, 0.7 퀄리티)
              const base64Data = await compressImage(selectedReviewPhotoFile, 600, 600, 0.7);
              
              const timestamp = Math.floor(Date.now() / 1000);
              const extension = selectedReviewPhotoFile.name.split('.').pop() || 'jpg';
              const fileName = `review_${currentReviewOrderId}_${timestamp}.${extension}`;
              
              // 2. 이미지 업로드 API 호출
              const uploadRes = await fetchAPI('uploadImage', {
                method: 'POST',
                body: {
                  base64Data: base64Data,
                  fileName: fileName,
                  orderToken: currentReviewOrderToken,
                  type: 'review'
                }
              });
              
              if (uploadRes && uploadRes.success && uploadRes.imageUrl) {
                imageUrl = uploadRes.imageUrl;
              } else {
                const errMsg = (uploadRes && uploadRes.message) ? uploadRes.message : '네트워크 오류 또는 서버 응답 실패';
                if (!confirm(`⚠️ 후기 사진 업로드에 실패했습니다.\n\n[오류 내용]\n${errMsg}\n\n사진 없이 후기 텍스트만 등록하시겠습니까?`)) {
                  btnSubmitReview.disabled = false;
                  btnSubmitReview.textContent = '보내기';
                  return;
                }
              }
            }

            btnSubmitReview.textContent = '후기 제출 중...';
            const res = await fetchAPI('submitReview', {
              method: 'POST',
              body: {
                orderId: currentReviewOrderId,
                orderToken: currentReviewOrderToken,
                guestName: currentReviewGuestName,
                stamp: stamp,
                tags: tags,
                comment: comment,
                isPublic: isPublic,
                imageUrl: imageUrl
              }
            });

            if (res && res.success) {
              AppState.vibrate(80);
              alert('소중한 응원을 남겨주셔서 감사합니다! ❤️');
              closeReviewModal();
              
              // 로컬스토리지 guestOrders 상태 업데이트
              try {
                const updated = guestOrders.map(o => {
                  if (o.orderNo === currentReviewOrderId || o.orderToken === currentReviewOrderId || (o.orderNo && currentReviewOrderId && currentReviewOrderId.includes(o.orderNo))) {
                    return { 
                      ...o, 
                      reviewed: true, 
                      reviewComment: comment, 
                      comment: comment,
                      stamp: stamp,
                      tags: tags
                    };
                  }
                  return o;
                });
                localStorage.setItem('guestOrders', JSON.stringify(updated));
              } catch(e) {}

              // 화면 갱신
              loadOrders();
            } else {
              alert('후기 제출에 실패했습니다: ' + (res.message || '오류'));
              btnSubmitReview.disabled = false;
              btnSubmitReview.textContent = '보내기';
            }
          } catch (e) {
            console.error('후기 제출 오류:', e);
            alert('통신 오류가 발생했습니다.');
            btnSubmitReview.disabled = false;
            btnSubmitReview.textContent = '보내기';
          }
        });
      }

      // 초기 실행
      loadOrders();

      // 외부에서 후기 작성 요청(openReview=true)으로 들어왔을 때 가장 최근 미작성 주문에 대해 모달 자동 띄우기
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('openReview') === 'true') {
        try {
          const guestOrders = JSON.parse(localStorage.getItem('guestOrders') || '[]');
          const unreviewedOrders = guestOrders.filter(o => 
            (o.status === 'Y' || o.servedYn === 'Y') && 
            (o.reviewed !== true && o.reviewed !== 'true')
          );
          
          if (unreviewedOrders.length > 0) {
            // 로컬 스토리지는 시간순으로 추가되므로 배열의 마지막 요소가 가장 최신
            const targetOrder = unreviewedOrders[unreviewedOrders.length - 1];
            const guestName = targetOrder.guestName || (targetOrder.nickname ? targetOrder.nickname.replace(/ \((체험|비회원)\)/g, '') : '게스트');
            
            // 화면 렌더링 후 모달 팝업
            setTimeout(() => {
              openReviewModalFor(targetOrder.orderNo, guestName, targetOrder.orderToken);
            }, 300);
          }
        } catch (e) {}
      }
    });
  </script>
</body>
</html>
