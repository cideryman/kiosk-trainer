<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 내 주문 확인</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest-guest.json">
  <meta name="theme-color" content="#2EC4B6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="배달왔삼">
  <link rel="apple-touch-icon" href="icons/guest-180.png">
  <style>
    .section-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 12px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .order-card {
      background-color: var(--card-bg);
      border: 3px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }

    .order-card:active {
      transform: scale(0.97);
      border-color: var(--primary-color);
      background-color: #FFFDF9;
    }

    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .order-card-time {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .order-card-status {
      font-size: 16px;
      font-weight: 850;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
    }

    .status-n { background-color: #E3F2FD; color: #1E88E5; } /* 접수중 */
    .status-p { background-color: #FFF3E0; color: #FB8C00; } /* 준비중 */
    .status-r { background-color: #E0F2F1; color: #00897B; animation: pulseStatus 1.5s infinite alternate; } /* 준비완료 */
    .status-y { background-color: #F5F5F5; color: #757575; } /* 수령완료 */
    .status-c { background-color: #FFEBEE; color: #E53935; } /* 취소됨 */

    @keyframes pulseStatus {
      0% { box-shadow: 0 0 0 rgba(0, 137, 123, 0.2); }
      100% { box-shadow: 0 0 8px rgba(0, 137, 123, 0.6); }
    }

    .order-card-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .order-card-no {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .order-card-items {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
      word-break: keep-all;
    }

    .order-card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--secondary-hover);
    }

    /* 검색 박스 */
    .search-box {
      background-color: var(--card-bg);
      border: 3px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--secondary-color);
    }

    .search-input-wrapper {
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      height: 56px;
      padding: 10px 16px;
      font-size: 20px;
      font-weight: 800;
      border: 3px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      background-color: #F8F9FA;
      transition: all 0.15s ease-in-out;
    }

    .search-input:focus {
      outline: none;
      background-color: white;
      border-color: var(--secondary-color);
    }

    .search-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .search-row input {
      width: 100%;
    }

    .search-row button {
      width: 100%;
      min-height: 56px;
    }

    .btn-search {
      font-size: 20px;
      padding: 0 24px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 18px;
      font-weight: 700;
      background-color: var(--card-bg);
      border: 3px dashed var(--border-color);
      border-radius: var(--radius-md);
    }

    /* 후기 작성 전용 스타일 */
    .stamp-btn.active {
      border-color: var(--primary-color) !important;
      background-color: #FFF9E6 !important;
      color: var(--primary-color) !important;
    }
    .tag-capsule.active {
      background-color: #E0F2F1 !important;
      border-color: var(--secondary-color) !important;
      color: #00796B !important;
    }

    /* 후기 작성 모달 스타일 */
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .admin-modal-content {
      background-color: white;
      border-radius: var(--radius-md);
      width: 100%;
      max-width: 500px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: modalFadeIn 0.2s ease-out;
    }
    
    @keyframes modalFadeIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .admin-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 12px;
    }
    
    .admin-modal-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
    }
    
    .admin-modal-close {
      background: none;
      border: none;
      font-size: 28px;
      font-weight: 800;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
    }
    
    .admin-modal-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    
    .admin-modal-footer {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top" style="justify-content: center;">
        <h1 class="kiosk-title" style="font-size: 26px; color: var(--secondary-hover);">📋 내 주문 확인</h1>
      </div>
    </header>

    <!-- 바디 -->
    <main class="kiosk-body" id="main-content">
      <!-- 로컬 최근 주문 내역 -->
      <div id="local-orders-section" style="display: none; flex-direction: column; gap: 12px; width: 100%;">
        <div class="section-title">🕒 최근 이용 내역 (기기 저장)</div>
        <div id="local-orders-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
      </div>

      <!-- 안내 문구 -->
      <div style="font-size: 15px; font-weight: 700; color: var(--text-muted); text-align: center; margin-bottom: 10px; background-color: #F8F9FA; padding: 12px; border-radius: var(--radius-sm); border: 2px solid var(--border-color);">
        * 본 기기에서 주문한 최근 내역만 표시됩니다.<br>
        * 다른 기기에서 한 주문이나 과거 내역은 관리자에게 문의해주세요.
      </div>
      
      <!-- 최근 주문 내역 (서버 갱신) -->
      <div id="local-orders-section" style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
        <div class="section-title">🕒 내 주문 내역</div>
        <div id="local-orders-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
      </div>
    </main>

    <!-- 푸터 버튼 -->
    <footer class="kiosk-footer">
      <button class="btn btn-gray" id="btn-back" style="min-height: 64px; font-size: 20px;">이전으로</button>
    </footer>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay" style="display: none;">
      <div class="spinner"></div>
      <div class="overlay-text">주문 내역을 검색하고 있습니다...</div>
    </div>
  </div>

  <!-- 후기 작성 모달 -->
  <div class="admin-modal" id="modal-write-review" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
    <div class="admin-modal-content" style="background-color: white; border-radius: var(--radius-md); width: 100%; max-width: 500px; padding: 24px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 16px; border: 3px solid var(--border-color);">
      <div class="admin-modal-header" style="border-bottom: 2px solid var(--border-color); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
        <h2 class="admin-modal-title" style="color: var(--secondary-hover); font-size: 22px; margin: 0;">💌 칭찬과 응원 보내기</h2>
        <button class="admin-modal-close" id="btn-close-review-modal" style="font-size: 28px; background: none; border: none; cursor: pointer; color: var(--text-muted);">&times;</button>
      </div>
      <div class="admin-modal-body" style="display: flex; flex-direction: column; gap: 16px; margin-top: 10px;">
        <div style="font-size: 15px; font-weight: 700; color: var(--primary-color); text-align: center; line-height: 1.4; word-break: keep-all; background-color: #FFF9E6; border: 1.5px solid #FFE0B2; padding: 12px; border-radius: var(--radius-sm);">
          "남겨주신 응원은 이용자들의 다음 활동에 큰 힘이 됩니다."
        </div>
        
        <!-- 칭찬 스탬프 선택 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">칭찬 스탬프 고르기</label>
          <div style="display: grid; grid-template-columns: 1fr; gap: 10px;" id="stamp-select-group">
            <button type="button" class="btn stamp-btn active" data-stamp="👍 친절해요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">👍 친절해요</button>
            <button type="button" class="btn stamp-btn" data-stamp="⚡ 빨라요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">⚡ 빨라요</button>
            <button type="button" class="btn stamp-btn" data-stamp="🎁 감동이에요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">🎁 감동이에요</button>
            <button type="button" class="btn stamp-btn" data-stamp="☕ 응원해요" style="font-size: 15px; font-weight: 800; min-height: 48px; border: 2.5px solid var(--border-color); padding: 0 8px;">☕ 응원해요</button>
          </div>
        </div>

        <!-- 태그 선택 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 16px; font-weight: 800; color: var(--text-main);">태그 선택 (중복 가능)</label>
          <div style="display: flex; flex-wrap: wrap; gap: 8px;" id="tags-select-group">
            <span class="status-badge tag-capsule" data-tag="정확한 배달" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">정확한 배달</span>
            <span class="status-badge tag-capsule" data-tag="친절한 미소" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">친절한 미소</span>
            <span class="status-badge tag-capsule" data-tag="맛있는 간식" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">맛있는 간식</span>
            <span class="status-badge tag-capsule" data-tag="꼼꼼한 포장" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">꼼꼼한 포장</span>
            <span class="status-badge tag-capsule" data-tag="최고의 서비스" style="cursor: pointer; font-size: 14px; font-weight: 800; padding: 6px 12px; background-color: white; border-color: var(--border-color); color: var(--text-muted);">최고의 서비스</span>
          </div>
        </div>

        <!-- 한마디 응원 -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label for="review-comment" style="font-size: 16px; font-weight: 800; color: var(--text-main);">한마디 응원</label>
          <textarea id="review-comment" placeholder="훈련생들에게 따뜻한 격려의 말을 적어주세요!" style="width: 100%; min-height: 80px; padding: 12px; font-size: 16px; font-weight: 700; border: 2.5px solid var(--border-color); border-radius: var(--radius-sm); outline: none; resize: none; font-family: inherit; transition: border-color 0.15s;" onfocus="this.style.borderColor='var(--secondary-color)'" onblur="this.style.borderColor='var(--border-color)'"></textarea>
        </div>

        <!-- 공개 여부 토글 -->
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="review-is-public" checked style="width: 22px; height: 22px; cursor: pointer; accent-color: var(--secondary-color);">
          <label for="review-is-public" style="font-size: 15px; font-weight: 700; color: var(--text-muted); cursor: pointer; user-select: none;">칭찬 보드에 공개하기</label>
        </div>
      </div>
      <div class="admin-modal-footer" style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
        <button class="btn btn-secondary" id="btn-submit-review" style="width: 100%; min-height: 54px; font-size: 18px; font-weight: 800; margin: 0;">보내기</button>
        <button class="btn btn-gray" id="btn-cancel-review" style="width: 100%; min-height: 54px; font-size: 18px; font-weight: 800;">취소</button>
      </div>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const localSection = document.getElementById('local-orders-section');
      const localList = document.getElementById('local-orders-list');
      const localSection = document.getElementById('local-orders-section');
      const localList = document.getElementById('local-orders-list');
      
      const btnBack = document.getElementById('btn-back');
      const loadingOverlay = document.getElementById('loading-overlay');

      // 1. 주문 로드 및 서버 갱신
      async function loadOrders() {
        const localOrders = JSON.parse(localStorage.getItem('guestOrders') || '[]');
        if (localOrders.length === 0) {
          localList.innerHTML = `<div class="empty-state">최근 주문한 기록이 없습니다. 😢</div>`;
          return;
        }

        const tokens = localOrders.map(o => o.orderToken).filter(t => t);
        if (tokens.length === 0) {
          localList.innerHTML = `<div class="empty-state">토큰 정보가 없는 과거 주문입니다. 관리자에게 문의해주세요.</div>`;
          return;
        }

        loadingOverlay.style.display = 'flex';

        try {
          const response = await fetchAPI('getGuestOrderByToken', {
            method: 'POST',
            body: { tokens: tokens }
          });

          loadingOverlay.style.display = 'none';

          if (response && response.success && Array.isArray(response.orders) && response.orders.length > 0) {
            const orderGroups = {};
            response.orders.forEach(o => {
              if (!orderGroups[o.orderNo]) {
                orderGroups[o.orderNo] = {
                  orderNo: o.orderNo,
                  orderToken: o.orderToken,
                  nickname: o.nickname,
                  timestamp: o.timestamp,
                  status: o.servedYn,
                  deliveryType: o.deliveryType || 'pickup',
                  deliveryPlace: o.deliveryPlace || '',
                  reviewed: o.reviewed,
                  cancelReason: o.cancelReason || '',
                  items: []
                };
              }
              orderGroups[o.orderNo].items.push({
                name: o.snackName,
                quantity: o.quantity,
                point: o.point / (o.quantity || 1)
              });
            });

            const mergedOrders = Object.values(orderGroups);
            
            // 로컬 스토리지 동기화
            const updatedLocal = localOrders.map(lo => {
              const serverData = mergedOrders.find(mo => mo.orderToken === lo.orderToken);
              if (serverData) {
                return { ...lo, ...serverData, status: serverData.status };
              }
              return lo;
            });
            localStorage.setItem('guestOrders', JSON.stringify(updatedLocal));

            // 정렬 (최신순)
            mergedOrders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            localList.innerHTML = '';
            mergedOrders.forEach(order => {
              localList.appendChild(createOrderCard(order, false));
            });
            AppState.vibrate(60);
          } else {
            // 서버에 데이터가 없거나 에러
            localList.innerHTML = `<div class="empty-state">서버에서 주문을 찾을 수 없습니다.</div>`;
          }
        } catch (error) {
          console.error('주문 조회 실패:', error);
          loadingOverlay.style.display = 'none';
          
          // 오프라인/에러 시 로컬 데이터라도 표시
          localList.innerHTML = '';
          const sorted = [...localOrders].reverse();
          sorted.forEach(order => {
            localList.appendChild(createOrderCard(order, true));
          });
        }
      }

      // 2. 상태 텍스트 포맷터
      function getStatusLabel(status, method) {
        const isDelivery = method === 'delivery';
        switch (status) {
          case 'P': return '준비중 ☕';
          case 'R': return isDelivery ? '배달중 🛵' : '준비완료 🔔';
          case 'Y': return isDelivery ? '배달완료 📦' : '수령완료 📦';
          case 'C': 
          case '취소':
          case '관리자취소':
            return '주문취소 ❌';
          default: return '접수중 📝';
        }
      }

      // 3. 시간 포맷터
      function formatTime(isoStr) {
        if (!isoStr) return '';
        try {
          const date = new Date(isoStr);
          const hours = String(date.getHours()).padStart(2, '0');
          const minutes = String(date.getMinutes()).padStart(2, '0');
          return `${hours}:${minutes}`;
        } catch (e) {
          return '';
        }
      }

      // 4. 주문번호 뒷자리 세자리
      function getShortNo(orderNo) {
        if (!orderNo) return '-';
        const parts = orderNo.split('-');
        if (parts.length >= 3) {
          return parts[2] + '번';
        }
        return orderNo;
      }

      // 5. 카드 돔 생성
      function createOrderCard(order, isLocal) {
        const card = document.createElement('div');
        card.className = 'order-card';
        
        const statusClass = `status-${(order.status || 'N').toLowerCase()}`;
        const timeStr = formatTime(order.createdAt || order.timestamp);
        const shortNoStr = getShortNo(order.orderNo);
        const guestName = order.guestName || (order.nickname ? order.nickname.replace(/ \((체험|비회원)\)/g, '') : '게스트');
        
        let itemsText = '-';
        if (order.items && Array.isArray(order.items)) {
          itemsText = order.items.map(item => `${item.name || item.snackName} ${item.quantity}개`).join(', ');
        } else if (order.snackName) {
          itemsText = `${order.snackName} ${order.quantity}개`;
        }

        const isServed = (order.status === 'Y' || order.servedYn === 'Y');
        const isReviewed = (order.reviewed === true || order.reviewed === 'true');
        let reviewBtnHtml = '';
        if (isServed && !isReviewed) {
          reviewBtnHtml = `
            <div style="margin-top: 10px; display: flex; justify-content: flex-end;">
              <button class="btn btn-secondary btn-write-review-card" 
                data-order-no="${AppState.escapeAttr(order.orderNo)}"
                data-guest-name="${AppState.escapeAttr(guestName)}"
                style="min-height: 44px; font-size: 16px; padding: 0 16px; background-color: var(--secondary-color); box-shadow: var(--shadow-btn-sec); margin: 0; width: auto; z-index: 10;">
                후기 작성 💌
              </button>
            </div>
          `;
        }

        const isDelivery = (order.deliveryType === 'delivery' || order.method === 'delivery');
        const deliveryPlaceHtml = (isDelivery && order.deliveryPlace) 
          ? `<div style="font-size: 16px; font-weight: 800; color: #00796B; margin-top: 4px;">📍 배달지: ${AppState.escapeHtml(order.deliveryPlace)}</div>`
          : '';

        const isCanceled = (order.status === 'C' || order.servedYn === 'C' || order.status === '취소' || order.servedYn === '취소' || order.status === '관리자취소' || order.servedYn === '관리자취소');
        let cancelHtml = '';
        if (isCanceled) {
          const reasonText = order.cancelReason || '사유 없음';
          cancelHtml = `<div style="font-size: 15px; font-weight: 800; color: var(--danger-color); margin-top: 8px; background-color: #fdf2f2; padding: 10px; border-radius: 8px; border: 1px solid #fecaca;">🚫 취소 사유: ${AppState.escapeHtml(reasonText)}</div>`;
        }

        const isPending = (order.status === 'N' || order.servedYn === 'N');
        let cancelBtnHtml = '';
        if (isPending && order.orderToken) {
          cancelBtnHtml = `
            <div style="margin-top: 10px;">
              <button class="btn btn-gray btn-guest-cancel-card" 
                data-order-token="${AppState.escapeAttr(order.orderToken)}"
                style="min-height: 44px; font-size: 16px; width: 100%; border-color: #ffcccc; color: var(--danger-color); background-color: #fff5f5; z-index: 10;">
                주문 취소하기 (접수 단계만 가능)
              </button>
            </div>
          `;
        }

        card.innerHTML = `
          <div class="order-card-header">
            <span class="order-card-time">⏰ ${timeStr}</span>
            <span class="order-card-status ${statusClass}">${getStatusLabel(order.status || order.servedYn, order.deliveryType || order.method || 'pickup')}</span>
          </div>
          <div class="order-card-body">
            <div class="order-card-no">🎫 주문번호: ${shortNoStr} (${order.orderNo})</div>
            <div class="order-card-items">${AppState.escapeHtml(itemsText)}</div>
            <div class="order-card-name">👤 주문자: ${AppState.escapeHtml(guestName)} 님</div>
            ${deliveryPlaceHtml}
            ${cancelHtml}
            ${cancelBtnHtml}
            ${reviewBtnHtml}
          </div>
        `;

        // 카드 클릭 시 complete.html 연동
        AppState.bindCardTap(card, (e) => {
          // 후기 작성 버튼이나 취소 버튼 클릭 시 카드 클릭 이벤트 무시
          if (e && e.target && (e.target.closest('.btn-write-review-card') || e.target.closest('.btn-guest-cancel-card'))) {
            return;
          }

          // selectedUser 복원
          const creditAmount = typeof GUEST_DEFAULT_CREDIT !== 'undefined' ? GUEST_DEFAULT_CREDIT : 10;
          AppState.setSelectedUser({
            userId: 'guest',
            nickname: guestName,
            credit: creditAmount
          });

          // lastOrderSummary 세션 바인딩
          const usedPoints = order.items 
            ? order.items.reduce((sum, item) => sum + (item.point || 0) * (item.quantity || 1), 0)
            : (order.point || 0);

          localStorage.setItem('lastOrderSummary', JSON.stringify({
            userId: 'guest',
            nickname: guestName,
            usedPoints: usedPoints,
            remainPoints: creditAmount - usedPoints,
            orderNo: order.orderNo,
            orderToken: order.orderToken,
            deliveryType: order.deliveryType || order.method || 'pickup',
            deliveryPlace: order.deliveryPlace || '',
            items: order.items || [{ name: order.snackName, quantity: order.quantity }]
          }));

          AppState.vibrate(60);
          AppState.playClickSound();
          window.location.href = 'complete.html';
        });

        // 후기 작성 버튼 클릭 이벤트 바인딩
        const reviewBtn = card.querySelector('.btn-write-review-card');
        if (reviewBtn) {
          reviewBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openReviewModalFor(order.orderNo, guestName, order.orderToken);
          });
          reviewBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
          });
          reviewBtn.addEventListener('pointerup', (e) => {
            e.stopPropagation();
          });
        }

        // 취소 버튼 이벤트 바인딩
        const cancelBtn = card.querySelector('.btn-guest-cancel-card');
        if (cancelBtn) {
          cancelBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!confirm('정말로 주문을 취소하시겠습니까?\n취소 시 크레딧과 재고가 즉시 환불됩니다.')) return;
            
            cancelBtn.disabled = true;
            cancelBtn.textContent = '취소 중...';
            
            try {
              const res = await fetchAPI('userCancelOrder', {
                method: 'POST',
                body: { orderId: order.orderNo || order.orderToken, orderToken: order.orderToken }
              });
              if (res && res.success) {
                AppState.vibrate([100, 50, 100]);
                alert('주문이 정상적으로 취소되었습니다.');
                loadOrders(); // 목록 새로고침
              } else {
                alert('취소 실패: ' + (res?.message || '알 수 없는 오류'));
                cancelBtn.disabled = false;
                cancelBtn.textContent = '주문 취소하기 (접수 단계만 가능)';
              }
            } catch (error) {
              console.error('취소 오류:', error);
              alert('통신 오류가 발생했습니다.');
              cancelBtn.disabled = false;
              cancelBtn.textContent = '주문 취소하기 (접수 단계만 가능)';
            }
          });
          cancelBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
          cancelBtn.addEventListener('pointerup', (e) => e.stopPropagation());
        }

        return card;
      }

      AppState.bindCardTap(btnBack, () => {
        window.location.href = 'guest.html';
      });

      // 후기 작성 변수 및 모달 바인딩
      let currentReviewOrderId = '';
      let currentReviewGuestName = '';

      const reviewModal = document.getElementById('modal-write-review');
      const btnCloseReviewModal = document.getElementById('btn-close-review-modal');
      const btnCancelReview = document.getElementById('btn-cancel-review');
      const btnSubmitReview = document.getElementById('btn-submit-review');
      const stampButtons = document.querySelectorAll('#stamp-select-group .stamp-btn');
      const tagCapsules = document.querySelectorAll('#tags-select-group .tag-capsule');

      window.openReviewModalFor = function(orderNo, guestName, orderToken) {
        currentReviewOrderId = orderNo;
        currentReviewGuestName = guestName;
        currentReviewOrderToken = orderToken;
        
        // 입력 필드 초기화
        stampButtons.forEach((b, idx) => {
          if (idx === 0) b.classList.add('active');
          else b.classList.remove('active');
        });
        tagCapsules.forEach(c => c.classList.remove('active'));
        document.getElementById('review-comment').value = '';
        document.getElementById('review-is-public').checked = true;
        
        if (btnSubmitReview) {
          btnSubmitReview.disabled = false;
          btnSubmitReview.textContent = '보내기';
        }

        if (reviewModal) reviewModal.style.display = 'flex';
        AppState.vibrate(50);
        AppState.playClickSound();
      }

      function closeReviewModal() {
        if (reviewModal) reviewModal.style.display = 'none';
        AppState.vibrate(30);
      }

      if (btnCloseReviewModal) {
        btnCloseReviewModal.addEventListener('click', closeReviewModal);
      }
      if (btnCancelReview) {
        btnCancelReview.addEventListener('click', closeReviewModal);
      }

      stampButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          stampButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          AppState.vibrate(30);
          AppState.playClickSound();
        });
      });

      tagCapsules.forEach(cap => {
        cap.addEventListener('click', () => {
          cap.classList.toggle('active');
          AppState.vibrate(30);
          AppState.playClickSound();
        });
      });

      if (btnSubmitReview) {
        btnSubmitReview.addEventListener('click', async () => {
          if (!currentReviewOrderId || !currentReviewGuestName) return;

          const activeStamp = document.querySelector('#stamp-select-group .stamp-btn.active');
          const stamp = activeStamp ? activeStamp.getAttribute('data-stamp') : '';
          
          const activeCapsules = document.querySelectorAll('#tags-select-group .tag-capsule.active');
          const tags = Array.from(activeCapsules).map(c => c.getAttribute('data-tag')).join(', ');
          
          const comment = document.getElementById('review-comment').value.trim();
          const isPublic = document.getElementById('review-is-public').checked;

          btnSubmitReview.disabled = true;
          btnSubmitReview.textContent = '제출 중...';

          try {
            const res = await fetchAPI('submitReview', {
              method: 'POST',
              body: {
                orderId: currentReviewOrderId,
                orderToken: currentReviewOrderToken,
                guestName: currentReviewGuestName,
                stamp: stamp,
                tags: tags,
                comment: comment,
                isPublic: isPublic
              }
            });

            if (res && res.success) {
              AppState.vibrate(80);
              alert('소중한 응원을 남겨주셔서 감사합니다! ❤️');
              closeReviewModal();
              
              // 로컬스토리지 guestOrders 상태 업데이트
              try {
                const guestOrders = JSON.parse(localStorage.getItem('guestOrders') || '[]');
                const updated = guestOrders.map(o => {
                  if (o.orderNo === currentReviewOrderId) {
                    return { ...o, reviewed: true };
                  }
                  return o;
                });
                localStorage.setItem('guestOrders', JSON.stringify(updated));
              } catch(e) {}

              // 화면 갱신
              loadOrders();
            } else {
              alert('후기 제출에 실패했습니다: ' + (res.message || '오류'));
              btnSubmitReview.disabled = false;
              btnSubmitReview.textContent = '보내기';
            }
          } catch (e) {
            console.error('후기 제출 오류:', e);
            alert('통신 오류가 발생했습니다.');
            btnSubmitReview.disabled = false;
            btnSubmitReview.textContent = '보내기';
          }
        });
      }

      // 초기 실행
      loadOrders();

      // 외부에서 후기 작성 요청(openReview=true)으로 들어왔을 때 가장 최근 미작성 주문에 대해 모달 자동 띄우기
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('openReview') === 'true') {
        try {
          const guestOrders = JSON.parse(localStorage.getItem('guestOrders') || '[]');
          const unreviewedOrders = guestOrders.filter(o => 
            (o.status === 'Y' || o.servedYn === 'Y') && 
            (o.reviewed !== true && o.reviewed !== 'true')
          );
          
          if (unreviewedOrders.length > 0) {
            // 로컬 스토리지는 시간순으로 추가되므로 배열의 마지막 요소가 가장 최신
            const targetOrder = unreviewedOrders[unreviewedOrders.length - 1];
            const guestName = targetOrder.guestName || (targetOrder.nickname ? targetOrder.nickname.replace(/ \((체험|비회원)\)/g, '') : '게스트');
            
            // 화면 렌더링 후 모달 팝업
            setTimeout(() => {
              openReviewModalFor(targetOrder.orderNo, guestName, targetOrder.orderToken);
            }, 300);
          }
        } catch (e) {}
      }
    });
  </script>
</body>
</html>
