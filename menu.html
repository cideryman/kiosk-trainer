<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 간식 고르기</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="간식 키오스크">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top">
        <h1 class="kiosk-title">🛒 간식 고르기</h1>
        <div id="user-badge-container">
          <!-- JS 동적 생성 -->
        </div>
      </div>
      <div class="credit-badge">
        내 동전: <span class="credit-amount" id="user-credit">0 크레딧</span>
      </div>
    </header>

    <!-- 바디 (스크롤 영역) -->
    <main class="kiosk-body" id="main-content">
      <div class="guide-text" style="margin-bottom: 5px;">
        먹고 싶은 <span>간식</span>을 담아주세요.
      </div>
      
      <!-- 크레딧 경고 노티 (숨김이 기본) -->
      <div class="error-box" id="credit-warning" style="display: none; margin-bottom: 10px; font-size: 20px;">
        ⚠️ 크레딧이 부족해서 더 담을 수 없어요!
      </div>

      <!-- 재고 경고 노티 (숨김이 기본) -->
      <div class="error-box" id="stock-warning" style="display: none; margin-bottom: 10px; font-size: 20px;">
        ⚠️ 재고가 부족해서 더 담을 수 없어요!
      </div>

      <!-- 간식 목록 그리드 -->
      <div class="grid-container" id="snack-grid">
        <!-- JS 동적 생성 -->
      </div>
    </main>

    <!-- 푸터 (장바구니 요약 & 다음 버튼) -->
    <footer class="kiosk-footer">
      <div class="cart-summary">
        <span>담은 간식 개수: <strong id="cart-count">0개</strong></span>
        <span class="cart-summary-total" id="cart-total">총 0 크레딧</span>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-gray" id="btn-back" style="flex: 1; min-height: 64px; font-size: 20px;">이름 다시 고르기</button>
        <button class="btn btn-primary" id="btn-next" style="flex: 2; min-height: 64px;" disabled>주문 확인하기</button>
      </div>
    </footer>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="overlay-text">맛있는 간식을 불러오고 있습니다...</div>
    </div>

    <!-- 에러 오버레이 -->
    <div class="overlay" id="error-overlay" style="display: none;">
      <div class="error-box" id="error-message">간식 목록을 가져오지 못했습니다.</div>
      <button class="btn btn-primary" id="btn-retry" style="margin-top: 20px; width: 80%;">다시 불러오기</button>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let user = null;
    let snacks = [];
    let cart = []; // { snackId, name, point, quantity }

    // 1. 유저 정보 체크
    function checkUserSession() {
      user = AppState.getSelectedUser();
      if (!user) {
        // 유저 정보 없으면 메인으로 튕김
        window.location.href = 'index.html';
        return;
      }
      
      // 유저 헤더 렌더링
      const badgeContainer = document.getElementById('user-badge-container');
      badgeContainer.innerHTML = `<span class="user-badge">${AppState.escapeHtml(user.nickname)} 님</span>`;
      
      const creditAmount = document.getElementById('user-credit');
      creditAmount.textContent = AppState.formatPoint(user.credit);
    }

    // 2. 간식 목록 API 조회
    async function loadSnacks() {
      const loadingOverlay = document.getElementById('loading-overlay');
      const errorOverlay = document.getElementById('error-overlay');
      const snackGrid = document.getElementById('snack-grid');

      loadingOverlay.style.display = 'flex';
      errorOverlay.style.display = 'none';
      snackGrid.innerHTML = '';

      try {
        const response = await fetchAPI('getSnacks');
        if (response && response.success && Array.isArray(response.snacks)) {
          snacks = response.snacks;
          
          // 장바구니 초기화 (이전 장바구니가 남아있다면 복구)
          cart = AppState.getCart();
          
          renderSnacks();
          updateCartSummary();
          loadingOverlay.style.display = 'none';
        } else {
          throw new Error('간식 응답 데이터가 이상합니다.');
        }
      } catch (error) {
        console.error('간식 로딩 실패:', error);
        loadingOverlay.style.display = 'none';
        errorOverlay.style.display = 'flex';
      }
    }

    // getSnackEmoji는 이제 js/app.js 내의 AppState.getSnackEmoji를 사용하여 전역 관리됩니다.

    // 3. 간식 카드 리스트 렌더링
    function renderSnacks() {
      const snackGrid = document.getElementById('snack-grid');
      snackGrid.innerHTML = '';

      snacks.forEach(snack => {
        // 현재 장바구니에 담긴 수량 확인
        const cartItem = cart.find(item => item.snackId === snack.snackId);
        const quantity = cartItem ? cartItem.quantity : 0;

        const isSoldOut = snack.stock === 0;

        const card = document.createElement('div');
        card.className = `snack-card ${quantity > 0 ? 'has-items' : ''} ${isSoldOut ? 'sold-out' : ''}`;
        card.id = `snack-card-${snack.snackId}`;

        // 이미지 구성 (없으면 이모지)
        const imgUrl = AppState.convertDriveImageUrl(snack.imageUrl);
        const safeImgUrl = AppState.escapeAttr(imgUrl);
        const safeSnackName = AppState.escapeHtml(snack.name);
        const safeSnackEmoji = AppState.escapeHtml(AppState.getSnackEmoji(snack.name));
        const safePoint = AppState.escapeHtml(AppState.formatPoint(snack.point));
        let imgHTML = '';
        if (imgUrl && imgUrl.trim() !== '') {
          imgHTML = `<img src="${safeImgUrl}" alt="${safeSnackName}" class="snack-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
        }
        
        // 이미지 Fallback으로 항상 대형 이모지 컨테이너 대기
        const emojiHTML = `<div class="snack-img-placeholder" style="${imgUrl ? 'display:none;' : 'display:flex;'}">${safeSnackEmoji}</div>`;

        // 남은 재고 텍스트 설정
        const stockText = isSoldOut ? '품절' : `남은 수량 ${snack.stock}개`;
        const stockColor = isSoldOut ? 'var(--danger-color)' : 'var(--text-muted)';

        card.innerHTML = `
          <div class="snack-img-container">
            ${imgHTML}
            ${emojiHTML}
          </div>
          <div class="snack-info">
            <div class="snack-name">${safeSnackName}</div>
            <div class="snack-point">${safePoint}</div>
            <div class="snack-stock" id="stock-${snack.snackId}" style="font-size: 16px; font-weight: 700; color: ${stockColor}; margin-top: 2px;">
              ${AppState.escapeHtml(stockText)}
            </div>
            
            <div class="counter-group">
              <button class="btn-counter btn-counter-minus" id="btn-minus-${snack.snackId}" aria-label="감소">-</button>
              <div class="counter-value" id="val-${snack.snackId}">${quantity}</div>
              <button class="btn-counter btn-counter-plus" id="btn-plus-${snack.snackId}" aria-label="증가" ${isSoldOut ? 'disabled' : ''}>+</button>
            </div>
          </div>
        `;

        snackGrid.appendChild(card);

        // 이벤트 리스너 바인딩
        const minusBtn = card.querySelector(`#btn-minus-${snack.snackId}`);
        const plusBtn = card.querySelector(`#btn-plus-${snack.snackId}`);
        const imgContainer = card.querySelector('.snack-img-container');

        minusBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          changeQuantity(snack, -1);
        });

        plusBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          changeQuantity(snack, 1);
        });

        imgContainer.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!isSoldOut) {
            changeQuantity(snack, 1);
          }
        });
      });
    }

    // 4. 수량 변경 로직
    function changeQuantity(snack, change) {
      // 현재 장바구니 아이템 인덱스
      const cartIndex = cart.findIndex(item => item.snackId === snack.snackId);
      
      // 장바구니 내 현재 수량
      const currentQty = cartIndex > -1 ? cart[cartIndex].quantity : 0;
      const targetQty = currentQty + change;

      if (targetQty < 0) return; // 0 미만으로 감소 불가

      // 재고 한도 검증
      if (change > 0 && targetQty > snack.stock) {
        showStockWarning();
        AppState.vibrate([100, 50, 100]); // 경고성 더블 진동
        return;
      } else {
        hideStockWarning();
      }

      // 총 포인트 합산 계산 (이 연산이 추가되었을 때 한계치 체크)
      const currentTotalPoints = cart.reduce((sum, item) => sum + (item.point * item.quantity), 0);
      const diffPoints = snack.point * change;
      const nextTotalPoints = currentTotalPoints + diffPoints;

      // 크레딧 한도 검증 (실수 방지 목적)
      if (change > 0 && nextTotalPoints > user.credit) {
        showCreditWarning();
        AppState.vibrate([100, 50, 100]); // 경고성 더블 진동
        return;
      } else {
        hideCreditWarning();
      }

      // 장바구니 업데이트
      if (targetQty === 0) {
        if (cartIndex > -1) {
          cart.splice(cartIndex, 1);
        }
      } else {
        if (cartIndex > -1) {
          cart[cartIndex].quantity = targetQty;
        } else {
          cart.push({
            snackId: snack.snackId,
            name: snack.name,
            point: snack.point,
            imageUrl: snack.imageUrl, // 구글 드라이브 이미지 원본 주소 함께 보관
            quantity: targetQty
          });
        }
      }

      // 음성 안내 재생 (TTS)
      if (change > 0) {
        AppState.speak(`${snack.name} ${targetQty}개 담았습니다.`);
      } else if (change < 0) {
        if (targetQty === 0) {
          AppState.speak(`${snack.name}을 모두 뺐습니다.`);
        } else {
          AppState.speak(`${snack.name} ${targetQty}개`);
        }
      }

      // 화면 즉시 갱신
      AppState.setCart(cart);
      
      // 개별 카드 업데이트
      const card = document.getElementById(`snack-card-${snack.snackId}`);
      const valEl = document.getElementById(`val-${snack.snackId}`);
      valEl.textContent = targetQty;
      
      if (targetQty > 0) {
        card.classList.add('has-items');
      } else {
        card.classList.remove('has-items');
      }

      updateCartSummary();
    }

    // 5. 하단 카트 요약 정보 갱신
    function updateCartSummary() {
      const cartCount = document.getElementById('cart-count');
      const cartTotal = document.getElementById('cart-total');
      const btnNext = document.getElementById('btn-next');

      const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPoints = cart.reduce((sum, item) => sum + (item.point * item.quantity), 0);

      cartCount.textContent = `${totalQty}개`;
      cartTotal.textContent = `총 ${totalPoints} 크레딧`;

      // 하나라도 담겨있어야 다음 진행 가능
      btnNext.disabled = totalQty === 0;
    }

    // 6. 경고 메시지 토글
    function showCreditWarning() {
      const warningEl = document.getElementById('credit-warning');
      warningEl.style.display = 'block';
      hideStockWarning(); // 재고 경고는 숨김
      
      // 3초 후 자동 사라짐
      clearTimeout(window.warningTimeout);
      window.warningTimeout = setTimeout(() => {
        hideCreditWarning();
      }, 3000);
    }

    function hideCreditWarning() {
      const warningEl = document.getElementById('credit-warning');
      if (warningEl) warningEl.style.display = 'none';
    }

    function showStockWarning() {
      const warningEl = document.getElementById('stock-warning');
      warningEl.style.display = 'block';
      hideCreditWarning(); // 크레딧 경고는 숨김
      
      // 3초 후 자동 사라짐
      clearTimeout(window.stockWarningTimeout);
      window.stockWarningTimeout = setTimeout(() => {
        hideStockWarning();
      }, 3000);
    }

    function hideStockWarning() {
      const warningEl = document.getElementById('stock-warning');
      if (warningEl) warningEl.style.display = 'none';
    }

    // 초기 바인딩
    window.addEventListener('DOMContentLoaded', () => {
      checkUserSession();
      loadSnacks();

      // 뒤로가기
      document.getElementById('btn-back').addEventListener('click', () => {
        AppState.resetAll();
        window.location.href = 'index.html';
      });

      // 다음단계
      document.getElementById('btn-next').addEventListener('click', () => {
        if (cart.length > 0) {
          window.location.href = 'confirm.html';
        }
      });

      // 에러 시 재호출
      document.getElementById('btn-retry').addEventListener('click', () => {
        loadSnacks();
      });
    });
  </script>
</body>
</html>
