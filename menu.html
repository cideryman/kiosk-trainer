<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>간식 키오스크 - 간식 고르기</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest-kiosk.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주간매점">
  <link rel="apple-touch-icon" href="icons/kiosk-180.png">
</head>
<body>
  <div class="kiosk-container" id="app-container">
    <!-- 헤더 -->
    <header class="kiosk-header">
      <div class="kiosk-header-top">
        <h1 class="kiosk-title">🛒 간식 고르기</h1>
        <div id="user-badge-container">
          <!-- JS 동적 생성 -->
        </div>
      </div>
      <div class="credit-badge">
        내 동전 <span class="coin-icon">🪙</span><span class="coin-number" id="user-credit">0</span>
      </div>
    </header>

    <!-- 크레딧 경고 노티 (숨김이 기본, 오버레이) -->
    <div class="warning-overlay" id="credit-warning" style="display: none;">
      ⚠️ 크레딧이 부족해서 더 담을 수 없어요!
    </div>

    <!-- 재고 경고 노티 (숨김이 기본, 오버레이) -->
    <div class="warning-overlay" id="stock-warning" style="display: none;">
      ⚠️ 재고가 부족해서 더 담을 수 없어요!
    </div>

    <!-- 바디 (스크롤 영역) -->
    <main class="kiosk-body" id="main-content">
      <div class="guide-text" style="margin-bottom: 5px;">
        먹고 싶은 <span>간식</span>을 담아주세요.
      </div>
      <!-- 게스트 배달 힌트 추가 -->
      <div id="guest-delivery-hint" style="display: none; background-color: #FFF3E0; border: 2.5px solid var(--primary-color); padding: 12px; border-radius: var(--radius-sm); font-size: 16px; font-weight: 800; color: #E65100; text-align: center; line-height: 1.4; word-break: keep-all; margin-bottom: 10px; box-shadow: var(--shadow-sm);">
        🛵 배달 주문을 원하시면 배달비(<span id="guest-delivery-fee-text">3</span>🪙)를 남겨두고 간식을 담아주세요! (최대 <span id="guest-max-snack-credit">7</span>🪙까지)
      </div>

      <!-- 간식 목록 그리드 -->
      <div class="grid-container" id="snack-grid">
        <!-- JS 동적 생성 -->
      </div>
    </main>

    <!-- 푸터 (장바구니 요약 & 다음 버튼) -->
    <footer class="kiosk-footer">
      <div class="cart-summary">
        <span>담은 간식 개수: <strong id="cart-count">0개</strong></span>
        <span class="cart-summary-total">합계 <span class="coin-icon">🪙</span><span class="coin-number" id="cart-total">0</span></span>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-gray" id="btn-back" style="flex: 1; min-height: 64px; font-size: 20px;">이름 다시 고르기</button>
        <button class="btn btn-primary" id="btn-next" style="flex: 2; min-height: 64px;" disabled>주문 확인하기</button>
      </div>
    </footer>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="overlay-text">맛있는 간식을 불러오고 있습니다...</div>
    </div>

    <!-- 에러 오버레이 -->
    <div class="overlay" id="error-overlay" style="display: none;">
      <div class="error-box" id="error-message">간식 목록을 가져오지 못했습니다.</div>
      <button class="btn btn-primary" id="btn-retry" style="margin-top: 20px; width: 80%;">다시 불러오기</button>
    </div>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let user = null;
    let snacks = [];
    let cart = []; // { snackId, name, point, quantity }

    // 1. 유저 정보 체크
    function checkUserSession() {
      user = AppState.getSelectedUser();
      if (!user) {
        // 유저 정보 없으면 메인으로 튕김
        window.location.href = 'index.html';
        return;
      }
      
      // 유저 헤더 렌더링
      const badgeContainer = document.getElementById('user-badge-container');
      const isGuest = (user.userId === 'guest');
      badgeContainer.innerHTML = `<span class="user-badge">${AppState.escapeHtml(user.nickname)}${isGuest ? ' (체험)' : ' 님'}</span>`;
      
      // 크레딧 숫자만 업데이트 (HTML 구조는 이미 🪙 아이콘 포함)
      const creditAmount = document.getElementById('user-credit');
      // 게스트 모드일 경우 sessionStorage에서 서버 설정값 적용
      if (user.userId === 'guest') {
        const serverCredit = Number(sessionStorage.getItem('guestBaseCredit')) || user.credit;
        if (serverCredit !== user.credit) {
          user.credit = serverCredit;
          AppState.setSelectedUser(user);
        }
      }
      creditAmount.textContent = user.credit ?? 0;

      if (isGuest) {
        // '내 동전' 라벨을 '체험 동전'으로 변경
        const creditBadge = document.querySelector('.credit-badge');
        if (creditBadge) {
          creditBadge.innerHTML = `체험 동전 <span class="coin-icon">🪙</span><span class="coin-number" id="user-credit">${user.credit ?? 0}</span>`;
        }
        // 게스트 모드에서는 '이름 다시 고르기' 버튼 숨김
        const btnBack = document.getElementById('btn-back');
        if (btnBack) btnBack.style.display = 'none';

        // 배달 힌트 배너 보이기 및 세팅
        const hintEl = document.getElementById('guest-delivery-hint');
        if (hintEl) {
          hintEl.style.display = 'block';
          const fee = Number(sessionStorage.getItem('guestDeliveryFee')) || GUEST_DELIVERY_FEE;
          document.getElementById('guest-delivery-fee-text').textContent = fee;
          document.getElementById('guest-max-snack-credit').textContent = (user.credit ?? 10) - fee;
        }
      }
    }

    // 2. 간식 목록 API 조회
    async function loadSnacks() {
      const loadingOverlay = document.getElementById('loading-overlay');
      const errorOverlay = document.getElementById('error-overlay');
      const snackGrid = document.getElementById('snack-grid');

      loadingOverlay.style.display = 'flex';
      errorOverlay.style.display = 'none';
      snackGrid.innerHTML = '';

      try {
        const isGuest = (user && user.userId === 'guest');
        const mode = isGuest ? 'guest' : 'user';
        const response = await fetchAPI('getSnacks', { params: { mode } });
        if (response && response.success && Array.isArray(response.snacks)) {
          snacks = response.snacks;

          // 관리자가 G열(displayOrder)에 저장한 표시 순서대로 정렬
          // displayOrder=0 또는 미설정인 항목은 맨 뒤에 배치
          snacks.sort((a, b) => {
            const ao = Number(a.displayOrder) || 0;
            const bo = Number(b.displayOrder) || 0;
            if (ao === 0 && bo === 0) return 0;
            if (ao === 0) return 1;
            if (bo === 0) return -1;
            return ao - bo;
          });
          
          // 장바구니 초기화 (이전 장바구니가 남아있다면 복구)
          cart = AppState.getCart();
          
          renderSnacks();
          updateCartSummary();
          loadingOverlay.style.display = 'none';

        } else {
          throw new Error('간식 응답 데이터가 이상합니다.');
        }
      } catch (error) {
        console.error('간식 로딩 실패:', error);
        loadingOverlay.style.display = 'none';
        errorOverlay.style.display = 'flex';
      }
    }

    // getSnackEmoji는 이제 js/app.js 내의 AppState.getSnackEmoji를 사용하여 전역 관리됩니다.

    // 3. 간식 카드 리스트 렌더링
    function renderSnacks() {
      const snackGrid = document.getElementById('snack-grid');
      snackGrid.innerHTML = '';

      snacks.forEach(snack => {
        // 현재 장바구니에 담긴 수량 확인
        const cartItem = cart.find(item => item.snackId === snack.snackId);
        const quantity = cartItem ? cartItem.quantity : 0;

        const isSoldOut = snack.stock === 0;

        const card = document.createElement('div');
        card.className = `snack-card ${quantity > 0 ? 'has-items' : ''} ${isSoldOut ? 'sold-out' : ''}`;
        card.id = `snack-card-${snack.snackId}`;

        // 이미지 구성 (없으면 이모지)
        const imgUrl = AppState.convertDriveImageUrl(snack.imageUrl);
        const safeImgUrl = AppState.escapeAttr(imgUrl);
        const safeSnackName = AppState.escapeHtml(snack.name);
        const safeSnackEmoji = AppState.escapeHtml(AppState.getSnackEmoji(snack.name));
        // 게스트 모드와 이용자 모드 구분
        const pointNum = Number(snack.point) || 0;
        let coinPriceHTML = '';
        if (user && user.userId === 'guest') {
          coinPriceHTML = `<div class="snack-coin-price" style="font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">💰 단가 <span style="color: var(--primary-color); font-weight: 800; font-size: 18px;">${pointNum}🪙</span></div>`;
        } else {
          const maxCoins = 5;
          const coinCount = Math.min(pointNum, maxCoins);
          const extraText = pointNum > maxCoins ? ` <span style="font-size:16px; font-weight:800; color:var(--text-muted); margin-left: 4px;">+${pointNum - maxCoins}</span>` : '';
          const coinHTML = '🪙'.repeat(coinCount) + extraText;
          coinPriceHTML = `<div class="snack-coin-price"><span class="coin-emoji" style="display: flex; align-items: center;">${coinHTML}</span><span class="coin-number-sub">${pointNum}크레딧</span></div>`;
        }
        let imgHTML = '';
        if (imgUrl && imgUrl.trim() !== '') {
          imgHTML = `<img src="${safeImgUrl}" alt="${safeSnackName}" class="snack-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
        }
        
        // 이미지 Fallback으로 항상 대형 이모지 컨테이너 대기
        const emojiHTML = `<div class="snack-img-placeholder" style="${imgUrl ? 'display:none;' : 'display:flex;'}">${safeSnackEmoji}</div>`;

        // 남은 재고 텍스트 설정
        const stockText = isSoldOut ? '품절' : `남은 수량 ${snack.stock}개`;
        const stockColor = isSoldOut ? 'var(--danger-color)' : 'var(--text-muted)';

        card.innerHTML = `
          <div class="snack-img-container">
            ${imgHTML}
            ${emojiHTML}
          </div>
          <div class="snack-info">
            <div class="snack-name">${safeSnackName}</div>
            ${coinPriceHTML}
            <div class="snack-stock" id="stock-${snack.snackId}" style="font-size: 16px; font-weight: 700; color: ${stockColor}; margin-top: 2px;">
              ${AppState.escapeHtml(stockText)}
            </div>
            
            <div class="counter-group">
              <button class="btn-counter btn-counter-minus" id="btn-minus-${snack.snackId}" aria-label="감소">-</button>
              <div class="counter-value" id="val-${snack.snackId}">${quantity}</div>
              <button class="btn-counter btn-counter-plus" id="btn-plus-${snack.snackId}" aria-label="증가" ${isSoldOut ? 'disabled' : ''}>+</button>
            </div>
          </div>
        `;

        snackGrid.appendChild(card);

        // 이벤트 리스너 바인딩 (터치 지터 보정 적용)
        const minusBtn = card.querySelector(`#btn-minus-${snack.snackId}`);
        const plusBtn = card.querySelector(`#btn-plus-${snack.snackId}`);

        // 마이너스 버튼 설정 (버블링 전파 방지 포함)
        minusBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
        AppState.bindCardTap(minusBtn, (e) => {
          e.stopPropagation();
          changeQuantity(snack, -1);
        });

        // 플러스 버튼 설정 (버블링 전파 방지 포함)
        plusBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
        AppState.bindCardTap(plusBtn, (e) => {
          e.stopPropagation();
          changeQuantity(snack, 1);
        });

        // 카드 전체 터치 설정 (버튼 영역 제외 시 +1)
        AppState.bindCardTap(card, (e) => {
          if (e.target.closest('.btn-counter-minus') || e.target.closest('.btn-counter-plus')) {
            return;
          }
          if (!isSoldOut) {
            changeQuantity(snack, 1);
          }
        });
      });
    }

    // 4. 수량 변경 로직
    function changeQuantity(snack, change) {
      // 현재 장바구니 아이템 인덱스
      const cartIndex = cart.findIndex(item => item.snackId === snack.snackId);
      
      // 장바구니 내 현재 수량
      const currentQty = cartIndex > -1 ? cart[cartIndex].quantity : 0;
      const targetQty = currentQty + change;

      if (targetQty < 0) return; // 0 미만으로 감소 불가

      // 재고 한도 검증
      if (change > 0 && targetQty > snack.stock) {
        showStockWarning();
        AppState.vibrate([100, 50, 100]); // 경고성 더블 진동
        return;
      } else {
        hideStockWarning();
      }

      // 총 포인트 합산 계산 (이 연산이 추가되었을 때 한계치 체크)
      const currentTotalPoints = cart.reduce((sum, item) => sum + (item.point * item.quantity), 0);
      const diffPoints = snack.point * change;
      const nextTotalPoints = currentTotalPoints + diffPoints;

      // 크레딧 한도 검증 (실수 방지 목적)
      if (change > 0 && nextTotalPoints > user.credit) {
        showCreditWarning();
        AppState.vibrate([100, 50, 100]); // 경고성 더블 진동
        return;
      } else {
        hideCreditWarning();
      }

      // 장바구니 업데이트
      if (targetQty === 0) {
        if (cartIndex > -1) {
          cart.splice(cartIndex, 1);
        }
      } else {
        if (cartIndex > -1) {
          cart[cartIndex].quantity = targetQty;
          cart[cartIndex].stock = snack.stock; // 재고 수량 업데이트
        } else {
          cart.push({
            snackId: snack.snackId,
            name: snack.name,
            point: snack.point,
            imageUrl: snack.imageUrl, // 구글 드라이브 이미지 원본 주소 함께 보관
            quantity: targetQty,
            stock: snack.stock // 재고 수량 보관
          });
        }
      }

      // 음성 안내 재생 (TTS)
      if (change > 0) {
        AppState.speak(`${snack.name} ${targetQty}개 담았습니다.`);
      } else if (change < 0) {
        if (targetQty === 0) {
          AppState.speak(`${snack.name}을 모두 뺐습니다.`);
        } else {
          AppState.speak(`${snack.name} ${targetQty}개`);
        }
      }

      // 화면 즉시 갱신
      AppState.setCart(cart);
      
      // 개별 카드 업데이트
      const card = document.getElementById(`snack-card-${snack.snackId}`);
      const valEl = document.getElementById(`val-${snack.snackId}`);
      valEl.textContent = targetQty;
      
      if (targetQty > 0) {
        card.classList.add('has-items');
      } else {
        card.classList.remove('has-items');
      }

      updateCartSummary();
    }

    // 5. 하단 카트 요약 정보 갱신
    function updateCartSummary() {
      const cartCount = document.getElementById('cart-count');
      const cartTotal = document.getElementById('cart-total');
      const btnNext = document.getElementById('btn-next');

      const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPoints = cart.reduce((sum, item) => sum + (item.point * item.quantity), 0);

      cartCount.textContent = `${totalQty}개`;
      // 합계는 숫자만 업데이트 (HTML 구조에 이미 🪙 아이콘 포함)
      cartTotal.textContent = totalPoints;

      // 하나라도 담겨있어야 다음 진행 가능
      btnNext.disabled = totalQty === 0;
    }

    // 6. 경고 메시지 토글
    function showCreditWarning() {
      const warningEl = document.getElementById('credit-warning');
      if (user && user.userId === 'guest') {
        warningEl.textContent = '⚠️ 체험용 동전이 부족해서 더 담을 수 없어요!';
      } else {
        warningEl.textContent = '⚠️ 크레딧이 부족해서 더 담을 수 없어요!';
      }
      warningEl.style.display = 'block';
      hideStockWarning(); // 재고 경고는 숨김
      
      // 3초 후 자동 사라짐
      clearTimeout(window.warningTimeout);
      window.warningTimeout = setTimeout(() => {
        hideCreditWarning();
      }, 3000);
    }

    function hideCreditWarning() {
      const warningEl = document.getElementById('credit-warning');
      if (warningEl) warningEl.style.display = 'none';
    }

    function showStockWarning() {
      const warningEl = document.getElementById('stock-warning');
      warningEl.style.display = 'block';
      hideCreditWarning(); // 크레딧 경고는 숨김
      
      // 3초 후 자동 사라짐
      clearTimeout(window.stockWarningTimeout);
      window.stockWarningTimeout = setTimeout(() => {
        hideStockWarning();
      }, 3000);
    }

    function hideStockWarning() {
      const warningEl = document.getElementById('stock-warning');
      if (warningEl) warningEl.style.display = 'none';
    }

    // 초기 바인딩
    window.addEventListener('DOMContentLoaded', () => {
      checkUserSession();
      loadSnacks();

      // 뒤로가기
      AppState.bindCardTap(document.getElementById('btn-back'), () => {
        AppState.resetAll();
        window.location.href = 'index.html';
      });

      // 다음단계
      AppState.bindCardTap(document.getElementById('btn-next'), () => {
        if (cart.length > 0) {
          window.location.href = 'confirm.html';
        }
      });

      // 에러 시 재호출
      document.getElementById('btn-retry').addEventListener('click', () => {
        loadSnacks();
      });
    });
  </script>
</body>
</html>
