<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간식 키오스크 - 호출 전광판</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA 설정 -->
  <link rel="manifest" href="manifest-board.json">
  <meta name="theme-color" content="#FF9F1C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="간식 키오스크 전광판">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    body {
      background-color: #F1F5F9;
      padding: 0;
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 전광판은 더 크게 전체화면 지원 */
    .board-container {
      width: 100%;
      height: 100%;
      max-width: 1200px;
      background-color: #FFFFFF;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .board-header {
      background-color: #2B2D42;
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 5px solid var(--primary-color);
      box-shadow: var(--shadow-sm);
    }

    .board-title {
      font-size: 32px;
      font-weight: 900;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .board-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1.2fr; /* 준비완료 영역이 조금 더 넓게 */
      gap: 0;
      background-color: var(--border-color);
    }

    .board-column {
      background-color: #FFFFFF;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .board-column.preparing {
      border-right: 3px solid var(--border-color);
    }

    .board-column-header {
      padding: 24px;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      border-bottom: 3px solid var(--border-color);
      color: white;
    }

    .preparing .board-column-header {
      background-color: #3A86C8;
    }

    .ready .board-column-header {
      background-color: var(--secondary-color);
    }

    .board-list {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background-color: #F8FAFC;
    }

    /* 전광판 주문 카드 스타일 */
    .board-card {
      background-color: #FFFFFF;
      border: 3.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease-in-out;
    }

    .board-card.ready-item {
      border-color: var(--secondary-color);
      background-color: #F0FFFE;
      animation: callPulse 1.8s infinite ease-in-out;
    }

    @keyframes callPulse {
      0% { box-shadow: 0 0 0 rgba(46, 196, 182, 0); transform: scale(1); }
      50% { box-shadow: 0 0 20px rgba(46, 196, 182, 0.4); transform: scale(1.02); }
      100% { box-shadow: 0 0 0 rgba(46, 196, 182, 0); transform: scale(1); }
    }

    .board-number-box {
      min-width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 42px;
      font-weight: 950;
      color: white;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }

    .preparing .board-number-box {
      background-color: #3A86C8;
    }

    .ready .board-number-box {
      background-color: var(--secondary-color);
    }

    .board-info-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .board-username {
      font-size: 28px;
      font-weight: 850;
      color: var(--text-main);
    }

    .board-snacks-list {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .board-status-badge {
      font-size: 16px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 20px;
      color: white;
      text-align: center;
      margin-left: auto;
    }

    .preparing .board-status-badge {
      background-color: #E6F0FA;
      color: #1A5FB4;
      border: 2px solid #3A86C8;
    }

    .ready .board-status-badge {
      background-color: #E0F2F1;
      color: #00796B;
      border: 2px solid var(--secondary-color);
      font-size: 18px;
      padding: 8px 18px;
      animation: blinkText 1s infinite alternate;
    }

    @keyframes blinkText {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .board-empty {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      padding: 60px 20px;
      margin: auto 0;
    }

    /* 볼륨/음성 컨트롤 패널 */
    .controls-panel {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .control-btn {
      background-color: #3A3B56;
      color: white;
      border: none;
      padding: 8px 16px;
      font-size: 15px;
      font-weight: 800;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .control-btn.active {
      background-color: var(--primary-color);
    }
  </style>
</head>
<body>
  <div class="board-container">
    <!-- 헤더 -->
    <header class="board-header">
      <div class="board-title">📢 실시간 간식 호출 전광판</div>
      
      <div class="controls-panel">
        <button class="control-btn active" id="btn-audio-toggle">
          🔊 소리 알림 켬
        </button>
        <button class="control-btn" id="btn-back" style="background-color: #E9ECEF; color: var(--text-main);">
          🏠 키오스크 홈
        </button>
      </div>
    </header>

    <!-- 바디 -->
    <main class="board-layout">
      <!-- 대기 중 (준비 중) -->
      <section class="board-column preparing">
        <div class="board-column-header">⏳ 준비 중 (대기)</div>
        <div class="board-list" id="preparing-list">
          <div class="board-empty">대기 중인 주문이 없습니다.</div>
        </div>
      </section>

      <!-- 준비 완료 (가져가세요!) -->
      <section class="board-column ready">
        <div class="board-column-header">🎁 준비 완료 (가져가세요!)</div>
        <div class="board-list" id="ready-list">
          <div class="board-empty">호출된 주문이 없습니다.</div>
        </div>
      </section>
    </main>
  </div>

  <!-- 스크립트 참조 -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let pollInterval = null;
    let isAudioEnabled = true;
    let knownReadyOrders = []; // 호출 음성 중복 방지용 캐시

    // 띵동 차임벨 효과음 합성 (Web Audio API)
    function playChimeSound() {
      if (!isAudioEnabled) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 첫 번째 고음 (솔 - G5 784.00 Hz)
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(784.00, audioCtx.currentTime);
        gain1.gain.setValueAtTime(0, audioCtx.currentTime);
        gain1.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.05);
        gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        
        osc1.start(audioCtx.currentTime);
        osc1.stop(audioCtx.currentTime + 0.5);
        
        // 두 번째 중음 (미 - E5 659.25 Hz)
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.18);
        gain2.gain.setValueAtTime(0, audioCtx.currentTime + 0.18);
        gain2.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.23);
        gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.75);
        
        osc2.start(audioCtx.currentTime + 0.18);
        osc2.stop(audioCtx.currentTime + 0.75);
      } catch (e) {
        console.warn('효과음 합성 실패:', e);
      }
    }

    // TTS 음성 호출
    function speakCalling(orderNo, nickname) {
      if (!isAudioEnabled) return;
      
      const shortNo = getShortNo(orderNo);
      const text = `주문번호 ${shortNo}번, ${nickname} 님, 간식이 준비되었습니다. 받아가세요!`;
      
      try {
        window.speechSynthesis.cancel(); // 진행 중 대화 리셋
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.05;
        window.speechSynthesis.speak(utterance);
      } catch (e) {
        console.warn('TTS 재생 실패:', e);
      }
    }

    function getShortNo(orderNo) {
      if (!orderNo) return '-';
      const parts = String(orderNo).split('-');
      if (parts.length >= 3) {
        return parseInt(parts[2], 10);
      }
      return orderNo;
    }

    // 데이터 호출 및 렌더링
    async function loadBoardData() {
      try {
        const res = await fetchAPI('getOrdersToday');
        if (res && res.success && Array.isArray(res.orders)) {
          processOrders(res.orders);
        }
      } catch (e) {
        console.error('전광판 데이터 호출 실패:', e);
      }
    }

    function processOrders(rawOrders) {
      // 1. 주문 건별로 그룹핑 (동일 주문번호 묶음)
      const groups = {};
      rawOrders.forEach(o => {
        // 취소된 주문('C')은 전광판 노출 제외
        if (o.servedYn === 'C') return;
        
        if (!groups[o.orderNo]) {
          groups[o.orderNo] = {
            orderNo: o.orderNo,
            nickname: o.nickname,
            timestamp: o.timestamp,
            servedYn: o.servedYn || 'N',
            deliveryType: o.deliveryType || 'pickup',
            snacks: []
          };
        }
        groups[o.orderNo].snacks.push({
          name: o.snackName,
          quantity: Number(o.quantity || 1)
        });
      });

      // 2. 대기 그룹과 완료 그룹 분류
      // - 대기중: servedYn === 'N' (접수중) 또는 'P' (준비중)
      // - 준비완료: servedYn === 'R'
      // - 수령완료('Y')는 호출판 노출 제외
      const list = Object.values(groups);
      const preparingOrders = list.filter(o => o.servedYn === 'N' || o.servedYn === 'P');
      const readyOrders = list.filter(o => o.servedYn === 'R');

      // 주문 시간 순 정렬 (선입선출)
      preparingOrders.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
      readyOrders.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

      // 3. 신규 준비완료 건 감지하여 차임 및 TTS 송출
      let newArrival = false;
      const currentReadyNos = readyOrders.map(o => o.orderNo);
      
      readyOrders.forEach(order => {
        if (!knownReadyOrders.includes(order.orderNo)) {
          newArrival = true;
          // 즉시 호출 방송 실행
          setTimeout(() => {
            playChimeSound();
            speakCalling(order.orderNo, order.nickname);
          }, 100);
        }
      });
      
      // 최신 호출 목록으로 메모리 동기화
      knownReadyOrders = currentReadyNos;

      // 4. 화면 렌더링
      renderList('preparing-list', preparingOrders, 'preparing');
      renderList('ready-list', readyOrders, 'ready');
    }

    function renderList(containerId, list, type) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (list.length === 0) {
        container.innerHTML = type === 'preparing' 
          ? '<div class="board-empty">대기 중인 주문이 없습니다. ⏳</div>'
          : '<div class="board-empty">호출된 주문이 없습니다. 🥞</div>';
        return;
      }

      container.innerHTML = '';
      list.forEach(order => {
        const shortNo = getShortNo(order.orderNo);
        const safeNickname = AppState.escapeHtml(order.nickname);
        const safeSnacksText = AppState.escapeHtml(
          order.snacks.map(s => `${s.name} ${s.quantity}개`).join(', ')
        );

        const card = document.createElement('div');
        card.className = `board-card ${type === 'ready' ? 'ready-item' : ''}`;
        
        const isDelivery = order.deliveryType === 'delivery';
        let statusBadgeText = '접수완료';
        if (order.servedYn === 'P') {
          statusBadgeText = '준비중';
        } else if (order.servedYn === 'R') {
          statusBadgeText = isDelivery ? '배달중 🛵' : '가져가세요!';
        }

        card.innerHTML = `
          <div class="board-number-box">${shortNo}</div>
          <div class="board-info-box">
            <div class="board-username">${safeNickname} 님</div>
            <div class="board-snacks-list">${safeSnacksText}</div>
          </div>
          <div class="board-status-badge">${statusBadgeText}</div>
        `;
        
        container.appendChild(card);
      });
    }

    // 초기 이벤트 설정
    window.addEventListener('DOMContentLoaded', () => {
      // 오디오 켜기/끄기
      const btnAudio = document.getElementById('btn-audio-toggle');
      btnAudio.addEventListener('click', () => {
        isAudioEnabled = !isAudioEnabled;
        btnAudio.classList.toggle('active', isAudioEnabled);
        btnAudio.textContent = isAudioEnabled ? '🔊 소리 알림 켬' : '🔇 소리 알림 끔';
        AppState.vibrate(40);
        if (isAudioEnabled) {
          playChimeSound();
        }
      });

      // 뒤로가기
      document.getElementById('btn-back').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      // 최초 조회 진행 후 5초 폴링 루프 시작
      loadBoardData();
      pollInterval = setInterval(loadBoardData, 5000);
    });
  </script>
</body>
</html>
